<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>火箭马里奥 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>#gameCanvas{background:#0d1b2a;touch-action:none}.key{display:inline-block;background:var(--mc-panel);border:2px solid #000;box-shadow:inset -2px -2px 0 0 var(--mc-shadow),inset 2px 2px 0 0 var(--mc-highlight);padding:3px 8px;font-family:'Press Start 2P',monospace;font-size:10px;margin:0 2px}</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar"><a href="index.html" class="logo">⛏ AoXuan.World</a>
<nav><a href="index.html">首页</a><a href="m-poison.html">毒蘑菇</a><a href="m-parachute.html">降落伞</a><a href="m-coins.html">金币射击</a><a href="m-escape.html">城堡逃脱</a><a href="m-rocket.html">火箭马里奥</a><a href="m-1up.html">1-Up</a><a href="m-circus.html">马戏</a><a href="m-puzzle.html">拼图</a><a href="m-mega.html">超级蘑菇</a><a href="m-rhythm.html">节奏</a><a href="m-dig.html">挖洞</a><a href="m-brawl.html">大乱斗</a></nav></div>
<div class="container center">
<h1 class="title-3d" style="font-size:30px;">🚀 火箭马里奥</h1>
<p class="subtitle">马里奥绑火箭，收集星星飞高！</p>
<div class="hud" style="margin-top:18px"><div class="hud-item"><span class="label">高度</span><span id="dist">0</span>m</div><div class="hud-item"><span class="label">燃料</span><span id="fuel">100</span></div><div class="hud-item"><span class="label">⭐</span><span id="stars">0</span></div><div class="hud-item"><span class="label">最高</span><span id="best">0</span>m</div></div>
<div class="game-stage" style="margin-top:14px"><canvas id="gameCanvas" width="400" height="480"></canvas></div>
<p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:15px;margin-top:10px"><span class="key">←→</span>移动 <span class="key">↑</span>加速(耗燃料) · 收⭐补燃料</p>
<div style="margin-top:12px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><button class="mc-btn green" id="startBtn">▶ 开始</button><a href="index.html" class="mc-btn">← 返回</a></div>
</div><div class="ground" style="position:fixed;bottom:0;left:0;right:0;z-index:0"></div>
<script src="sound.js"></script><script src="mobile.js"></script><script src="shared.js"></script>
<script>
(function(){
var c=document.getElementById('gameCanvas'),x=c.getContext('2d'),W=c.width,H=c.height;
var s,p,obs,stars,pts,st,keys,tick,boost;
function init(){s={running:false,over:false,dist:0,fuel:100,stars:0,best:getBest()};p={x:W/2,y:H-100,vx:0};obs=[];stars=[];pts=[];st=[];keys={};tick=0;boost=0;for(var i=0;i<50;i++)st.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.5+0.3});updateHud();}
function getBest(){return parseInt(localStorage.getItem('mrocket_best')||'0',10)}
function setBest(v){localStorage.setItem('mrocket_best',v)}
function updateHud(){document.getElementById('dist').textContent=Math.floor(s.dist);document.getElementById('fuel').textContent=Math.floor(s.fuel);document.getElementById('stars').textContent=s.stars;document.getElementById('best').textContent=s.best;}
function update(){if(!s.running||s.over)return;tick++;s.dist+=0.5;
if(keys['arrowleft']||keys['a'])p.vx-=0.5;if(keys['arrowright']||keys['d'])p.vx+=0.5;p.vx*=0.9;p.x+=p.vx;p.x=Math.max(20,Math.min(W-20,p.x));
var b=(keys['arrowup']||keys['w'])&&s.fuel>0;if(b){s.fuel-=0.5;boost=8;s.dist+=1;for(var i=0;i<2;i++)pts.push({x:p.x+(Math.random()-0.5)*8,y:p.y+25,vx:(Math.random()-0.5)*2,vy:3+Math.random()*3,life:15,c:'#ff9800',size:3})}else boost*=0.8;
if(tick%60===0)obs.push({x:30+Math.random()*(W-60),y:-30,w:40+Math.random()*30,h:24});
if(tick%90===0&&Math.random()<0.7)stars.push({x:30+Math.random()*(W-60),y:-20,r:10,t:Math.random()*6});
obs.forEach(function(o){o.y+=3+boost*0.3});obs=obs.filter(function(o){if(o.y>H+30)return false;if(Math.abs(o.x-p.x)<o.w/2+12&&Math.abs(o.y-p.y)<o.h/2+18){over();}return true});
stars.forEach(function(st2){st2.y+=3;st2.t+=0.15});stars=stars.filter(function(st2){if(st2.y>H+20)return false;if(Math.abs(st2.x-p.x)<20&&Math.abs(st2.y-p.y)<20){s.fuel=Math.min(100,s.fuel+25);s.stars++;SFX.coin();ex(st2.x,st2.y,'#ffd700');updateHud();return false;}return true});
st.forEach(function(s2){s2.y+=1+boost*0.2;if(s2.y>H){s2.y=0;s2.x=Math.random()*W}});
pts=pts.filter(function(p2){p2.x+=p2.vx;p2.y+=p2.vy;p2.life--;return p2.life>0});
if(s.dist>s.best){setBest(Math.floor(s.dist));s.best=Math.floor(s.dist);updateHud();}}
function ex(x,y,c){for(var i=0;i<8;i++){var a=Math.random()*7,s=1+Math.random()*3;pts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:20,c:c,size:2+Math.random()*3})}}
function over(){s.over=true;s.running=false;AOXSound.stopBGM();SFX.lose();for(var i=0;i<16;i++){var a=Math.random()*7,s2=2+Math.random()*4;pts.push({x:p.x,y:p.y,vx:Math.cos(a)*s2,vy:Math.sin(a)*s2-2,life:30,c:i%2?'#ff9800':'#e53935',size:3+Math.random()*3})}}
function draw(){
var h=Math.min(1,s.dist/2000);x.fillStyle='rgb('+(5+h*10)+','+(5+h*15)+','+(15+h*60)+')';x.fillRect(0,0,W,H);
st.forEach(function(s2){x.fillStyle='rgba(255,255,255,'+(0.3+s2.s/2)+')';x.fillRect(s2.x,s2.y,s2.s,s2.s)});
obs.forEach(function(o){x.fillStyle='#7f7f7f';x.fillRect(o.x-o.w/2,o.y-o.h/2,o.w,o.h);x.fillStyle='#555';x.fillRect(o.x-o.w/2+4,o.y-o.h/2+4,o.w-8,o.h-8)});
stars.forEach(function(s2){var b=Math.sin(s2.t)*2;x.fillStyle='#ffd700';x.shadowColor='#ffd700';x.shadowBlur=8;x.fillRect(s2.x-2,s2.y-8+b,4,16);x.fillRect(s2.x-8,s2.y-2+b,16,4);x.shadowBlur=0});
// mario+火箭
var px=p.x,py=p.y;x.fillStyle='#7f7f7f';x.fillRect(px-8,py+10,16,20);x.fillStyle='#e53935';x.fillRect(px-8,py-10,16,20);x.fillStyle='#ff9800';x.fillRect(px-6,py-18,12,10);x.fillStyle='#e53935';x.fillRect(px-6,py-18,12,3);x.fillStyle='#fff';x.fillRect(px-3,py-14,3,3);
if(boost>1){x.fillStyle='#ff9800';x.fillRect(px-4,py+30,8,6+boost);x.fillStyle='#ffeb3b';x.fillRect(px-2,py+30,4,4+boost)}
pts.forEach(function(p2){x.globalAlpha=p2.life/30;x.fillStyle=p2.c;x.fillRect(p2.x,p2.y,p2.size,p2.size);x.globalAlpha=1});
if(!s.running){x.fillStyle='rgba(0,0,0,0.7)';x.fillRect(0,0,W,H);x.textAlign='center';if(s.over){x.fillStyle='#e53935';x.font='22px "Press Start 2P",monospace';x.fillText('爆炸！',W/2,H/2-25);x.fillStyle='#ffd700';x.font='13px "Press Start 2P",monospace';x.fillText('高度:'+Math.floor(s.dist)+'m ⭐:'+s.stars,W/2,H/2+8);x.fillStyle='#fff';x.font='10px "Press Start 2P",monospace';x.fillText('按R重玩',W/2,H/2+34);}else{x.fillStyle='#4dd0e1';x.font='20px "Press Start 2P",monospace';x.fillText('准备升空',W/2,H/2-8);x.font='10px "Press Start 2P",monospace';x.fillText('点击开始',W/2,H/2+20);}}}
function loop(){update();draw();requestAnimationFrame(loop);}
document.addEventListener('keydown',function(e){keys[e.key.toLowerCase()]=true;if(['arrowleft','arrowright','arrowup'].indexOf(e.key.toLowerCase())>=0)e.preventDefault();if(e.key.toLowerCase()==='r'){init();s.running=true;AOXSound.ensure();}});
document.addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false});
c.addEventListener('touchmove',function(e){e.preventDefault();var r=c.getBoundingClientRect();var nx=(e.touches[0].clientX-r.left)*(W/r.width);p.vx=(nx-p.x)*0.3},{passive:false});
c.addEventListener('touchstart',function(e){e.preventDefault();keys['arrowup']=true;var r=c.getBoundingClientRect();var nx=(e.touches[0].clientX-r.left)*(W/r.width);p.vx=(nx-p.x)*0.3},{passive:false});
c.addEventListener('touchend',function(){keys['arrowup']=false},{passive:false});
document.getElementById('startBtn').addEventListener('click',function(){init();s.running=true;AOXSound.ensure();AOXSound.startBGM('game');SFX.select();toast('升空！')});
init();loop();
})();
</script></body></html>
