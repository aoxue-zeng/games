<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方块三消 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>
  #gameCanvas { background:#1a2a3a; cursor:pointer; }
  .key {
    display:inline-block; background:var(--mc-panel); border:2px solid #000;
    box-shadow: inset -3px -3px 0 0 var(--mc-shadow), inset 3px 3px 0 0 var(--mc-highlight);
    padding:3px 8px; font-family:'Press Start 2P',monospace; font-size:10px; margin:0 2px;
  }
  .help-text { color:white; text-shadow:2px 2px 0 #000; font-size:16px; line-height:1.8; }
  .progress-wrap {
    width:280px; height:24px; background:var(--mc-night);
    border:3px solid #000; box-shadow: inset 3px 3px 0 0 #000;
    margin:14px auto 0; overflow:hidden; position:relative;
  }
  .progress-bar {
    height:100%; background:linear-gradient(90deg,#5fb53f,#ffd700);
    box-shadow: inset 3px 3px 0 0 rgba(255,255,255,0.3);
    transition:width 0.4s;
  }
  .progress-label {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:'Press Start 2P',monospace; font-size:10px; color:#fff; text-shadow:1px 1px 0 #000;
  }
</style>
</head>
<body>
<div class="floating-blocks"></div>

<div class="topbar">
  <a href="index.html" class="logo">⛏ AoXuan.World</a>
  <nav>
    <a href="index.html">首页</a>
    <a href="typing.html">打字</a>
    <a href="mario.html">冒险</a>
    <a href="tetris.html">俄罗斯</a>
    <a href="mining.html">挖矿</a>
    <a href="sweeper.html">扫雷</a>
    <a href="match3.html">三消</a>
  </nav>
</div>

<div class="container center">
  <h1 class="title-3d" style="font-size:36px;">🧱 方块三消</h1>
  <p class="subtitle">交换相邻方块，连成 3+ 消除！</p>

  <div class="hud" style="margin-top:24px;">
    <div class="hud-item"><span class="label">得分</span><span id="score">0</span></div>
    <div class="hud-item"><span class="label">连击</span><span id="combo">0</span></div>
    <div class="hud-item"><span class="label">步数</span><span id="moves">25</span></div>
    <div class="hud-item"><span class="label">目标</span><span id="target">1500</span></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress" style="width:0%"></div>
    <div class="progress-label" id="progressLabel">0 / 1500</div>
  </div>

  <div class="game-stage" style="margin-top:14px;">
    <canvas id="gameCanvas" width="420" height="420"></canvas>
  </div>

  <p class="help-text" style="margin-top:12px;">
    点击一个方块，再点相邻方块交换 · 4连消特殊方块 · 消除可连锁
  </p>

  <div style="margin-top:14px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap;">
    <button class="mc-btn green" id="startBtn">▶ 开始游戏</button>
    <button class="mc-btn gold" id="shuffleBtn">🔀 洗牌</button>
    <a href="index.html" class="mc-btn">← 返回大厅</a>
  </div>
</div>

<div class="ground" style="position:fixed; bottom:0; left:0; right:0; z-index:0;"></div>

<script src="sound.js"></script>
<script src="mobile.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;

  var COLS = 7, ROWS = 7, CELL = 60;
  // 方块类型：0草 1泥 2石 3煤 4金 5钻 6红石
  var TYPES = [
    {name:'草',color:'#5fb53f',dark:'#3d8b2a',icon:'🌱'},
    {name:'泥',color:'#8b5a2b',dark:'#6b4220',icon:'🟫'},
    {name:'石',color:'#7f7f7f',dark:'#555',icon:'⬜'},
    {name:'煤',color:'#2b2b2b',dark:'#111',icon:'⚫'},
    {name:'金',color:'#ffd700',dark:'#b8860b',icon:'🟨'},
    {name:'钻',color:'#4dd0e1',dark:'#00838f',icon:'💎'},
    {name:'红',color:'#e53935',dark:'#b71c1c',icon:'🔴'}
  ];

  var grid, state, particles, selected, busy, anims;

  function init(){
    grid = [];
    do {
      grid = [];
      for(var r=0;r<ROWS;r++){
        var row=[];
        for(var c=0;c<COLS;c++){ row.push(Math.floor(Math.random()*TYPES.length)); }
        grid.push(row);
      }
    } while(findMatches().length>0 || !hasMoves());
    state = { running:false, over:false, won:false, score:0, combo:0, moves:25, target:1500 };
    particles=[]; selected=null; busy=false; anims=[];
    updateHud();
  }

  function updateHud(){
    document.getElementById('score').textContent = state.score;
    document.getElementById('combo').textContent = state.combo;
    document.getElementById('moves').textContent = state.moves;
    document.getElementById('target').textContent = state.target;
    var pct = Math.min(100, Math.floor(state.score/state.target*100));
    document.getElementById('progress').style.width = pct+'%';
    document.getElementById('progressLabel').textContent = state.score+' / '+state.target;
  }

  function findMatches(){
    var matches=[];
    // 横向
    for(var r=0;r<ROWS;r++){
      var run=1;
      for(var c=1;c<=COLS;c++){
        if(c<COLS && grid[r][c]===grid[r][c-1] && grid[r][c]!==-1){ run++; }
        else { if(run>=3){ for(var k=0;k<run;k++) matches.push([r,c-1-k]); } run=1; }
      }
    }
    // 纵向
    for(var c2=0;c2<COLS;c2++){
      var run2=1;
      for(var r2=1;r2<=ROWS;r2++){
        if(r2<ROWS && grid[r2][c2]===grid[r2-1][c2] && grid[r2][c2]!==-1){ run2++; }
        else { if(run2>=3){ for(var k2=0;k2<run2;k2++) matches.push([r2-1-k2,c2]); } run2=1; }
      }
    }
    // 去重
    var set={}, out=[];
    matches.forEach(function(m){ var k=m[0]+'_'+m[1]; if(!set[k]){ set[k]=1; out.push(m); } });
    return out;
  }

  function hasMoves(){
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
      // 试与右、下交换
      if(c<COLS-1){ swap(r,c,r,c+1); var m=findMatches().length>0; swap(r,c,r,c+1); if(m) return true; }
      if(r<ROWS-1){ swap(r,c,r+1,c); var m2=findMatches().length>0; swap(r,c,r+1,c); if(m2) return true; }
    }
    return false;
  }

  function swap(r1,c1,r2,c2){
    var t=grid[r1][c1]; grid[r1][c1]=grid[r2][c2]; grid[r2][c2]=t;
  }

  function shuffle(){
    do {
      var flat=[];
      for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++) flat.push(grid[r][c]);
      for(var i=flat.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=flat[i];flat[i]=flat[j];flat[j]=t; }
      for(var r2=0;r2<ROWS;r2++) for(var c2=0;c2<COLS;c2++) grid[r2][c2]=flat[r2*COLS+c2];
    } while(findMatches().length>0 || !hasMoves());
    render();
  }

  function trySwap(r1,c1,r2,c2){
    if(busy||!state.running||state.over) return;
    // 必须相邻
    if(Math.abs(r1-r2)+Math.abs(c1-c2)!==1) return;
    swap(r1,c1,r2,c2);
    if(findMatches().length>0){
      state.moves--;
      state.combo=0;
      SFX.move();
      processMatches();
    } else {
      // 换回去
      swap(r1,c1,r2,c2);
      SFX.error();
      toast('无效交换');
    }
    updateHud();
  }

  function processMatches(){
    busy=true;
    var matches = findMatches();
    if(matches.length===0){
      busy=false;
      checkEnd();
      if(!hasMoves()){ toast('没有可走了，自动洗牌'); SFX.rotate(); setTimeout(shuffle,500); }
      return;
    }
    state.combo++;
    var gain = matches.length * 20 * state.combo;
    state.score += gain;
    if(state.combo>=2){ toast('连击 x'+state.combo+'！+'+gain); SFX.clearBig(); }
    else SFX.clear();
    // 粒子 + 标记消除
    matches.forEach(function(m){
      var r=m[0],c=m[1];
      var t=grid[r][c];
      spawnParticles(c*CELL+CELL/2, r*CELL+CELL/2, TYPES[t].color);
      grid[r][c]=-1;
    });
    updateHud();
    // 等待动画后下落填充
    setTimeout(function(){
      dropAndFill();
      SFX.drop();
      setTimeout(function(){ processMatches(); }, 350);
    }, 300);
  }

  function dropAndFill(){
    for(var c=0;c<COLS;c++){
      // 收集本列非空
      var col=[];
      for(var r=ROWS-1;r>=0;r--){ if(grid[r][c]!==-1) col.push(grid[r][c]); }
      // 从底部填
      for(var r=ROWS-1;r>=0;r--){
        if(col.length>0){ grid[r][c]=col.shift(); }
        else { grid[r][c]=Math.floor(Math.random()*TYPES.length); }
      }
    }
  }

  function spawnParticles(x,y,color){
    for(var i=0;i<10;i++){
      var a=Math.random()*Math.PI*2, s=1+Math.random()*4;
      particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:30,color:color,size:3+Math.random()*3});
    }
  }

  function checkEnd(){
    if(state.score>=state.target && !state.won){
      state.won=true; state.over=true; state.running=false;
      AOXSound.stopBGM(); SFX.win();
      toast('🎉 通关！剩余步数奖励 '+(state.moves*30));
      state.score += state.moves*30; updateHud();
    } else if(state.moves<=0 && state.score<state.target){
      state.over=true; state.running=false;
      AOXSound.stopBGM(); SFX.lose();
      toast('步数用尽！再来一次');
    }
  }

  // ===== 渲染 =====
  function drawBlock(c,r,type){
    var sx=c*CELL, sy=r*CELL;
    if(type===-1) return;
    var info=TYPES[type];
    ctx.fillStyle=info.color;
    ctx.fillRect(sx+2,sy+2,CELL-4,CELL-4);
    // 高光阴影
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillRect(sx+2,sy+2,CELL-4,4);
    ctx.fillRect(sx+2,sy+2,4,CELL-4);
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.fillRect(sx+2,sy+CELL-6,CELL-4,4);
    ctx.fillRect(sx+CELL-6,sy+2,4,CELL-4);
    // 矿物点缀
    ctx.fillStyle=info.dark;
    if(type===0){ // 草纹理
      ctx.fillRect(sx+8,sy+10,4,4); ctx.fillRect(sx+40,sy+14,4,4);
    } else if(type===5){ // 钻石高光
      ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.fillRect(sx+12,sy+12,6,6);
    } else if(type===4){ // 金点
      ctx.fillStyle='#fff'; ctx.fillRect(sx+10,sy+12,3,3); ctx.fillRect(sx+40,sy+16,3,3);
    } else {
      ctx.fillRect(sx+10,sy+12,5,5); ctx.fillRect(sx+38,sy+16,5,5);
    }
    // 选中框
    if(selected && selected[0]===r && selected[1]===c){
      ctx.strokeStyle='#ffd700'; ctx.lineWidth=3;
      ctx.strokeRect(sx+1,sy+1,CELL-2,CELL-2);
      // 闪烁
      if(Math.floor(Date.now()/200)%2===0){
        ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(sx+3,sy+3,CELL-6,CELL-6);
      }
    }
  }

  function draw(){
    ctx.fillStyle='#1a2a3a'; ctx.fillRect(0,0,W,H);
    // 网格线
    ctx.strokeStyle='rgba(255,255,255,0.05)';
    for(var i=0;i<=COLS;i++){ ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,H); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(W,i*CELL); ctx.stroke(); }
    // 方块
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){ drawBlock(c,r,grid[r][c]); }
    // 粒子
    for(var i=particles.length-1;i>=0;i--){
      var p=particles[i];
      ctx.globalAlpha=p.life/30; ctx.fillStyle=p.color;
      ctx.fillRect(p.x,p.y,p.size,p.size); ctx.globalAlpha=1;
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.3; p.life--;
      if(p.life<=0) particles.splice(i,1);
    }
    // 结算
    if(!state.running){
      ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';
      if(state.won){
        ctx.fillStyle='#4caf50'; ctx.font='26px "Press Start 2P", monospace';
        ctx.fillText('🎉 通关！', W/2, H/2-20);
        ctx.fillStyle='#ffd700'; ctx.font='14px "Press Start 2P", monospace';
        ctx.fillText('得分:'+state.score, W/2, H/2+15);
      } else if(state.over){
        ctx.fillStyle='#e53935'; ctx.font='26px "Press Start 2P", monospace';
        ctx.fillText('游戏结束', W/2, H/2-20);
        ctx.fillStyle='#fff'; ctx.font='12px "Press Start 2P", monospace';
        ctx.fillText('得分:'+state.score+' / '+state.target, W/2, H/2+15);
      } else {
        ctx.fillStyle='#ffd700'; ctx.font='22px "Press Start 2P", monospace';
        ctx.fillText('准备开始', W/2, H/2);
        ctx.fillStyle='#fff'; ctx.font='11px "Press Start 2P", monospace';
        ctx.fillText('点击开始按钮', W/2, H/2+30);
      }
    }
  }

  // ===== 输入 =====
  canvas.addEventListener('click', function(e){
    if(!state.running||state.over||busy) return;
    var rect=canvas.getBoundingClientRect();
    var x=(e.clientX-rect.left)*(W/rect.width), y=(e.clientY-rect.top)*(H/rect.height);
    var c=Math.floor(x/CELL), r=Math.floor(y/CELL);
    if(r<0||r>=ROWS||c<0||c>=COLS) return;
    if(!selected){ selected=[r,c]; SFX.select(); }
    else {
      if(selected[0]===r && selected[1]===c){ selected=null; SFX.back(); }
      else if(Math.abs(selected[0]-r)+Math.abs(selected[1]-c)===1){
        var s=selected; selected=null;
        trySwap(s[0],s[1],r,c);
      } else { selected=[r,c]; SFX.select(); }
    }
  });

  function loop(){ draw(); requestAnimationFrame(loop); }

  document.getElementById('startBtn').addEventListener('click', function(){
    init(); state.running=true;
    AOXSound.ensure(); AOXSound.startBGM('game'); SFX.select();
    toast('交换相邻方块消除！');
  });
  document.getElementById('shuffleBtn').addEventListener('click', function(){
    if(state.running&&!state.over){ SFX.rotate(); shuffle(); }
  });

  init();
  loop();
})();
</script>
</body>
</html>
