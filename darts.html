<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞镖 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>
  #gameCanvas { background:#1a1a1a; touch-action:none; cursor:crosshair; }
  .key { display:inline-block; background:var(--mc-panel); border:2px solid #000; box-shadow: inset -2px -2px 0 0 var(--mc-shadow), inset 2px 2px 0 0 var(--mc-highlight); padding:3px 8px; font-family:'Press Start 2P',monospace; font-size:10px; margin:0 2px; }
</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar">
  <a href="index.html" class="logo">⛏ AoXuan.World</a>
  <nav>
    <a href="index.html">首页</a>
    <a href="penguin.html">企鹅</a>
    <a href="dice.html">骰子</a>
    <a href="ladder.html">爬梯</a>
    <a href="jigsaw.html">拼图</a>
    <a href="goldmine.html">金矿</a>
    <a href="catch.html">接贝壳</a>
    <a href="darts.html">飞镖</a>
    <a href="castle.html">城堡</a>
  </nav>
</div>
<div class="container center">
  <h1 class="title-3d" style="font-size:34px;">🎯 飞镖</h1>
  <p class="subtitle">移动靶投掷，越准越高分！</p>
  <div class="hud" style="margin-top:20px;">
    <div class="hud-item"><span class="label">得分</span><span id="score">0</span></div>
    <div class="hud-item"><span class="label">轮次</span><span id="round">1</span>/10</div>
    <div class="hud-item"><span class="label">最高</span><span id="best">0</span></div>
  </div>
  <div class="game-stage" style="margin-top:14px;"><canvas id="gameCanvas" width="500" height="440"></canvas></div>
  <p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:16px;margin-top:12px;">
    <span class="key">鼠标</span> 瞄准 · <span class="key">点击</span> 投镖 · 靶心 100，外环递减
  </p>
  <div style="margin-top:14px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
    <button class="mc-btn green" id="startBtn">▶ 开始游戏</button>
    <a href="index.html" class="mc-btn">← 返回大厅</a>
  </div>
</div>
<div class="ground" style="position:fixed;bottom:0;left:0;right:0;z-index:0;"></div>
<script src="sound.js"></script>
<script src="mobile.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  var canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  var CX=W/2,CY=200; // 靶心
  var state,target,darts,particles,mouse,throwing,thrown;
  function init(){state={running:false,over:false,score:0,round:1,maxRound:10,best:getBest()};target={x:CX,y:CY,vx:1.5,amp:120,baseX:CX,t:0};darts=[];particles=[];mouse={x:CX,y:H-40};throwing=false;thrown=false;updateHud();}
  function getBest(){return parseInt(localStorage.getItem('darts_best')||'0',10);}
  function setBest(v){localStorage.setItem('darts_best',v);}
  function updateHud(){document.getElementById('score').textContent=state.score;document.getElementById('round').textContent=state.round;document.getElementById('best').textContent=state.best;}
  function throwDart(){
    if(thrown||state.over)return;thrown=true;SFX.shoot();
    darts.push({sx:mouse.x,sy:H-40,tx:mouse.x,ty:mouse.y,t:0,dur:20,hitX:0,hitY:0,landed:false,scored:false});
  }
  function update(){
    if(!state.running||state.over)return;
    target.t+=0.03;target.x=target.baseX+Math.sin(target.t)*target.amp;
    darts.forEach(function(d){
      if(!d.landed){d.t++;
        var p=d.t/d.dur;
        d.hitX=d.sx+(d.tx-d.sx)*p;d.hitY=d.sy+(d.ty-d.sy)*p - Math.sin(p*Math.PI)*80; // 抛物线
        if(d.t>=d.dur){d.landed=true;
          // 计算得分（距离靶心）
          var dist=Math.hypot(d.hitX-target.x,d.hitY-target.y);
          var score=0;
          if(dist<15)score=100;else if(dist<30)score=50;else if(dist<50)score=25;else if(dist<70)score=10;else score=0;
          d.scored=true;d.score=score;state.score+=score;
          if(score===100)SFX.gem();else if(score>0)SFX.hit();else SFX.error();
          for(var i=0;i<(score>0?10:4);i++){var a=Math.random()*Math.PI*2,s=1+Math.random()*3;particles.push({x:d.hitX,y:d.hitY,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:25,c:score>=100?'#ffd700':score>0?'#4dd0e1':'#888',size:2+Math.random()*3});}
          state.round++;updateHud();
          if(state.round>state.maxRound){if(state.score>state.best){setBest(state.score);state.best=state.score;}state.over=true;AOXSound.stopBGM();SFX.win();toast('🎉 总分 '+state.score);}
          else{setTimeout(function(){thrown=false;darts=darts.filter(function(x){return x.landed&&Date.now()-x.landTime<500;});},800);}
        }
      }
    });
    particles=particles.filter(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;return p.life>0;});
  }
  function draw(){
    ctx.fillStyle='#1a1a1a';ctx.fillRect(0,0,W,H);
    // 靶子（同心圆）
    var rings=[{r:80,c:'#2e7d32'},{r:65,c:'#fff'},{r:50,c:'#2e7d32'},{r:35,c:'#fff'},{r:20,c:'#e53935'},{r:8,c:'#ffd700'}];
    rings.forEach(function(r){ctx.fillStyle=r.c;ctx.beginPath();ctx.arc(target.x,target.y,r.r,0,7);ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.stroke();});
    // 十字线
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(target.x-90,target.y);ctx.lineTo(target.x+90,target.y);ctx.moveTo(target.x,target.y-90);ctx.lineTo(target.x,target.y+90);ctx.stroke();
    // 投手位置
    ctx.fillStyle='#8b5a2b';ctx.fillRect(mouse.x-12,H-30,24,20);ctx.fillStyle='#f0c8a0';ctx.fillRect(mouse.x-8,H-40,16,12);
    // 瞄准线
    if(!thrown){ctx.strokeStyle='rgba(255,215,0,0.3)';ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(mouse.x,H-40);ctx.lineTo(mouse.x,target.y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#ffd700';ctx.fillRect(mouse.x-3,target.y-3,6,6);}
    // 飞镖
    darts.forEach(function(d){var x=d.landed?d.hitX:d.hitX,y=d.landed?d.hitY:d.hitY;
      ctx.fillStyle='#7f7f7f';ctx.fillRect(x-1,y,2,12);
      ctx.fillStyle='#e53935';ctx.beginPath();ctx.moveTo(x,y+12);ctx.lineTo(x-4,y+18);ctx.lineTo(x+4,y+18);ctx.fill();
      ctx.fillStyle='#4dd0e1';ctx.fillRect(x-3,y-2,6,4);
      if(d.landed&&d.scored){ctx.fillStyle='#ffd700';ctx.font='12px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillText('+'+d.score,x,y-8);}
    });
    particles.forEach(function(p){ctx.globalAlpha=p.life/25;ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,p.size,p.size);ctx.globalAlpha=1;});
    if(!state.running){ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
      if(state.over){ctx.fillStyle='#4caf50';ctx.font='24px "Press Start 2P",monospace';ctx.fillText('结束！',W/2,H/2-25);ctx.fillStyle='#ffd700';ctx.font='14px "Press Start 2P",monospace';ctx.fillText('总分:'+state.score+' 最高:'+state.best,W/2,H/2+10);}
      else{ctx.fillStyle='#ffd700';ctx.font='22px "Press Start 2P",monospace';ctx.fillText('准备就绪',W/2,H/2-10);ctx.fillStyle='#fff';ctx.font='11px "Press Start 2P",monospace';ctx.fillText('点击开始',W/2,H/2+25);}}
  }
  function loop(){update();draw();requestAnimationFrame(loop);}
  canvas.addEventListener('mousemove',function(e){var r=canvas.getBoundingClientRect();mouse.x=(e.clientX-r.left)*(W/r.width);mouse.y=(e.clientY-r.top)*(H/r.height);});
  canvas.addEventListener('click',function(){throwDart();});
  canvas.addEventListener('touchmove',function(e){e.preventDefault();var r=canvas.getBoundingClientRect();mouse.x=(e.touches[0].clientX-r.left)*(W/r.width);mouse.y=(e.touches[0].clientY-r.top)*(H/r.height);},{passive:false});
  canvas.addEventListener('touchstart',function(e){e.preventDefault();var r=canvas.getBoundingClientRect();mouse.x=(e.touches[0].clientX-r.left)*(W/r.width);mouse.y=(e.touches[0].clientY-r.top)*(H/r.height);throwDart();},{passive:false});
  document.getElementById('startBtn').addEventListener('click',function(){init();state.running=true;AOXSound.ensure();AOXSound.startBGM('game');SFX.select();toast('10 轮投镖！');});
  init();loop();
})();
</script>
</body>
</html>
