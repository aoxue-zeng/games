<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>马里奥马戏 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>#gameCanvas{background:#4a148c;touch-action:none}.key{display:inline-block;background:var(--mc-panel);border:2px solid #000;box-shadow:inset -2px -2px 0 0 var(--mc-shadow),inset 2px 2px 0 0 var(--mc-highlight);padding:3px 8px;font-family:'Press Start 2P',monospace;font-size:10px;margin:0 2px}</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar"><a href="index.html" class="logo">⛏ AoXuan.World</a>
<nav><a href="index.html">首页</a><a href="m-poison.html">毒蘑菇</a><a href="m-parachute.html">降落伞</a><a href="m-coins.html">金币射击</a><a href="m-escape.html">城堡逃脱</a><a href="m-rocket.html">火箭马里奥</a><a href="m-1up.html">1-Up</a><a href="m-circus.html">马戏</a><a href="m-puzzle.html">拼图</a><a href="m-mega.html">超级蘑菇</a><a href="m-rhythm.html">节奏</a><a href="m-dig.html">挖洞</a><a href="m-brawl.html">大乱斗</a></nav></div>
<div class="container center">
<h1 class="title-3d" style="font-size:30px;">🎪 马里奥马戏</h1>
<p class="subtitle">顶住马里奥别让他掉地！</p>
<div class="hud" style="margin-top:18px"><div class="hud-item"><span class="label">次数</span><span id="hits">0</span></div><div class="hud-item"><span class="label">连击</span><span id="combo">0</span></div><div class="hud-item"><span class="label">最高</span><span id="best">0</span></div></div>
<div class="game-stage" style="margin-top:14px"><canvas id="gameCanvas" width="460" height="380"></canvas></div>
<p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:15px;margin-top:10px"><span class="key">←→</span>移动蹦床 · 接住马里奥弹起 · 落地失败</p>
<div style="margin-top:12px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><button class="mc-btn green" id="startBtn">▶ 开始</button><a href="index.html" class="mc-btn">← 返回</a></div>
</div><div class="ground" style="position:fixed;bottom:0;left:0;right:0;z-index:0"></div>
<script src="sound.js"></script><script src="mobile.js"></script><script src="shared.js"></script>
<script>
(function(){
var c=document.getElementById('gameCanvas'),x=c.getContext('2d'),W=c.width,H=c.height;
var s,mario,pad,pts,keys,tick;
var G=0.4;
function init(){s={running:false,over:false,hits:0,combo:0,best:getBest()};mario={x:W/2,y:50,vx:(Math.random()-0.5)*3,vy:0};pad={x:W/2,y:H-50,w:80};pts=[];keys={};tick=0;updateHud();}
function getBest(){return parseInt(localStorage.getItem('mcircus_best')||'0',10)}
function setBest(v){localStorage.setItem('mcircus_best',v)}
function updateHud(){document.getElementById('hits').textContent=s.hits;document.getElementById('combo').textContent=s.combo;document.getElementById('best').textContent=s.best;}
function update(){if(!s.running||s.over)return;tick++;
if(keys['arrowleft']||keys['a'])pad.x-=6;if(keys['arrowright']||keys['d'])pad.x+=6;pad.x=Math.max(pad.w/2,Math.min(W-pad.w/2,pad.x));
mario.vy+=G;mario.x+=mario.vx;mario.y+=mario.vy;
if(mario.x<10){mario.x=10;mario.vx*=-1}if(mario.x>W-10){mario.x=W-10;mario.vx*=-1}
if(mario.y>H-55&&mario.y<H-35&&Math.abs(mario.x-pad.x)<pad.w/2+10&&mario.vy>0){mario.y=H-55;mario.vy=-9-Math.random()*2;mario.vx+=(pad.x-mario.x)*0.05+(Math.random()-0.5)*2;s.hits++;s.combo++;SFX.jump();if(s.combo%5===0){SFX.coin();toast('连击'+s.combo+'!')}updateHud();}
if(mario.y>H){over();}
pts=pts.filter(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;return p.life>0});}
function over(){s.over=true;s.running=false;AOXSound.stopBGM();SFX.lose();if(s.hits>s.best){setBest(s.hits);s.best=s.hits}updateHud();}
function draw(){
x.fillStyle='#4a148c';x.fillRect(0,0,W,H);
// 帐篷顶
x.fillStyle='#e53935';for(var i=0;i<W;i+=40){x.beginPath();x.moveTo(i,0);x.lineTo(i+20,40);x.lineTo(i+40,0);x.fill()}
x.fillStyle='#ffd700';for(var j=0;j<W;j+=80){x.fillRect(j+20,0,40,20)}
// 地面
x.fillStyle='#3d8b2a';x.fillRect(0,H-20,W,20);
// 蹦床
x.fillStyle='#e53935';x.fillRect(pad.x-pad.w/2,pad.y,pad.w,10);x.fillStyle='#fff';x.fillRect(pad.x-pad.w/2,pad.y,pad.w,3);x.fillStyle='#7f7f7f';x.fillRect(pad.x-pad.w/2-4,pad.y+10,4,15);x.fillRect(pad.x+pad.w/2,pad.y+10,4,15);
// mario
var px=mario.x,py=mario.y;x.fillStyle='#e53935';x.fillRect(px-10,py-6,20,16);x.fillStyle='#ff9800';x.fillRect(px-8,py-14,16,10);x.fillStyle='#e53935';x.fillRect(px-8,py-14,16,3);x.fillStyle='#fff';x.fillRect(px-5,py-10,3,3);x.fillRect(px+2,py-10,3,3);x.fillStyle='#1565c0';x.fillRect(px-8,py+10,6,6);x.fillRect(px+2,py+10,6,6);
pts.forEach(function(p){x.globalAlpha=p.life/20;x.fillStyle=p.c;x.fillRect(p.x,p.y,p.size,p.size);x.globalAlpha=1});
if(!s.running){x.fillStyle='rgba(0,0,0,0.7)';x.fillRect(0,0,W,H);x.textAlign='center';if(s.over){x.fillStyle='#e53935';x.font='22px "Press Start 2P",monospace';x.fillText('掉地了！',W/2,H/2-20);x.fillStyle='#ffd700';x.font='13px "Press Start 2P",monospace';x.fillText('次数:'+s.hits+' 最高:'+s.best,W/2,H/2+10);x.fillStyle='#fff';x.font='10px "Press Start 2P",monospace';x.fillText('按R重玩',W/2,H/2+36);}else{x.fillStyle='#ffd700';x.font='20px "Press Start 2P",monospace';x.fillText('准备',W/2,H/2-8);x.font='10px "Press Start 2P",monospace';x.fillText('点击开始',W/2,H/2+20);}}}
function loop(){update();draw();requestAnimationFrame(loop);}
document.addEventListener('keydown',function(e){keys[e.key.toLowerCase()]=true;if(['arrowleft','arrowright'].indexOf(e.key.toLowerCase())>=0)e.preventDefault();if(e.key.toLowerCase()==='r'){init();s.running=true;AOXSound.ensure();}});
document.addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false});
c.addEventListener('touchmove',function(e){e.preventDefault();var r=c.getBoundingClientRect();pad.x=(e.touches[0].clientX-r.left)*(W/r.width)},{passive:false});
c.addEventListener('mousemove',function(e){var r=c.getBoundingClientRect();pad.x=(e.clientX-r.left)*(W/r.width)});
document.getElementById('startBtn').addEventListener('click',function(){init();s.running=true;AOXSound.ensure();AOXSound.startBGM('game');SFX.select();toast('别让他掉！')});
init();loop();
})();
</script></body></html>
