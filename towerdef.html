<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>塔防守护 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>#gameCanvas{background:#2a4a2a;touch-action:none;cursor:pointer}.key{display:inline-block;background:var(--mc-panel);border:2px solid #000;box-shadow:inset -2px -2px 0 0 var(--mc-shadow),inset 2px 2px 0 0 var(--mc-highlight);padding:3px 8px;font-family:'Press Start 2P',monospace;font-size:10px;margin:0 2px}.tower-btn{font-family:'Press Start 2P',monospace;font-size:9px;padding:8px;border:2px solid #000;cursor:pointer;color:#fff;margin:2px}.tower-btn.sel{box-shadow:0 0 8px #ffd700;border-color:#ffd700}</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar"><a href="index.html" class="logo">⛏ AoXuan.World</a>
<nav><a href="index.html">首页</a><a href="towerdef.html">塔防</a><a href="snake.html">贪吃蛇</a><a href="mario.html">冒险</a><a href="pvz.html">植物僵尸</a></nav></div>
<div class="container center">
<h1 class="title-3d" style="font-size:30px;">🏰 塔防守护</h1>
<p class="subtitle">建塔防守，8种怪物，不同血量！</p>
<div class="hud" style="margin-top:14px"><div class="hud-item"><span class="label">金币</span><span id="gold">100</span></div><div class="hud-item"><span class="label">城堡</span><span id="castleHp">20</span></div><div class="hud-item"><span class="label">波次</span><span id="wave">1</span></div><div class="hud-item"><span class="label">击杀</span><span id="kills">0</span></div></div>
<div style="margin-top:8px;display:flex;gap:4px;justify-content:center;flex-wrap:wrap">
<button class="tower-btn sel" id="t1" style="background:#4caf50">🏹弓箭50</button>
<button class="tower-btn" id="t2" style="background:#2196f3">⚡法师100</button>
<button class="tower-btn" id="t3" style="background:#ff9800">💣炮台150</button>
<button class="tower-btn" id="t4" style="background:#e53935">🔥烈焰200</button>
</div>
<div class="game-stage" style="margin-top:6px"><canvas id="gameCanvas" width="560" height="400"></canvas></div>
<p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:12px;margin-top:6px">选塔→点地图放置 · 8种怪物不同血量 · 别让敌人到城堡 · <span class="key">1-4</span>选塔</p>
<div style="margin-top:10px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><button class="mc-btn green" id="startBtn">▶ 开始</button><a href="index.html" class="mc-btn">← 返回</a></div>
</div><div class="ground" style="position:fixed;bottom:0;left:0;right:0;z-index:0"></div>
<script src="sound.js"></script><script src="mobile.js"></script><script src="shared.js"></script>
<script>
(function(){
var c=document.getElementById('gameCanvas'),x=c.getContext('2d'),W=c.width,H=c.height;
var PATH=[{x:0,y:200},{x:150,y:200},{x:150,y:80},{x:350,y:80},{x:350,y:320},{x:480,y:320},{x:480,y:200},{x:560,y:200}];
var s,towers,enemies,bullets,gold,castleHp,wave,kills,selTower,tick,spawnT,spawned,wavePlan,spawnIdx;
// 4种塔
var TT=[{cost:50,dmg:10,range:80,rate:40,col:'#4caf50',pc:'#fff',name:'弓箭'},{cost:100,dmg:25,range:100,rate:60,col:'#2196f3',pc:'#4dd0e1',name:'法师'},{cost:150,dmg:50,range:70,rate:90,col:'#ff9800',pc:'#e53935',name:'炮台'},{cost:200,dmg:15,range:60,rate:10,col:'#e53935',pc:'#ffeb3b',name:'烈焰',splash:true}];
// 8种怪物: name,hp,speed,color,r(大小),reward
var MT=[
{n:'史莱姆',hp:8,sp:1.0,col:'#4caf50',r:8,reward:5},
{n:'蝙蝠',hp:5,sp:1.8,col:'#9c27b0',r:7,reward:8},
{n:'骷髅',hp:15,sp:1.2,col:'#e0e0e0',r:9,reward:10},
{n:'蜘蛛',hp:10,sp:1.5,col:'#5d4037',r:8,reward:12},
{n:'石像鬼',hp:30,sp:0.8,col:'#78909c',r:11,reward:20},
{n:'恶魔',hp:50,sp:1.0,col:'#e53935',r:12,reward:30},
{n:'龙',hp:80,sp:0.7,col:'#ff5722',r:14,reward:50},
{n:'大Boss',hp:200,sp:0.5,col:'#000',r:18,reward:100,boss:true}
];
function init(){s={running:false,over:false};towers=[];enemies=[];bullets=[];gold=100;castleHp=20;wave=1;kills=0;selTower=0;tick=0;spawnT=0;spawned=0;spawnIdx=0;wavePlan=genWave(1);updateHud();updateSel();}
function genWave(w){
var plan=[];var n=4+w*2;
for(var i=0;i<n;i++){
var t;if(w<=2)t=0;else if(w<=4)t=Math.floor(Math.random()*3);else if(w<=6)t=Math.floor(Math.random()*5);else if(w<=8)t=Math.floor(Math.random()*7);else t=Math.floor(Math.random()*8);
plan.push(t);
}
// 每5波加个Boss
if(w%5===0)plan.push(7);
return plan;
}
function updateHud(){document.getElementById('gold').textContent=gold;document.getElementById('castleHp').textContent=castleHp;document.getElementById('wave').textContent=wave;document.getElementById('kills').textContent=kills;}
function updateSel(){document.querySelectorAll('.tower-btn').forEach(function(b,i){b.classList.toggle('sel',i===selTower);});}
function update(){if(!s.running||s.over)return;tick++;
// 生成敌人
if(spawnIdx<wavePlan.length){spawnT++;if(spawnT>=50){spawnT=0;var mt=MT[wavePlan[spawnIdx]];spawnIdx++;enemies.push({pathIdx:0,x:PATH[0].x,y:PATH[0].y,hp:mt.hp,maxhp:mt.hp,speed:mt.sp,col:mt.col,r:mt.r,reward:mt.reward,name:mt.n,boss:mt.boss||false,anim:Math.random()*6,burn:0});}}
else if(enemies.length===0){wave++;wavePlan=genWave(wave);spawnIdx=0;spawned=0;gold+=30+wave*5;SFX.levelUp();toast('波次'+wave+'！+'+(30+wave*5)+'金');updateHud();}
// 敌人移动
enemies.forEach(function(e){e.anim+=0.1;if(e.burn>0){e.burn--;e.hp-=0.5;if(e.hp<=0){gold+=e.reward;kills++;SFX.clear();updateHud();}}var target=PATH[e.pathIdx+1];if(!target)return;var dx=target.x-e.x,dy=target.y-e.y;var d=Math.hypot(dx,dy);if(d<e.speed){e.x=target.x;e.y=target.y;e.pathIdx++;if(e.pathIdx>=PATH.length-1){castleHp--;SFX.hurt();e.hp=0;if(castleHp<=0)gameOver();updateHud();}}else{e.x+=dx/d*e.speed;e.y+=dy/d*e.speed;}});
enemies=enemies.filter(function(e){return e.hp>0;});
// 塔射击
towers.forEach(function(t){t.cd--;if(t.cd<=0){var nearest=null,nd=999;enemies.forEach(function(e){var d=Math.hypot(e.x-t.x,e.y-t.y);if(d<t.range&&d<nd){nd=d;nearest=e;}});if(nearest){t.cd=t.rate;bullets.push({x:t.x,y:t.y,target:nearest,dmg:t.dmg,color:t.pc,life:60,splash:t.splash});SFX.shoot();}}});
// 子弹
bullets.forEach(function(b){if(!b.target||b.target.hp<=0){b.life=0;return;}var dx=b.target.x-b.x,dy=b.target.y-b.y;var d=Math.hypot(dx,dy);if(d<5){b.target.hp-=b.dmg;if(b.splash){enemies.forEach(function(e){if(e!==b.target&&Math.hypot(e.x-b.target.x,e.y-b.target.y)<30){e.hp-=b.dmg*0.5;e.burn=30;}});}if(b.target.hp<=0){gold+=b.target.reward;kills++;SFX.clear();updateHud();}b.life=0;}else{b.x+=dx/d*6;b.y+=dy/d*6;}b.life--;});
bullets=bullets.filter(function(b){return b.life>0;});}
function gameOver(){s.over=true;s.running=false;SFX.lose();}
function drawEnemy(e){var bob=Math.sin(e.anim)*2;var sx=e.x,sy=e.y+bob;
if(e.boss){
// Boss: 大黑球+红眼+角
x.fillStyle=e.col;x.beginPath();x.ellipse(sx,sy,e.r+4,e.r,0,0,7);x.fill();
x.fillStyle='#ffd700';x.beginPath();x.moveTo(sx-8,sy-e.r+2);x.lineTo(sx-12,sy-e.r-8);x.lineTo(sx-4,sy-e.r+2);x.fill();x.beginPath();x.moveTo(sx+8,sy-e.r+2);x.lineTo(sx+12,sy-e.r-8);x.lineTo(sx+4,sy-e.r+2);x.fill();
x.fillStyle='#ff1744';x.shadowColor='#ff1744';x.shadowBlur=6;x.beginPath();x.arc(sx-5,sy-2,3,0,7);x.fill();x.beginPath();x.arc(sx+5,sy-2,3,0,7);x.fill();x.shadowBlur=0;
x.fillStyle='#fff';x.font='8px "Press Start 2P",monospace';x.textAlign='center';x.fillText(e.name,sx,sy-e.r-14);
}else{
// 普通怪: 圆形+眼睛+不同颜色
x.fillStyle=e.burn>0?'#ff9800':e.col;x.beginPath();x.arc(sx,sy,e.r,0,7);x.fill();
x.fillStyle='rgba(255,255,255,0.3)';x.beginPath();x.arc(sx-2,sy-3,e.r*0.3,0,7);x.fill();
x.fillStyle='#fff';x.beginPath();x.arc(sx-3,sy-1,2.5,0,7);x.fill();x.beginPath();x.arc(sx+3,sy-1,2.5,0,7);x.fill();
x.fillStyle='#000';x.beginPath();x.arc(sx-3,sy,1,0,7);x.fill();x.beginPath();x.arc(sx+3,sy,1,0,7);x.fill();
}
// 血条
x.fillStyle='rgba(0,0,0,0.5)';x.fillRect(sx-e.r,sy-e.r-6,e.r*2,3);x.fillStyle=e.hp/e.maxhp>0.5?'#4caf50':(e.hp/e.maxhp>0.25?'#ffd700':'#e53935');x.fillRect(sx-e.r,sy-e.r-6,e.r*2*(e.hp/e.maxhp),3);
}
function draw(){
x.fillStyle='#2a4a2a';x.fillRect(0,0,W,H);
// 路径
x.strokeStyle='#5d3a1a';x.lineWidth=30;x.lineCap='round';x.beginPath();x.moveTo(PATH[0].x,PATH[0].y);PATH.forEach(function(p){x.lineTo(p.x,p.y);});x.stroke();x.strokeStyle='#8b5a2b';x.lineWidth=24;x.stroke();
// 城堡
x.fillStyle='#7f7f7f';x.fillRect(540,180,20,40);x.fillStyle='#555';for(var t=0;t<4;t++)x.fillRect(540,180+t*10,20,5);
x.fillStyle='#e53935';x.fillRect(544,174,12,6);
// 塔
towers.forEach(function(t){x.fillStyle=t.col;x.fillRect(t.x-12,t.y-12,24,24);x.fillStyle='rgba(255,255,255,0.3)';x.fillRect(t.x-12,t.y-12,24,3);x.fillStyle='#fff';x.fillRect(t.x-8,t.y-8,4,4);x.fillRect(t.x+4,t.y-8,4,4);x.strokeStyle='rgba(255,255,255,0.08)';x.beginPath();x.arc(t.x,t.y,t.range,0,7);x.stroke();});
// 敌人
enemies.forEach(drawEnemy);
// 子弹
bullets.forEach(function(b){x.fillStyle=b.color;x.shadowColor=b.color;x.shadowBlur=4;x.beginPath();x.arc(b.x,b.y,b.splash?5:3,0,7);x.fill();x.shadowBlur=0;});
// 结算
if(!s.running){x.fillStyle='rgba(0,0,0,0.7)';x.fillRect(0,0,W,H);x.textAlign='center';if(s.over){x.fillStyle='#e53935';x.font='22px "Press Start 2P",monospace';x.fillText('城堡被毁！',W/2,H/2-20);x.fillStyle='#fff';x.font='11px "Press Start 2P",monospace';x.fillText('波次:'+wave+' 击杀:'+kills,W/2,H/2+10);x.fillText('按R重玩',W/2,H/2+35);}else{x.fillStyle='#4caf50';x.font='20px "Press Start 2P",monospace';x.fillText('准备',W/2,H/2-8);x.font='10px "Press Start 2P",monospace';x.fillText('选塔点地图放置',W/2,H/2+20);}}}
function loop(){update();draw();requestAnimationFrame(loop);}
document.getElementById('t1').onclick=function(){selTower=0;updateSel();SFX.click();};
document.getElementById('t2').onclick=function(){selTower=1;updateSel();SFX.click();};
document.getElementById('t3').onclick=function(){selTower=2;updateSel();SFX.click();};
document.getElementById('t4').onclick=function(){selTower=3;updateSel();SFX.click();};
function place(mx,my){var tt=TT[selTower];if(gold<tt.cost){toast('金币不够！');return;}var onPath=false;PATH.forEach(function(p,i){if(i<PATH.length-1){var p2=PATH[i+1];var d=Math.hypot(mx-p.x,my-p.y)+Math.hypot(mx-p2.x,my-p2.y)-Math.hypot(p2.x-p.x,p2.y-p.y);if(Math.abs(d)<5)onPath=true;}});if(onPath){toast('不能放在路上！');return;}towers.forEach(function(t){if(Math.hypot(t.x-mx,t.y-my)<30){onPath=true;}});if(onPath){toast('太近了！');return;}towers.push({x:mx,y:my,range:tt.range,rate:tt.rate,cd:0,dmg:tt.dmg,col:tt.col,pc:tt.pc,splash:tt.splash});gold-=tt.cost;SFX.place();updateHud();}
c.addEventListener('click',function(e){if(!s.running||s.over)return;var r=c.getBoundingClientRect();place((e.clientX-r.left)*(W/r.width),(e.clientY-r.top)*(H/r.height));});
c.addEventListener('touchstart',function(e){e.preventDefault();if(!s.running||s.over)return;var r=c.getBoundingClientRect();place((e.touches[0].clientX-r.left)*(W/r.width),(e.touches[0].clientY-r.top)*(H/r.height));},{passive:false});
document.addEventListener('keydown',function(e){var k=e.key;if(k==='1'){selTower=0;updateSel();}if(k==='2'){selTower=1;updateSel();}if(k==='3'){selTower=2;updateSel();}if(k==='4'){selTower=3;updateSel();}if(k.toLowerCase()==='r'){init();s.running=true;}});
document.getElementById('startBtn').addEventListener('click',function(){init();s.running=true;AOXSound.ensure();AOXSound.startBGM('game');SFX.select();toast('建塔防守！');});
init();loop();
})();
</script>
</body></html>
