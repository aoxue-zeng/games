<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>马里奥节奏 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>#gameCanvas{background:#1a0a2a;touch-action:none}.lane-k{display:inline-block;background:var(--mc-panel);border:2px solid #000;box-shadow:inset -2px -2px 0 0 var(--mc-shadow),inset 2px 2px 0 0 var(--mc-highlight);padding:6px 14px;font-family:'Press Start 2P',monospace;font-size:14px;margin:0 6px;color:#1a1a1a}</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar"><a href="index.html" class="logo">⛏ AoXuan.World</a>
<nav><a href="index.html">首页</a><a href="m-poison.html">毒蘑菇</a><a href="m-parachute.html">降落伞</a><a href="m-coins.html">金币射击</a><a href="m-escape.html">城堡逃脱</a><a href="m-rocket.html">火箭马里奥</a><a href="m-1up.html">1-Up</a><a href="m-circus.html">马戏</a><a href="m-puzzle.html">拼图</a><a href="m-mega.html">超级蘑菇</a><a href="m-rhythm.html">节奏</a><a href="m-dig.html">挖洞</a><a href="m-brawl.html">大乱斗</a></nav></div>
<div class="container center">
<h1 class="title-3d" style="font-size:30px;color:#e53935">🎵 马里奥节奏</h1>
<p class="subtitle">蘑菇金币落到线时按键！</p>
<div class="hud" style="margin-top:18px"><div class="hud-item"><span class="label">得分</span><span id="score">0</span></div><div class="hud-item"><span class="label">连击</span><span id="combo">0</span></div><div class="hud-item"><span class="label">最高连击</span><span id="maxc">0</span></div></div>
<div class="game-stage" style="margin-top:14px"><canvas id="gameCanvas" width="420" height="460"></canvas></div>
<p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:15px;margin-top:10px"><span class="lane-k">D</span><span class="lane-k">F</span><span class="lane-k">J</span><span class="lane-k">K</span> 或点击轨道</p>
<div style="margin-top:12px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><button class="mc-btn green" id="startBtn">▶ 开始</button><a href="index.html" class="mc-btn">← 返回</a></div>
</div><div class="ground" style="position:fixed;bottom:0;left:0;right:0;z-index:0"></div>
<script src="sound.js"></script><script src="mobile.js"></script><script src="shared.js"></script>
<script>
(function(){
var c=document.getElementById('gameCanvas'),x=c.getContext('2d'),W=c.width,H=c.height;
var LANES=4,LW=W/LANES,JY=H-80,KEYS=['d','f','j','k'],ICONS=['🍄','💰','⭐','🐢'];
var s,notes,pts,flash,tick,st,sp;
function init(){s={running:false,over:false,score:0,combo:0,maxc:0};notes=[];pts=[];flash=[0,0,0,0];tick=0;st=0;sp=3;updateHud();}
function updateHud(){document.getElementById('score').textContent=s.score;document.getElementById('combo').textContent=s.combo;document.getElementById('maxc').textContent=s.maxc;}
function update(){if(!s.running||s.over)return;tick++;st++;if(st>=40){st=0;notes.push({lane:Math.floor(Math.random()*LANES),y:-20,hit:false});}
notes.forEach(function(n){n.y+=sp});notes=notes.filter(function(n){if(n.y>JY+40&&!n.hit){s.combo=0;SFX.error();updateHud();return false;}return true;});
flash=flash.map(function(f){return f>0?f-1:0});
if(s.score>0&&s.score%200===0)sp+=0.1;
pts=pts.filter(function(p){p.y+=p.vy;p.life--;return p.life>0});}
function hit(lane){if(!s.running||s.over)return;flash[lane]=10;SFX.move();var best=null,bd=999;for(var i=0;i<notes.length;i++){var n=notes[i];if(n.lane!==lane||n.hit)continue;var d=Math.abs(n.y-JY);if(d<bd){bd=d;best=n;}}if(best&&bd<50){best.hit=true;s.combo++;if(s.combo>s.maxc)s.maxc=s.combo;s.score+=bd<15?100:bd<30?70:40;var r=bd<15?'PERFECT!':bd<30?'GOOD':'OK';pts.push({x:lane*LW+LW/2,y:JY,text:r,life:30,color:bd<15?'#ffd700':'#4dd0e1'});if(bd<15)SFX.coin();else SFX.clear();notes=notes.filter(function(n){return !n.hit});updateHud();}else{s.combo=0;updateHud();}}
function draw(){
x.fillStyle='#1a0a2a';x.fillRect(0,0,W,H);
for(var l=0;l<LANES;l++){x.fillStyle=l%2?'rgba(255,255,255,0.06)':'rgba(255,255,255,0.03)';x.fillRect(l*LW,0,LW,H);if(flash[l]>0){x.globalAlpha=flash[l]/10*0.4;x.fillStyle=['#e53935','#ffd700','#4caf50','#2196f3'][l];x.fillRect(l*LW,0,LW,H);x.globalAlpha=1;}}
x.fillStyle='#ffd700';x.fillRect(0,JY,W,4);x.fillStyle='rgba(255,215,0,0.15)';x.fillRect(0,JY-30,W,64);
for(var k=0;k<LANES;k++){x.fillStyle=['#e53935','#ffd700','#4caf50','#2196f3'][k];x.fillRect(k*LW+10,H-50,LW-20,40);x.fillStyle='#fff';x.font='16px "Press Start 2P",monospace';x.textAlign='center';x.fillText(['D','F','J','K'][k],k*LW+LW/2,H-24);}
notes.forEach(function(n){x.font='24px serif';x.textAlign='center';x.fillText(ICONS[n.lane],n.lane*LW+LW/2,n.y+8)});
pts.forEach(function(p){x.globalAlpha=Math.min(1,p.life/20);x.fillStyle=p.color;x.font='14px "Press Start 2P",monospace';x.textAlign='center';x.fillText(p.text,p.x,p.y);x.globalAlpha=1});
if(s.combo>=5){x.fillStyle='#ffd700';x.font='18px "Press Start 2P",monospace';x.textAlign='left';x.fillText('COMBO '+s.combo,10,30);}
if(!s.running){x.fillStyle='rgba(0,0,0,0.7)';x.fillRect(0,0,W,H);x.textAlign='center';if(s.over){x.fillStyle='#e53935';x.font='22px "Press Start 2P",monospace';x.fillText('结束',W/2,H/2-20);x.fillStyle='#ffd700';x.font='13px "Press Start 2P",monospace';x.fillText('得分:'+s.score,W/2,H/2+10);}else{x.fillStyle='#e53935';x.font='20px "Press Start 2P",monospace';x.fillText('准备',W/2,H/2-8);x.font='10px "Press Start 2P",monospace';x.fillText('点击开始',W/2,H/2+20);}}}
function loop(){update();draw();requestAnimationFrame(loop);}
document.addEventListener('keydown',function(e){var k=e.key.toLowerCase();var i=KEYS.indexOf(k);if(i>=0){e.preventDefault();hit(i);}});
c.addEventListener('touchstart',function(e){e.preventDefault();var r=c.getBoundingClientRect();for(var i=0;i<e.touches.length;i++){var tx=(e.touches[i].clientX-r.left)*(W/r.width);hit(Math.floor(tx/LW));}},{passive:false});
c.addEventListener('mousedown',function(e){var r=c.getBoundingClientRect();hit(Math.floor(((e.clientX-r.left)*(W/r.width))/LW))});
document.getElementById('startBtn').addEventListener('click',function(){init();s.running=true;AOXSound.ensure();AOXSound.startBGM('game');SFX.select();toast('跟上节奏！')});
init();loop();
})();
</script></body></html>
