<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>接贝壳 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>
  #gameCanvas { background:linear-gradient(180deg,#87ceeb,#4a90d9); touch-action:none; }
  .key { display:inline-block; background:var(--mc-panel); border:2px solid #000; box-shadow: inset -2px -2px 0 0 var(--mc-shadow), inset 2px 2px 0 0 var(--mc-highlight); padding:3px 8px; font-family:'Press Start 2P',monospace; font-size:10px; margin:0 2px; }
</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar">
  <a href="index.html" class="logo">⛏ AoXuan.World</a>
  <nav>
    <a href="index.html">首页</a>
    <a href="penguin.html">企鹅</a>
    <a href="dice.html">骰子</a>
    <a href="ladder.html">爬梯</a>
    <a href="jigsaw.html">拼图</a>
    <a href="goldmine.html">金矿</a>
    <a href="catch.html">接贝壳</a>
    <a href="darts.html">飞镖</a>
    <a href="castle.html">城堡</a>
  </nav>
</div>
<div class="container center">
  <h1 class="title-3d" style="font-size:34px;">🐚 接贝壳</h1>
  <p class="subtitle">移动接物品，躲炸弹！</p>
  <div class="hud" style="margin-top:20px;">
    <div class="hud-item"><span class="label">得分</span><span id="score">0</span></div>
    <div class="hud-item"><span class="label">生命</span><span id="lives">♥♥♥</span></div>
    <div class="hud-item"><span class="label">连击</span><span id="combo">0</span></div>
    <div class="hud-item"><span class="label">最高</span><span id="best">0</span></div>
  </div>
  <div class="game-stage" style="margin-top:14px;"><canvas id="gameCanvas" width="500" height="440"></canvas></div>
  <p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:16px;margin-top:12px;">
    <span class="key">←→</span> 或鼠标/触摸 移动 · 接贝壳💎🍎，躲💣 · <span class="key">R</span> 重开
  </p>
  <div style="margin-top:14px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
    <button class="mc-btn green" id="startBtn">▶ 开始游戏</button>
    <a href="index.html" class="mc-btn">← 返回大厅</a>
  </div>
</div>
<div class="ground" style="position:fixed;bottom:0;left:0;right:0;z-index:0;"></div>
<script src="sound.js"></script>
<script src="mobile.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  var canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  var state,player,items,particles,keys,tick,speed;
  var TYPES=[{icon:'🐚',val:10,col:'#ff9800'},{icon:'💎',val:30,col:'#4dd0e1'},{icon:'🍎',val:15,col:'#e53935'},{icon:'⭐',val:50,col:'#ffd700'},{icon:'💣',val:-1,col:'#333'}];
  function init(){state={running:false,over:false,score:0,lives:3,combo:0,best:getBest()};player={x:W/2,y:H-40,w:50,h:30};items=[];particles=[];keys={};tick=0;speed=2.5;updateHud();}
  function getBest(){return parseInt(localStorage.getItem('catch_best')||'0',10);}
  function setBest(v){localStorage.setItem('catch_best',v);}
  function updateHud(){document.getElementById('score').textContent=state.score;document.getElementById('lives').textContent='♥'.repeat(Math.max(0,state.lives))||'—';document.getElementById('combo').textContent=state.combo;document.getElementById('best').textContent=state.best;}
  function spawn(){var t=TYPES[Math.floor(Math.random()*TYPES.length)];if(Math.random()<0.15)t=TYPES[4];items.push({x:30+Math.random()*(W-60),y:-20,type:t,vy:speed+Math.random()*1.5,r:16,rot:0,vrot:(Math.random()-0.5)*0.2});}
  function update(){
    if(!state.running||state.over)return;
    tick++;speed=2.5+state.score/300;
    if(keys['arrowleft']||keys['a'])player.x-=6;
    if(keys['arrowright']||keys['d'])player.x+=6;
    player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x));
    if(tick%Math.max(25,60-Math.floor(state.score/50))===0)spawn();
    items.forEach(function(it){it.y+=it.vy;it.rot+=it.vrot;});
    items=items.filter(function(it){
      if(it.y>H+30)return false;
      if(Math.abs(it.x-player.x)<player.w/2+it.r&&Math.abs(it.y-player.y)<player.h/2+it.r){
        if(it.type.icon==='💣'){state.lives--;state.combo=0;SFX.hurt();explode(it.x,it.y,'#e53935');if(state.lives<=0)gameOver();}
        else{state.combo++;var pts=it.type.val*(1+Math.floor(state.combo/5));state.score+=pts;SFX.coin();explode(it.x,it.y,it.type.col);}
        return false;
      }
      return true;
    });
    particles=particles.filter(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;return p.life>0;});
    updateHud();
  }
  function explode(x,y,c){for(var i=0;i<8;i++){var a=Math.random()*Math.PI*2,s=1+Math.random()*3;particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:20,c:c,size:2+Math.random()*3});}}
  function gameOver(){state.over=true;state.running=false;AOXSound.stopBGM();SFX.lose();if(state.score>state.best){setBest(state.score);state.best=state.score;}updateHud();}
  function draw(){
    ctx.fillStyle='#87ceeb';ctx.fillRect(0,0,W,H);
    // 云
    ctx.fillStyle='rgba(255,255,255,0.7)';
    for(var i=0;i<3;i++){var cx=((i*200-tick*0.5)%(W+100)+W+100)%(W+100)-50;ctx.fillRect(cx,40+i*20,70,18);ctx.fillRect(cx+15,cx?30:30,50,14);}
    // 海
    ctx.fillStyle='#1565c0';ctx.fillRect(0,H-60,W,60);
    ctx.fillStyle='rgba(255,255,255,0.2)';for(var w=0;w<W;w+=20){ctx.fillRect(w+((tick*2)%20),H-58,12,3);}
    // 玩家（船）
    var px=player.x,py=player.y;
    ctx.fillStyle='#8b5a2b';ctx.fillRect(px-25,py-5,50,15); // 船身
    ctx.fillStyle='#6b4220';ctx.fillRect(px-25,py+10,50,4);
    ctx.fillStyle='#fff';ctx.fillRect(px-4,py-25,8,20); // 桅杆帆
    ctx.fillStyle='#e53935';ctx.fillRect(px-4,py-25,8,8);
    ctx.fillStyle='#4a2c12';ctx.fillRect(px-1,py-5,2,20);
    // 物品
    items.forEach(function(it){ctx.save();ctx.translate(it.x,it.y);ctx.rotate(it.rot);
      if(it.type.icon==='💣'){ctx.fillStyle='#333';ctx.beginPath();ctx.arc(0,0,12,0,7);ctx.fill();ctx.fillStyle='#ff9800';ctx.fillRect(-2,-18,4,6);ctx.fillStyle='#ffeb3b';ctx.fillRect(-1,-20,2,3);}
      else if(it.type.icon==='💎'){ctx.fillStyle=it.type.col;ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(10,0);ctx.lineTo(0,12);ctx.lineTo(-10,0);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fillRect(-3,-6,4,4);}
      else if(it.type.icon==='⭐'){ctx.fillStyle=it.type.col;ctx.beginPath();for(var i=0;i<5;i++){var a=i/5*Math.PI*2-Math.PI/2;ctx.lineTo(Math.cos(a)*12,Math.sin(a)*12);a+=Math.PI/5;ctx.lineTo(Math.cos(a)*5,Math.sin(a)*5);}ctx.fill();}
      else if(it.type.icon==='🍎'){ctx.fillStyle=it.type.col;ctx.beginPath();ctx.arc(0,0,12,0,7);ctx.fill();ctx.fillStyle='#3d8b2a';ctx.fillRect(-1,-14,3,5);}
      else{ctx.fillStyle=it.type.col;ctx.beginPath();ctx.arc(0,0,12,0,Math.PI);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,12,Math.PI,7);ctx.fill();}
      ctx.restore();});
    particles.forEach(function(p){ctx.globalAlpha=p.life/20;ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,p.size,p.size);ctx.globalAlpha=1;});
    if(!state.running){ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
      if(state.over){ctx.fillStyle='#e53935';ctx.font='26px "Press Start 2P",monospace';ctx.fillText('游戏结束',W/2,H/2-25);ctx.fillStyle='#ffd700';ctx.font='14px "Press Start 2P",monospace';ctx.fillText('得分:'+state.score+' 最高:'+state.best,W/2,H/2+10);ctx.fillStyle='#fff';ctx.font='11px "Press Start 2P",monospace';ctx.fillText('按 R 重玩',W/2,H/2+40);}
      else{ctx.fillStyle='#1565c0';ctx.font='22px "Press Start 2P",monospace';ctx.fillText('准备就绪',W/2,H/2-10);ctx.fillStyle='#fff';ctx.font='11px "Press Start 2P",monospace';ctx.fillText('点击开始',W/2,H/2+25);}}
  }
  function loop(){update();draw();requestAnimationFrame(loop);}
  document.addEventListener('keydown',function(e){var k=e.key.toLowerCase();keys[k]=true;if(['arrowleft','arrowright'].indexOf(k)>=0)e.preventDefault();if(k==='r'){init();state.running=true;AOXSound.ensure();}});
  document.addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false;});
  canvas.addEventListener('mousemove',function(e){var r=canvas.getBoundingClientRect();player.x=(e.clientX-r.left)*(W/r.width);});
  canvas.addEventListener('touchmove',function(e){e.preventDefault();var r=canvas.getBoundingClientRect();player.x=(e.touches[0].clientX-r.left)*(W/r.width);},{passive:false});
  document.getElementById('startBtn').addEventListener('click',function(){init();state.running=true;AOXSound.ensure();AOXSound.startBGM('game');SFX.select();toast('接物品躲炸弹！');});
  init();loop();
})();
</script>
</body>
</html>
