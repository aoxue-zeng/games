<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企鹅滑行 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>
  #gameCanvas { background:#87ceeb; touch-action:none; }
  .key { display:inline-block; background:var(--mc-panel); border:2px solid #000; box-shadow: inset -2px -2px 0 0 var(--mc-shadow), inset 2px 2px 0 0 var(--mc-highlight); padding:3px 8px; font-family:'Press Start 2P',monospace; font-size:10px; margin:0 2px; }
</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar">
  <a href="index.html" class="logo">⛏ AoXuan.World</a>
  <nav>
    <a href="index.html">首页</a>
    <a href="penguin.html">企鹅</a>
    <a href="dice.html">骰子</a>
    <a href="ladder.html">爬梯</a>
    <a href="jigsaw.html">拼图</a>
    <a href="goldmine.html">金矿</a>
    <a href="catch.html">接贝壳</a>
    <a href="darts.html">飞镖</a>
    <a href="castle.html">城堡</a>
  </nav>
</div>
<div class="container center">
  <h1 class="title-3d" style="font-size:34px;">🐧 企鹅滑行</h1>
  <p class="subtitle">滑雪躲避石头，收集鱼！</p>
  <div class="hud" style="margin-top:20px;">
    <div class="hud-item"><span class="label">得分</span><span id="score">0</span></div>
    <div class="hud-item"><span class="label">鱼</span><span id="fish">0</span>🐟</div>
    <div class="hud-item"><span class="label">生命</span><span id="lives">♥♥♥</span></div>
    <div class="hud-item"><span class="label">距离</span><span id="dist">0</span>m</div>
  </div>
  <div class="game-stage" style="margin-top:14px;"><canvas id="gameCanvas" width="560" height="420"></canvas></div>
  <p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:16px;margin-top:12px;">
    <span class="key">←→</span> 或 <span class="key">A D</span> 左右移动 · 躲石头吃鱼 · <span class="key">R</span> 重开
  </p>
  <div style="margin-top:14px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
    <button class="mc-btn green" id="startBtn">▶ 开始游戏</button>
    <a href="index.html" class="mc-btn">← 返回大厅</a>
  </div>
</div>
<div class="ground" style="position:fixed;bottom:0;left:0;right:0;z-index:0;"></div>
<script src="sound.js"></script>
<script src="mobile.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  var canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  var state,player,obstacles,fish,particles,keys,tick,scenery,speed;
  function init(){
    state={running:false,over:false,score:0,fishCount:0,lives:3,dist:0};
    player={x:W/2,y:H-80,w:32,h:36,laneTarget:W/2};obstacles=[];fish=[];particles=[];keys={};tick=0;speed=4;
    scenery=[];
    for(var i=0;i<20;i++)scenery.push({x:Math.random()*W,y:Math.random()*H,t:Math.random()*6});
  }
  function updateHud(){document.getElementById('score').textContent=state.score;document.getElementById('fish').textContent=state.fishCount;document.getElementById('lives').textContent='♥'.repeat(Math.max(0,state.lives))||'—';document.getElementById('dist').textContent=Math.floor(state.dist);}
  function spawnObstacle(){obstacles.push({x:60+Math.random()*(W-120),y:-40,w:36,h:30,type:'rock'});}
  function spawnFish(){fish.push({x:60+Math.random()*(W-120),y:-30,r:12,t:Math.random()*6});}
  function update(){
    if(!state.running||state.over)return;
    tick++;state.dist+=speed/10;
    // 玩家移动
    if(keys['arrowleft']||keys['a'])player.x-=5;
    if(keys['arrowright']||keys['d'])player.x+=5;
    player.x=Math.max(30,Math.min(W-30,player.x));
    // 生成
    if(tick%50===0)spawnObstacle();
    if(tick%80===0&&Math.random()<0.7)spawnFish();
    // 难度
    speed=4+state.dist/200;
    // 障碍移动
    obstacles.forEach(function(o){o.y+=speed;});
    obstacles=obstacles.filter(function(o){
      if(o.y>H+40)return false;
      // 碰撞
      if(Math.abs(o.x-player.x)<24&&Math.abs(o.y-player.y)<26){state.lives--;SFX.hurt();explode(player.x,player.y,'#888');return false;}
      return true;
    });
    // 鱼移动
    fish.forEach(function(f){f.y+=speed;f.t+=0.15;});
    fish=fish.filter(function(f){
      if(f.y>H+30)return false;
      if(Math.abs(f.x-player.x)<24&&Math.abs(f.y-player.y)<26){state.fishCount++;state.score+=10;SFX.coin();explode(f.x,f.y,'#ffd700');return false;}
      return true;
    });
    // 距离分
    if(tick%10===0)state.score+=1;
    // 粒子
    particles=particles.filter(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;return p.life>0;});
    scenery.forEach(function(s){s.y+=speed*0.5;if(s.y>H){s.y=-10;s.x=Math.random()*W;}});
    updateHud();
    if(state.lives<=0)gameOver();
  }
  function explode(x,y,c){for(var i=0;i<8;i++){var a=Math.random()*Math.PI*2,s=1+Math.random()*3;particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:20,c:c,size:2+Math.random()*3});}}
  function gameOver(){state.over=true;state.running=false;AOXSound.stopBGM();SFX.lose();}
  function draw(){
    // 雪坡
    ctx.fillStyle='#e0f7fa';ctx.fillRect(0,0,W,H);
    // 雪道条纹
    ctx.fillStyle='rgba(255,255,255,0.5)';
    for(var i=0;i<W;i+=40){var ox=(i+tick*2)%W;ctx.fillRect(ox,0,20,H);}
    // 雪花
    scenery.forEach(function(s){ctx.fillStyle='rgba(255,255,255,0.8)';ctx.fillRect(s.x,(s.y+tick*1)%H,3,3);});
    // 企鹅
    var px=player.x,py=player.y;
    ctx.fillStyle='#1a1a1a';ctx.fillRect(px-12,py-16,24,30); // 身体
    ctx.fillStyle='#fff';ctx.fillRect(px-8,py-8,16,18); // 肚子
    ctx.fillStyle='#1a1a1a';ctx.fillRect(px-10,py+14,8,6);ctx.fillRect(px+2,py+14,8,6); // 脚
    ctx.fillStyle='#ff9800';ctx.fillRect(px-3,py-18,6,4); // 嘴
    ctx.fillStyle='#fff';ctx.fillRect(px-7,py-14,4,4);ctx.fillRect(px+3,py-14,4,4); // 眼
    ctx.fillStyle='#000';ctx.fillRect(px-6,py-13,2,2);ctx.fillRect(px+4,py-13,2,2);
    // 障碍（石头）
    obstacles.forEach(function(o){ctx.fillStyle='#7f7f7f';ctx.fillRect(o.x-o.w/2,o.y,o.w,o.h);ctx.fillStyle='#555';ctx.fillRect(o.x-o.w/2+4,o.y+4,o.w-8,o.h-8);ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(o.x-o.w/2,o.y,o.w,4);});
    // 鱼
    fish.forEach(function(f){var bob=Math.sin(f.t)*2;ctx.fillStyle='#2196f3';ctx.fillRect(f.x-8,f.y-4+bob,16,8);ctx.beginPath();ctx.moveTo(f.x-8,f.y+bob);ctx.lineTo(f.x-14,f.y-4+bob);ctx.lineTo(f.x-14,f.y+4+bob);ctx.fill();ctx.fillStyle='#000';ctx.fillRect(f.x+4,f.y-2+bob,2,2);});
    // 粒子
    particles.forEach(function(p){ctx.globalAlpha=p.life/20;ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,p.size,p.size);ctx.globalAlpha=1;});
    if(!state.running){
      ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
      if(state.over){ctx.fillStyle='#e53935';ctx.font='26px "Press Start 2P",monospace';ctx.fillText('摔倒了！',W/2,H/2-30);ctx.fillStyle='#ffd700';ctx.font='14px "Press Start 2P",monospace';ctx.fillText('得分:'+state.score+' 鱼:'+state.fishCount,W/2,H/2+5);ctx.fillStyle='#fff';ctx.font='11px "Press Start 2P",monospace';ctx.fillText('按 R 重玩',W/2,H/2+35);}
      else{ctx.fillStyle='#0d47a1';ctx.font='22px "Press Start 2P",monospace';ctx.fillText('准备就绪',W/2,H/2-10);ctx.fillStyle='#fff';ctx.font='11px "Press Start 2P",monospace';ctx.fillText('点击开始按钮',W/2,H/2+25);}
    }
  }
  function loop(){update();draw();requestAnimationFrame(loop);}
  document.addEventListener('keydown',function(e){var k=e.key.toLowerCase();keys[k]=true;if(['arrowleft','arrowright'].indexOf(k)>=0)e.preventDefault();if(k==='r'){init();state.running=true;AOXSound.ensure();}});
  document.addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false;});
  canvas.addEventListener('touchmove',function(e){e.preventDefault();var r=canvas.getBoundingClientRect();player.x=(e.touches[0].clientX-r.left)*(W/r.width);},{passive:false});
  canvas.addEventListener('touchstart',function(e){e.preventDefault();var r=canvas.getBoundingClientRect();player.x=(e.touches[0].clientX-r.left)*(W/r.width);},{passive:false});
  canvas.addEventListener('mousemove',function(e){var r=canvas.getBoundingClientRect();player.x=(e.clientX-r.left)*(W/r.width);});
  document.getElementById('startBtn').addEventListener('click',function(){init();state.running=true;AOXSound.ensure();AOXSound.startBGM('game');SFX.select();toast('滑雪咯！');});
  init();loop();
})();
</script>
</body>
</html>
