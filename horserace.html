<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛马竞猜 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>
  #gameCanvas { background:#4a8b3b; touch-action:none; }
  .horse-btn { font-family:'Press Start 2P',monospace;font-size:12px;padding:12px;border:3px solid #000;cursor:pointer;color:#fff;text-shadow:1px 1px 0 #000;box-shadow: inset 2px 2px 0 0 rgba(255,255,255,0.2), inset -2px -2px 0 0 rgba(0,0,0,0.3);margin:4px;user-select:none }
  .horse-btn.sel{box-shadow: inset 2px 2px 0 0 rgba(255,255,255,0.4), 0 0 12px #ffd700;border-color:#ffd700}
  .bet-in{font-family:'Press Start 2P',monospace;font-size:14px;width:70px;text-align:center;background:#0d1b2a;color:#ffd700;border:2px solid var(--mc-gold);padding:6px}
</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar">
  <a href="index.html" class="logo">⛏ AoXuan.World</a>
  <nav>
    <a href="index.html">首页</a>
    <a href="rocket.html">火箭</a>
    <a href="pipes.html">水管</a>
    <a href="burger.html">汉堡</a>
    <a href="balance.html">天平</a>
    <a href="thermometer.html">温度计</a>
    <a href="slots.html">老虎机</a>
    <a href="24points.html">24点</a>
    <a href="gomoku.html">五子棋</a>
    <a href="horserace.html">赛马</a>
  </nav>
</div>
<div class="container center">
  <h1 class="title-3d" style="font-size:34px;">🐎 赛马竞猜</h1>
  <p class="subtitle">押注赛马，猜冠军赢金币！</p>
  <div class="hud" style="margin-top:18px;">
    <div class="hud-item"><span class="label">金币</span><span id="coins">1000</span></div>
    <div class="hud-item"><span class="label">胜场</span><span id="wins">0</span></div>
    <div class="hud-item"><span class="label">场次</span><span id="races">0</span></div>
  </div>
  <div class="game-stage" style="margin-top:14px;"><canvas id="gameCanvas" width="520" height="300"></canvas></div>
  <div style="margin-top:14px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap" id="horseBtns"></div>
  <div style="margin-top:10px;display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap">
    <span style="font-family:'Press Start 2P',monospace;font-size:11px;color:#4dd0e1">押注</span>
    <input type="number" class="bet-in" id="bet" value="100" min="10" step="10">
  </div>
  <div style="margin-top:14px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
    <button class="mc-btn green" id="raceBtn">🏁 开赛</button>
    <button class="mc-btn gold" id="resetBtn">🔄 重置</button>
    <a href="index.html" class="mc-btn">← 返回大厅</a>
  </div>
  <p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:14px;margin-top:10px;">选马→设押注→开赛。押中冠军 x3，亚军 x1.5</p>
</div>
<div class="ground" style="position:fixed;bottom:0;left:0;right:0;z-index:0;"></div>
<script src="sound.js"></script>
<script src="mobile.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  var canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  var HORSES=[{name:'红马',col:'#e53935'},{name:'蓝马',col:'#2196f3'},{name:'绿马',col:'#4caf50'},{name:'黄马',col:'#ffd700'},{name:'紫马',col:'#9c27b0'}];
  var state,horses,selected,finished,finishOrder,trackLen;
  function init(){
    state={coins:1000,wins:0,races:0,racing:false,best:0};load();
    selected=0;resetRace();buildBtns();updateHud();
  }
  function load(){try{var s=JSON.parse(localStorage.getItem('horserace'));if(s){state.coins=s.coins;state.wins=s.wins;state.races=s.races;}}catch(e){}}
  function save(){localStorage.setItem('horserace',JSON.stringify({coins:state.coins,wins:state.wins,races:state.races}));}
  function updateHud(){document.getElementById('coins').textContent=state.coins;document.getElementById('wins').textContent=state.wins;document.getElementById('races').textContent=state.races;}
  function resetRace(){horses=HORSES.map(function(h,i){return{x:40,y:40+i*50,speed:0.8+Math.random()*0.8,col:h.col,name:h.name,done:false,anim:0};});finished=0;finishOrder=[];trackLen=W-80;}
  function buildBtns(){var g=document.getElementById('horseBtns');g.innerHTML='';HORSES.forEach(function(h,i){var b=document.createElement('button');b.className='horse-btn';b.style.background=h.col;b.textContent=h.name;b.dataset.idx=i;if(i===selected)b.classList.add('sel');b.addEventListener('click',function(){if(state.racing)return;selected=i;buildBtns();SFX.click();});g.appendChild(b);});}
  function race(){
    if(state.racing)return;
    var bet=parseInt(document.getElementById('bet').value,10)||0;
    if(bet<10){toast('最少押 10');return;}
    if(bet>state.coins){toast('金币不够！');return;}
    AOXSound.ensure();state.racing=true;state.coins-=bet;state.races++;SFX.select();
    resetRace();updateHud();loop();
  }
  function loop(){
    if(!state.racing)return;
    var allDone=horses.every(function(h){return h.done;});
    horses.forEach(function(h){if(!h.done){h.x+=h.speed*(0.8+Math.random()*0.4);h.anim+=0.3;if(h.x>=trackLen){h.x=trackLen;h.done=true;finished++;finishOrder.push(h);SFX.coin();if(finished===1){/*冠军*/}}}});
    draw();
    if(allDone){finishRace();return;}
    requestAnimationFrame(loop);
  }
  function finishRace(){
    state.racing=false;var bet=parseInt(document.getElementById('bet').value,10)||0;
    var champ=finishOrder[0],runner=finishOrder[1];
    var win=0,msg='';
    if(HORSES.indexOf({name:champ.name,col:champ.col})===selected||champ.col===HORSES[selected].col){win=bet*3;msg='🎉 '+champ.name+'冠军！x3 ';state.wins++;}
    else if(runner&&runner.col===HORSES[selected].col){win=Math.floor(bet*1.5);msg='🥈 '+runner.name+'亚军 x1.5';}
    else{msg='💔 '+champ.name+'赢了，你没中';}
    state.coins+=win;save();updateHud();
    toast(msg+(win>0?'+'+win:''));
    SFX.win();
  }
  function draw(){
    ctx.fillStyle='#4a8b3b';ctx.fillRect(0,0,W,H);
    // 跑道线
    horses.forEach(function(h,i){ctx.fillStyle=i%2===0?'#5fa04b':'#4a8b3b';ctx.fillRect(0,30+i*50,W,45);});
    // 起点/终点
    ctx.fillStyle='#fff';ctx.fillRect(30,20,3,H-40);ctx.fillRect(W-40,20,3,H-40);
    ctx.fillStyle='#000';ctx.fillRect(W-38,20,8,H-40);
    for(var c=0;c<H-40;c+=20){ctx.fillStyle=c%40===0?'#fff':'#000';ctx.fillRect(W-38,20+c,8,10);}
    // 马
    horses.forEach(function(h,i){
      var x=h.x,y=h.y+Math.sin(h.anim)*3;
      // 身体
      ctx.fillStyle=h.col;ctx.fillRect(x-12,y-8,24,16);
      // 头
      ctx.fillRect(x+8,y-12,10,12);
      // 腿
      var lo=Math.sin(h.anim)*4;ctx.fillStyle=h.col;
      ctx.fillRect(x-8,y+8,4,6+lo);ctx.fillRect(x+4,y+8,4,6-lo);
      // 尾
      ctx.fillRect(x-15,y-4,4,8);
      // 眼
      ctx.fillStyle='#fff';ctx.fillRect(x+14,y-9,3,3);ctx.fillStyle='#000';ctx.fillRect(x+15,y-8,1,1);
      // 编号
      ctx.fillStyle='#fff';ctx.font='10px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillText(i+1,x,y+2);
    });
    // 排名
    if(finished>0){
      finishOrder.forEach(function(h,i){ctx.fillStyle='#ffd700';ctx.font='12px "Press Start 2P",monospace';ctx.textAlign='left';ctx.fillText((i+1)+'. '+h.name,8,18+i*16);});
    }
    if(!state.racing&&!finished){
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffd700';ctx.font='18px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillText('选马押注后开赛',W/2,H/2);
    }
  }
  document.getElementById('raceBtn').addEventListener('click',race);
  document.getElementById('resetBtn').addEventListener('click',function(){state.coins=1000;state.wins=0;state.races=0;save();updateHud();SFX.click();toast('重置');});
  init();draw();
})();
</script>
</body>
</html>
