<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>算术挑战 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>
  .math-box {
    width:420px;max-width:90vw;margin:20px auto;padding:30px;
    background:var(--mc-night);border:4px solid var(--mc-black);
    box-shadow: inset 4px 4px 0 0 #2a3f5f, inset -4px -4px 0 0 #000, 8px 8px 0 0 rgba(0,0,0,0.4);
    text-align:center;
  }
  .math-q { font-family:'Press Start 2P',monospace;font-size:40px;color:#ffd700;text-shadow:3px 3px 0 #000;margin:20px 0; }
  .math-input {
    font-family:'Press Start 2P',monospace;font-size:24px;text-align:center;
    background:#0d1b2a;color:#4dd0e1;border:3px solid var(--mc-gold);
    box-shadow:inset 3px 3px 0 0 #000;padding:14px;width:200px;letter-spacing:2px;
  }
  .math-input:focus{outline:none}
  .time-bar { width:100%;height:14px;background:#0d1b2a;border:2px solid #000;margin-top:16px;overflow:hidden }
  .time-fill { height:100%;background:linear-gradient(90deg,#4caf50,#ffd700,#e53935);transition:width 0.1s linear }
  .num-pad { display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px;max-width:280px;margin-left:auto;margin-right:auto }
  .num-btn { font-family:'Press Start 2P',monospace;font-size:18px;padding:16px;background:var(--mc-panel);border:3px solid #000;box-shadow:inset 2px 2px 0 0 var(--mc-highlight),inset -2px -2px 0 0 var(--mc-shadow);cursor:pointer;color:#1a1a1a;user-select:none }
  .num-btn:active{transform:translate(1px,1px)}
  .num-btn.ok{background:var(--mc-grass);color:#fff;grid-column:span 2}
  .num-btn.clr{background:var(--mc-redstone);color:#fff}
</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar">
  <a href="index.html" class="logo">⛏ AoXuan.World</a>
  <nav>
    <a href="index.html">首页</a>
    <a href="breakout.html">打砖块</a>
    <a href="invaders.html">侵略者</a>
    <a href="flappy.html">像素鸟</a>
    <a href="reaction.html">反应</a>
    <a href="math.html">算术</a>
    <a href="slide.html">华容道</a>
    <a href="rhythm.html">节奏</a>
    <a href="wordsearch.html">找单词</a>
    <a href="spotdiff.html">找不同</a>
  </nav>
</div>
<div class="container center">
  <h1 class="title-3d" style="font-size:34px;">🧮 算术挑战</h1>
  <p class="subtitle">限时心算，越快越准越高分！</p>
  <div class="hud" style="margin-top:20px;">
    <div class="hud-item"><span class="label">得分</span><span id="score">0</span></div>
    <div class="hud-item"><span class="label">连对</span><span id="streak">0</span></div>
    <div class="hud-item"><span class="label">关卡</span><span id="level">1</span></div>
    <div class="hud-item"><span class="label">最高</span><span id="best">0</span></div>
  </div>
  <div class="math-box">
    <div class="math-q" id="question">点击开始</div>
    <input type="text" id="answer" class="math-input" inputmode="numeric" placeholder="?" autocomplete="off">
    <div class="time-bar"><div class="time-fill" id="timeFill" style="width:100%"></div></div>
    <div class="num-pad" id="numpad">
      <button class="num-btn" data-n="1">1</button><button class="num-btn" data-n="2">2</button><button class="num-btn" data-n="3">3</button>
      <button class="num-btn" data-n="4">4</button><button class="num-btn" data-n="5">5</button><button class="num-btn" data-n="6">6</button>
      <button class="num-btn" data-n="7">7</button><button class="num-btn" data-n="8">8</button><button class="num-btn" data-n="9">9</button>
      <button class="num-btn clr" data-n="c">C</button><button class="num-btn" data-n="0">0</button>
      <button class="num-btn ok" data-n="ok">✓</button>
    </div>
  </div>
  <div style="margin-top:14px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
    <button class="mc-btn green" id="startBtn">▶ 开始游戏</button>
    <a href="index.html" class="mc-btn">← 返回大厅</a>
  </div>
</div>
<div class="ground" style="position:fixed;bottom:0;left:0;right:0;z-index:0;"></div>
<script src="sound.js"></script>
<script src="mobile.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  var qEl=document.getElementById('question'),aEl=document.getElementById('answer'),tf=document.getElementById('timeFill');
  var state,curAnswer,timeLeft,timer;
  function init(){
    state={running:false,over:false,score:0,streak:0,level:1,best:getBest(),timeMax:10};
    aEl.value='';qEl.textContent='点击开始';tf.style.width='100%';
    clearInterval(timer);updateHud();
  }
  function getBest(){return parseInt(localStorage.getItem('math_best')||'0',10);}
  function setBest(v){localStorage.setItem('math_best',v);}
  function updateHud(){document.getElementById('score').textContent=state.score;document.getElementById('streak').textContent=state.streak;document.getElementById('level').textContent=state.level;document.getElementById('best').textContent=state.best;}
  function genQ(){
    var lv=state.level;var a,b,op,ans;
    var ops=lv<3?['+','-']:lv<6?['+','-','×']:['+','-','×','÷'];
    op=ops[Math.floor(Math.random()*ops.length)];
    if(op==='+'){a=10+Math.floor(Math.random()*lv*15);b=10+Math.floor(Math.random()*lv*15);ans=a+b;}
    else if(op==='-'){a=20+Math.floor(Math.random()*lv*20);b=5+Math.floor(Math.random()*(a-5));ans=a-b;}
    else if(op==='×'){a=2+Math.floor(Math.random()*(lv+4));b=2+Math.floor(Math.random()*(lv+4));ans=a*b;}
    else{b=2+Math.floor(Math.random()*9);ans=2+Math.floor(Math.random()*lv*5);a=b*ans;}
    curAnswer=ans;qEl.textContent=a+' '+op+' '+b+' = ?';aEl.value='';aEl.focus();
    timeLeft=state.timeMax;tf.style.width='100%';
  }
  function submit(){
    if(!state.running)return;
    var v=parseInt(aEl.value,10);
    if(v===curAnswer){
      state.streak++;var gain=10+Math.floor(timeLeft)*2+state.streak;state.score+=gain;
      if(state.streak%5===0){state.level++;state.timeMax=Math.max(4,state.timeMax-0.5);SFX.levelUp();toast('关卡 '+state.level+'！');}
      else SFX.clear();
      genQ();updateHud();
    }else{SFX.error();state.streak=0;updateHud();}
  }
  function tick(){
    timeLeft-=0.1;tf.style.width=Math.max(0,timeLeft/state.timeMax*100)+'%';
    if(timeLeft<=0){state.streak=0;SFX.error();genQ();updateHud();}
  }
  function start(){init();state.running=true;AOXSound.ensure();AOXSound.startBGM('game');SFX.select();genQ();timer=setInterval(tick,100);toast('快算！');}
  aEl.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();submit();}});
  aEl.addEventListener('input',function(){aEl.value=aEl.value.replace(/[^0-9-]/g,'');});
  document.querySelectorAll('.num-btn').forEach(function(b){
    b.addEventListener('click',function(){
      AOXSound.ensure();var n=b.dataset.n;
      if(n==='c')aEl.value='';
      else if(n==='ok')submit();
      else aEl.value+=n;
    });
  });
  document.getElementById('startBtn').addEventListener('click',start);
  init();
})();
</script>
</body>
</html>
