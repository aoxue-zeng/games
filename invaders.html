<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太空侵略者 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>
  #gameCanvas { background:#000; touch-action:none; }
  .key { display:inline-block; background:var(--mc-panel); border:2px solid #000; box-shadow: inset -2px -2px 0 0 var(--mc-shadow), inset 2px 2px 0 0 var(--mc-highlight); padding:3px 8px; font-family:'Press Start 2P',monospace; font-size:10px; margin:0 2px; }
</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar">
  <a href="index.html" class="logo">⛏ AoXuan.World</a>
  <nav>
    <a href="index.html">首页</a>
    <a href="breakout.html">打砖块</a>
    <a href="invaders.html">侵略者</a>
    <a href="flappy.html">像素鸟</a>
    <a href="reaction.html">反应</a>
    <a href="math.html">算术</a>
    <a href="slide.html">华容道</a>
    <a href="rhythm.html">节奏</a>
    <a href="wordsearch.html">找单词</a>
    <a href="spotdiff.html">找不同</a>
  </nav>
</div>
<div class="container center">
  <h1 class="title-3d" style="font-size:34px;color:#4caf50;">👾 太空侵略者</h1>
  <p class="subtitle">消灭外星人编队！</p>
  <div class="hud" style="margin-top:20px;">
    <div class="hud-item"><span class="label">得分</span><span id="score">0</span></div>
    <div class="hud-item"><span class="label">生命</span><span id="lives">♥♥♥</span></div>
    <div class="hud-item"><span class="label">波次</span><span id="wave">1</span></div>
    <div class="hud-item"><span class="label">最高</span><span id="best">0</span></div>
  </div>
  <div class="game-stage" style="margin-top:14px;"><canvas id="gameCanvas" width="560" height="460"></canvas></div>
  <p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:16px;margin-top:12px;">
    <span class="key">←→</span> 移动 · <span class="key">空格</span> 射击 · <span class="key">R</span> 重开
  </p>
  <div style="margin-top:14px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap;">
    <button class="mc-btn green" id="startBtn">▶ 开始游戏</button>
    <a href="index.html" class="mc-btn">← 返回大厅</a>
  </div>
</div>
<div class="ground" style="position:fixed; bottom:0; left:0; right:0; z-index:0;"></div>
<script src="sound.js"></script>
<script src="mobile.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  var canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  var state,player,bullets,ebullets,aliens,particles,keys,stars,tick,alienDir,alienFireT;
  var ACOLS=8,AROWS=4,ASPACE=44;
  function init(){
    state={running:false,over:false,score:0,lives:3,wave:1,best:getBest()};
    player={x:W/2,y:H-30,w:32,h:20,speed:5,cd:0};
    bullets=[];ebullets=[];aliens=[];particles=[];keys={};tick=0;alienDir=1;alienFireT=0;
    buildAliens(); buildStars(); updateHud();
  }
  function getBest(){return parseInt(localStorage.getItem('invaders_best')||'0',10);}
  function setBest(v){localStorage.setItem('invaders_best',v);}
  function buildStars(){stars=[];for(var i=0;i<50;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.5+0.3});}
  function buildAliens(){
    aliens=[];var offX=(W-ACOLS*ASPACE)/2;
    for(var r=0;r<AROWS;r++)for(var c=0;c<ACOLS;c++){
      aliens.push({x:offX+c*ASPACE,y:50+r*36,w:28,h:22,type:r<1?2:(r<2?1:0),alive:true,anim:0});
    }
  }
  function updateHud(){
    document.getElementById('score').textContent=state.score;
    document.getElementById('lives').textContent='♥'.repeat(Math.max(0,state.lives))||'—';
    document.getElementById('wave').textContent=state.wave;
    document.getElementById('best').textContent=state.best;
  }
  function update(){
    if(!state.running||state.over)return;
    tick++;
    // 玩家移动
    if(keys['arrowleft']||keys['a'])player.x-=player.speed;
    if(keys['arrowright']||keys['d'])player.x+=player.speed;
    player.x=Math.max(8,Math.min(W-8-player.w,player.x));
    if(player.cd>0)player.cd--;
    // 射击
    if(keys[' ']&&player.cd<=0){bullets.push({x:player.x+player.w/2,y:player.y,vy:-8});player.cd=18;SFX.shoot();}
    // 子弹
    bullets=bullets.filter(function(b){b.y+=b.vy;return b.y>-10;});
    ebullets=ebullets.filter(function(b){b.y+=b.vy;return b.y<H+10;});
    // 外星人移动
    var alive=aliens.filter(function(a){return a.alive;});
    var speed=0.3+state.wave*0.15+(1-alive.length/(ACOLS*AROWS))*1.5;
    var edge=false;
    alive.forEach(function(a){a.x+=alienDir*speed;a.anim+=0.05;if(a.x<5||a.x+a.w>W-5)edge=true;});
    if(edge){alienDir*=-1;alive.forEach(function(a){a.y+=14;});}
    // 外星人射击
    alienFireT++;
    if(alienFireT>Math.max(30,80-state.wave*8)){alienFireT=0;var sh=alive[Math.floor(Math.random()*alive.length)];if(sh)ebullets.push({x:sh.x+sh.w/2,y:sh.y+sh.h,vy:3+state.wave*0.3});}
    // 子弹打外星人
    for(var i=bullets.length-1;i>=0;i--){
      for(var j=0;j<aliens.length;j++){
        var a=aliens[j];if(!a.alive)continue;
        if(bullets[i].x>a.x&&bullets[i].x<a.x+a.w&&bullets[i].y>a.y&&bullets[i].y<a.y+a.h){
          a.alive=false;state.score+=[10,20,30][a.type];explode(a.x+a.w/2,a.y+a.h/2,'#4caf50');bullets.splice(i,1);SFX.hit();updateHud();break;
        }
      }
    }
    // 外星人子弹打玩家
    for(var k=ebullets.length-1;k>=0;k--){
      if(ebullets[k].x>player.x&&ebullets[k].x<player.x+player.w&&ebullets[k].y>player.y&&ebullets[k].y<player.y+player.h){
        ebullets.splice(k,1);state.lives--;SFX.hurt();explode(player.x+player.w/2,player.y,'#e53935');updateHud();
        if(state.lives<=0)gameOver();
      }
    }
    // 外星人到家
    if(alive.some(function(a){return a.y+a.h>player.y;}))gameOver();
    // 通关
    if(alive.length===0){state.wave++;state.score+=100;buildAliens();alienDir=1;SFX.levelUp();toast('波次 '+state.wave+'！');updateHud();}
    // 粒子
    particles=particles.filter(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;return p.life>0;});
  }
  function explode(x,y,c){for(var i=0;i<12;i++){var a=Math.random()*Math.PI*2,s=1+Math.random()*4;particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:25,c:c,size:2+Math.random()*3});}}
  function gameOver(){state.over=true;state.running=false;AOXSound.stopBGM();SFX.lose();if(state.score>state.best){setBest(state.score);state.best=state.score;}updateHud();}
  function drawAlien(a){
    var fr=Math.floor(a.anim*2)%2;
    var col=a.type===2?'#9c27b0':(a.type===1?'#ff9800':'#4caf50');
    ctx.fillStyle=col;ctx.fillRect(a.x,a.y,a.w,a.h);
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(a.x,a.y,a.w,3);
    // 眼
    ctx.fillStyle='#fff';ctx.fillRect(a.x+5,a.y+6,5,5);ctx.fillRect(a.x+a.w-10,a.y+6,5,5);
    ctx.fillStyle='#000';ctx.fillRect(a.x+6,a.y+7,2,2);ctx.fillRect(a.x+a.w-9,a.y+7,2,2);
    // 触角/腿
    ctx.fillStyle=col;
    if(fr===0){ctx.fillRect(a.x+3,a.y+a.h,4,4);ctx.fillRect(a.x+a.w-7,a.y+a.h,4,4);}
    else{ctx.fillRect(a.x+7,a.y+a.h,4,4);ctx.fillRect(a.x+a.w-11,a.y+a.h,4,4);}
  }
  function draw(){
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    stars.forEach(function(s){ctx.fillStyle='rgba(255,255,255,'+(0.3+s.s/2)+')';ctx.fillRect(s.x,(s.y+tick*0.3)%H,1.5,1.5);});
    aliens.forEach(function(a){if(a.alive)drawAlien(a);});
    // 玩家飞船
    ctx.fillStyle='#4dd0e1';ctx.fillRect(player.x,player.y+8,player.w,12);
    ctx.fillStyle='#fff';ctx.fillRect(player.x+player.w/2-4,player.y,8,12);
    ctx.fillStyle='#00838f';ctx.fillRect(player.x+2,player.y+18,6,6);ctx.fillRect(player.x+player.w-8,player.y+18,6,6);
    // 子弹
    bullets.forEach(function(b){ctx.fillStyle='#ffd700';ctx.fillRect(b.x-1,b.y-6,3,8);});
    ebullets.forEach(function(b){ctx.fillStyle='#e53935';ctx.fillRect(b.x-1,b.y,3,8);});
    // 粒子
    particles.forEach(function(p){ctx.globalAlpha=p.life/25;ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,p.size,p.size);ctx.globalAlpha=1;});
    if(!state.running){
      ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
      if(state.over){ctx.fillStyle='#e53935';ctx.font='26px "Press Start 2P",monospace';ctx.fillText('游戏结束',W/2,H/2-20);ctx.fillStyle='#ffd700';ctx.font='14px "Press Start 2P",monospace';ctx.fillText('得分:'+state.score+' 最高:'+state.best,W/2,H/2+15);}
      else{ctx.fillStyle='#4caf50';ctx.font='22px "Press Start 2P",monospace';ctx.fillText('准备就绪',W/2,H/2-10);ctx.fillStyle='#fff';ctx.font='11px "Press Start 2P",monospace';ctx.fillText('点击开始按钮',W/2,H/2+25);}
    }
  }
  function loop(){update();draw();requestAnimationFrame(loop);}
  document.addEventListener('keydown',function(e){var k=e.key.toLowerCase();keys[k]=true;if(['arrowleft','arrowright',' '].indexOf(k)>=0)e.preventDefault();if(k==='r'){init();state.running=true;AOXSound.ensure();}});
  document.addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false;});
  // 触屏
  canvas.addEventListener('touchstart',function(e){e.preventDefault();keys[' ']=true;var r=canvas.getBoundingClientRect();var x=(e.touches[0].clientX-r.left)*(W/r.width);if(x<player.x)keys['arrowleft']=true;else if(x>player.x+player.w)keys['arrowright']=true;},{passive:false});
  canvas.addEventListener('touchend',function(e){e.preventDefault();keys[' ']=false;keys['arrowleft']=false;keys['arrowright']=false;},{passive:false});
  canvas.addEventListener('touchmove',function(e){e.preventDefault();var r=canvas.getBoundingClientRect();var x=(e.touches[0].clientX-r.left)*(W/r.width);if(x<player.x){keys['arrowleft']=true;keys['arrowright']=false;}else if(x>player.x+player.w){keys['arrowright']=true;keys['arrowleft']=false;}},{passive:false});
  document.getElementById('startBtn').addEventListener('click',function(){init();state.running=true;AOXSound.ensure();AOXSound.startBGM('game');SFX.select();toast('消灭外星人！');});
  init();loop();
})();
</script>
</body>
</html>
