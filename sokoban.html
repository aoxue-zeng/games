<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推箱子 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>
  #gameCanvas { background:#8b5a2b; touch-action:none; }
  .key { display:inline-block; background:var(--mc-panel); border:2px solid #000; box-shadow: inset -2px -2px 0 0 var(--mc-shadow), inset 2px 2px 0 0 var(--mc-highlight); padding:3px 8px; font-family:'Press Start 2P',monospace; font-size:10px; margin:0 2px; }
  .lvl-btn { font-family:'Press Start 2P',monospace; font-size:10px; padding:8px 12px; background:var(--mc-panel); border:3px solid var(--mc-black); box-shadow: inset 2px 2px 0 0 var(--mc-highlight), inset -2px -2px 0 0 var(--mc-shadow); cursor:pointer; color:#1a1a1a; }
  .lvl-btn.active { background:var(--mc-grass); color:#fff; }
  .lvl-btn.done { background:var(--mc-gold); }
</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar">
  <a href="index.html" class="logo">⛏ AoXuan.World</a>
  <nav>
    <a href="index.html">首页</a>
    <a href="shooter.html">飞机大战</a>
    <a href="sokoban.html">推箱子</a>
    <a href="whack.html">打地鼠</a>

    <a href="tank.html">坦克大战</a>
    <a href="pong.html">乒乓</a>
    <a href="linkup.html">连连看</a>
    <a href="guess.html">猜数字</a>
    <a href="pixel.html">画板</a>
    <a href="snake.html">贪吃蛇</a>
    <a href="pvz.html">植物僵尸</a>
  </nav>
</div>
<div class="container center">
  <h1 class="title-3d" style="font-size:34px;">🚜 推箱子</h1>
  <p class="subtitle">把所有箱子推到目标点！</p>
  <div class="hud" style="margin-top:20px;">
    <div class="hud-item"><span class="label">关卡</span><span id="level">1</span></div>
    <div class="hud-item"><span class="label">步数</span><span id="moves">0</span></div>
    <div class="hud-item"><span class="label">完成</span><span id="done">0/6</span></div>
    <div class="hud-item"><span class="label">已通关</span><span id="cleared">0</span></div>
  </div>
  <div class="game-stage" style="margin-top:14px;">
    <canvas id="gameCanvas" width="480" height="480"></canvas>
  </div>
  <div style="margin-top:14px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;" id="lvlBtns"></div>
  <p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:15px;margin-top:10px;">
    <span class="key">←↑→↓</span> 或 <span class="key">WASD</span> 移动 · <span class="key">U</span> 撤销 · <span class="key">R</span> 重置
  </p>
  <div style="margin-top:12px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap;">
    <a href="index.html" class="mc-btn">← 返回大厅</a>
  </div>
</div>
<div class="ground" style="position:fixed; bottom:0; left:0; right:0; z-index:0;"></div>
<script src="sound.js"></script>
<script src="mobile.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  var canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  // 关卡: #墙 .空地 $箱 *箱在点 @人 +人在点 o目标点
  var LEVELS=[
    "#######\n#.....#\n#.@$o.#\n#.....#\n#######",
    "########\n#......#\n#.@$$.o#\n#....o.#\n#......#\n########",
    "#########\n#...o...#\n#.......#\n#.@$.$..#\n#....o..#\n#.......#\n#########",
    "##########\n#........#\n#.@$..$..#\n#...o.o..#\n#........#\n#...o....#\n#...$....#\n#........#\n##########",
    "########\n#.o....#\n#.$....#\n#..#.#.#\n#.$.@..#\n#..#...#\n#.o.o..#\n#..$...#\n########",
    "#########\n#..o....#\n#.$..#..#\n#.....o.#\n#.@$....#\n#..#..$.#\n#.....o.#\n#.......#\n#########"
  ];
  var CELL=40, grid, player, boxes, targets, level, moves, history, cleared;
  function loadLevel(n){
    level=n; var rows=LEVELS[n].split('\n'); grid=[]; boxes=[]; targets=[]; history=[]; moves=0;
    for(var r=0;r<rows.length;r++){
      var row=[]; for(var c=0;c<rows[r].length;c++){ var ch=rows[r][c];
        if(ch==='#')row.push('#'); else row.push('.');
        if(ch==='@'||ch==='+')player={r:r,c:c};
        if(ch==='$')boxes.push({r:r,c:c});
        if(ch==='*'){boxes.push({r:r,c:c});targets.push({r:r,c:c});}
        if(ch==='o'||ch==='+'||ch==='*')targets.push({r:r,c:c});
      } grid.push(row);
    }
    updateHud(); draw();
  }
  function init(){ cleared=parseInt(localStorage.getItem('sokoban_cleared')||'0',10); loadLevel(0); buildBtns(); }
  function updateHud(){
    document.getElementById('level').textContent=level+1;
    document.getElementById('moves').textContent=moves;
    var done=boxes.filter(function(b){return targets.some(function(t){return t.r===b.r&&t.c===b.c;});}).length;
    document.getElementById('done').textContent=done+'/'+boxes.length;
    document.getElementById('cleared').textContent=cleared;
  }
  function buildBtns(){
    var box=document.getElementById('lvlBtns'); box.innerHTML='';
    LEVELS.forEach(function(_,i){ var b=document.createElement('button'); b.className='lvl-btn'; b.textContent=''+(i+1);
      if(i===level)b.classList.add('active');
      if(localStorage.getItem('sokoban_l'+i))b.classList.add('done');
      b.addEventListener('click',function(){ loadLevel(i); buildBtns(); SFX.click(); }); box.appendChild(b); });
  }
  function isWall(r,c){ if(r<0||r>=grid.length||c<0||c>=grid[r].length)return true; return grid[r][c]==='#'; }
  function boxAt(r,c){ for(var i=0;i<boxes.length;i++)if(boxes[i].r===r&&boxes[i].c===c)return i; return -1; }
  function move(dr,dc){
    if(stateWon())return;
    var nr=player.r+dr,nc=player.c+dc;
    if(isWall(nr,nc))return;
    var bi=boxAt(nr,nc);
    if(bi>=0){ var br=nr+dr,bc=nc+dc; if(isWall(br,bc)||boxAt(br,bc)>=0)return;
      history.push({pr:player.r,pc:player.c,bi:bi,br:boxes[bi].r,bc:boxes[bi].c});
      boxes[bi].r=br; boxes[bi].c=bc; SFX.place();
    } else { history.push({pr:player.r,pc:player.c,bi:-1}); SFX.move(); }
    player.r=nr; player.c=nc; moves++; updateHud(); draw();
    if(stateWon()){ SFX.win(); localStorage.setItem('sokoban_l'+level,'1'); cleared++; localStorage.setItem('sokoban_cleared',cleared); toast('🎉 通关！'); buildBtns();
      if(level<LEVELS.length-1)setTimeout(function(){loadLevel(level+1);buildBtns();},1200); }
  }
  function undo(){ if(history.length===0)return; var h=history.pop(); player.r=h.pr; player.c=h.pc; if(h.bi>=0){boxes[h.bi].r=h.br;boxes[h.bi].c=h.bc;} moves--; updateHud(); draw(); SFX.back(); }
  function stateWon(){ return boxes.every(function(b){return targets.some(function(t){return t.r===b.r&&t.c===b.c;});}); }
  function draw(){
    ctx.fillStyle='#8b5a2b'; ctx.fillRect(0,0,W,H);
    var offX=(W-grid[0].length*CELL)/2, offY=(H-grid.length*CELL)/2;
    for(var r=0;r<grid.length;r++)for(var c=0;c<grid[r].length;c++){
      var x=offX+c*CELL,y=offY+r*CELL;
      if(grid[r][c]==='#'){ ctx.fillStyle='#7f7f7f'; ctx.fillRect(x,y,CELL,CELL); ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(x,y,CELL,4); ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(x,y+CELL-4,CELL,4); ctx.fillStyle='#555'; ctx.fillRect(x+CELL/2-3,y+CELL/2-3,6,6); }
      else { ctx.fillStyle='#a0703a'; ctx.fillRect(x,y,CELL,CELL); ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.strokeRect(x+0.5,y+0.5,CELL-1,CELL-1); }
      if(targets.some(function(t){return t.r===r&&t.c===c;})){ ctx.fillStyle='#4dd0e1'; ctx.beginPath(); ctx.arc(x+CELL/2,y+CELL/2,8,0,7); ctx.fill(); ctx.fillStyle='#00838f'; ctx.beginPath(); ctx.arc(x+CELL/2,y+CELL/2,4,0,7); ctx.fill(); }
    }
    boxes.forEach(function(b){ var x=offX+b.c*CELL,y=offY+b.r*CELL; var onT=targets.some(function(t){return t.r===b.r&&t.c===b.c;});
      ctx.fillStyle=onT?'#4caf50':'#b5651d'; ctx.fillRect(x+4,y+4,CELL-8,CELL-8); ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(x+4,y+4,CELL-8,4); ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(x+4,y+CELL-8,CELL-8,4); ctx.fillStyle=onT?'#2e7d32':'#8b4513'; ctx.fillRect(x+CELL/2-3,y+CELL/2-3,6,6); });
    var px=offX+player.c*CELL,py=offY+player.r*CELL;
    ctx.fillStyle='#2196f3'; ctx.fillRect(px+10,py+6,CELL-20,CELL-14); ctx.fillStyle='#1565c0'; ctx.fillRect(px+6,py+CELL-14,CELL-12,8); ctx.fillStyle='#f0c8a0'; ctx.fillRect(px+12,py,CELL-24,8); ctx.fillStyle='#fff'; ctx.fillRect(px+14,py+2,4,3); ctx.fillRect(px+CELL-18,py+2,4,3); ctx.fillStyle='#000'; ctx.fillRect(px+15,py+3,2,2); ctx.fillRect(px+CELL-17,py+3,2,2);
  }
  document.addEventListener('keydown',function(e){ var k=e.key.toLowerCase();
    if(['arrowup','arrowdown','arrowleft','arrowright'].indexOf(k)>=0)e.preventDefault();
    if(k==='arrowup'||k==='w')move(-1,0); else if(k==='arrowdown'||k==='s')move(1,0); else if(k==='arrowleft'||k==='a')move(0,-1); else if(k==='arrowright'||k==='d')move(0,1);
    else if(k==='u')undo(); else if(k==='r'){loadLevel(level);SFX.click();}
  });
  // 触屏滑动
  var ts=null;
  canvas.addEventListener('touchstart',function(e){ts={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
  canvas.addEventListener('touchend',function(e){ if(!ts)return; var dx=e.changedTouches[0].clientX-ts.x,dy=e.changedTouches[0].clientY-ts.y; if(Math.abs(dx)<20&&Math.abs(dy)<20)return; if(Math.abs(dx)>Math.abs(dy))move(0,dx>0?1:-1); else move(dy>0?1:-1,0); ts=null; },{passive:true});
  init();
})();
</script>
</body>
</html>
