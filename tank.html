<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>
  #gameCanvas { background:#1a1a1a; touch-action:none; }
  .key { display:inline-block; background:var(--mc-panel); border:2px solid #000; box-shadow: inset -2px -2px 0 0 var(--mc-shadow), inset 2px 2px 0 0 var(--mc-highlight); padding:3px 8px; font-family:'Press Start 2P',monospace; font-size:10px; margin:0 2px; }
</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar">
  <a href="index.html" class="logo">⛏ AoXuan.World</a>
  <nav>
    <a href="index.html">首页</a><a href="shooter.html">飞机大战</a><a href="sokoban.html">推箱子</a><a href="whack.html">打地鼠</a><a href="sudoku.html">数独</a><a href="tank.html">坦克大战</a><a href="pong.html">乒乓</a><a href="linkup.html">连连看</a><a href="guess.html">猜数字</a><a href="pixel.html">画板</a><a href="snake.html">贪吃蛇</a><a href="pvz.html">植物僵尸</a>
  </nav>
</div>
<div class="container center">
  <h1 class="title-3d" style="font-size:34px;">⚔️ 坦克大战</h1>
  <p class="subtitle">保护基地，消灭敌方坦克！</p>
  <div class="hud" style="margin-top:20px;">
    <div class="hud-item"><span class="label">得分</span><span id="score">0</span></div>
    <div class="hud-item"><span class="label">生命</span><span id="lives">♥♥♥</span></div>
    <div class="hud-item"><span class="label">关卡</span><span id="level">1</span></div>
    <div class="hud-item"><span class="label">剩余敌</span><span id="enemies">0</span></div>
  </div>
  <div class="game-stage" style="margin-top:14px;">
    <canvas id="gameCanvas" width="520" height="520"></canvas>
  </div>
  <p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:15px;margin-top:10px;">
    <span class="key">WASD</span> 移动 · <span class="key">空格</span> 开炮 · <span class="key">R</span> 重开 · 保护下方基地★
  </p>
  <div style="margin-top:14px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap;">
    <button class="mc-btn green" id="startBtn">▶ 开始游戏</button>
    <a href="index.html" class="mc-btn">← 返回大厅</a>
  </div>
</div>
<div class="ground" style="position:fixed; bottom:0; left:0; right:0; z-index:0;"></div>
<script src="sound.js"></script>
<script src="mobile.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  var canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height; var CELL=26, COLS=W/CELL, ROWS=H/CELL;
  var state, player, enemies, bullets, walls, base, keys, particles, spawnTick;
  // 关卡地图 #砖 @钢 .空 B基地
  var MAP="############################\n#............##............#\n#.####.#####.##.#####.####.#\n#.#..#.#...#.##.#...#.#..#.#\n#.#.##.#.#.####.#.#.#.##.#.#\n#.#....#.#......#.#.#....#.#\n#.######.######.#.######.###\n#..........................#\n#####.####.######.####.#####\n#..........................#\n#.######.######.#.######.###\n#.#....#.#......#.#.#....#.#\n#.#.##.#.#.####.#.#.#.##.#.#\n#.#..#.#...#.##.#...#.#..#.#\n#.####.#####.##.#####.####.#\n#............BB............#\n############################";
  function loadMap(){ var rows=MAP.split('\n'); walls=[]; base={r:15,c:12,w:2,h:1};
    for(var r=0;r<rows.length;r++)for(var c=0;c<rows[r].length;c++){ if(rows[r][c]==='#')walls.push({r:r,c:c,type:'brick',hp:1}); if(rows[r][c]==='@')walls.push({r:r,c:c,type:'steel',hp:99}); if(rows[r][c]==='B')walls.push({r:r,c:c,type:'base',hp:1}); }
  }
  function init(){
    loadMap(); state={running:false,over:false,score:0,lives:3,level:1,enemyCount:0,maxEnemies:8,alive:0,toSpawn:8};
    player={r:14,c:7,dir:0,x:7*CELL,y:14*CELL,cd:0,invuln:0}; // dir 0上1右2下3左
    enemies=[]; bullets=[]; particles=[]; keys={}; spawnTick=0; updateHud();
  }
  function updateHud(){ document.getElementById('score').textContent=state.score; document.getElementById('lives').textContent='♥'.repeat(Math.max(0,state.lives))||'—'; document.getElementById('level').textContent=state.level; document.getElementById('enemies').textContent=state.toSpawn+state.alive; }
  function isWall(r,c){ return walls.some(function(w){return w.r===r&&w.c===c;}); }
  function wallIdx(r,c){ for(var i=0;i<walls.length;i++)if(walls[i].r===r&&walls[i].c===c)return i; return -1; }
  function canMove(x,y){ var r=Math.floor(y/CELL),c=Math.floor(x/CELL); if(r<0||r>=ROWS||c<0||c>=COLS)return false; if(isWall(r,c))return false; if(isWall(r,c+1)&&x+CELL>c*CELL+CELL)return false; return true; }
  function moveTank(t){ var nx=t.x,ny=t.y; var sz=CELL;
    if(t.dir===0)ny-=2; else if(t.dir===1)nx+=2; else if(t.dir===2)ny+=2; else nx-=2;
    // 对齐网格后再判断
    if(canMove(nx,ny)&&canMove(nx+sz-1,ny)&&canMove(nx,ny+sz-1)&&canMove(nx+sz-1,ny+sz-1)){ t.x=nx; t.y=ny; t.r=Math.floor(t.y/CELL); t.c=Math.floor(t.x/CELL); return true; } return false;
  }
  function fire(t){ if(t.cd>0)return; t.cd=25; var bx=t.x+CELL/2-3, by=t.y+CELL/2-3;
    if(t.dir===0)by=t.y-6; else if(t.dir===1){bx=t.x+CELL;by=t.y+CELL/2-3;} else if(t.dir===2){by=t.y+CELL;bx=t.x+CELL/2-3;} else {bx=t.x-6;by=t.y+CELL/2-3;}
    bullets.push({x:bx,y:by,dir:t.dir,owner:t.isEnemy?'enemy':'player',life:120}); SFX.shoot();
  }
  function spawnEnemy(){ if(state.toSpawn<=0||state.alive>=4)return; var spots=[[1,1],[1,12],[1,23]]; var s=spots[Math.floor(Math.random()*3)];
    enemies.push({r:s[0],c:s[1],x:s[1]*CELL,y:s[0]*CELL,dir:2,cd:0,moveTick:0,fireTick:Math.random()*60,isEnemy:true,hp:1}); state.toSpawn--; state.alive++;
  }
  function update(){
    if(!state.running||state.over)return;
    if(player.invuln>0)player.invuln--; if(player.cd>0)player.cd--;
    // 玩家移动
    var moved=false;
    if(keys['w']||keys['arrowup']){player.dir=0;moved=moveTank(player);} else if(keys['d']||keys['arrowright']){player.dir=1;moved=moveTank(player);} else if(keys['s']||keys['arrowdown']){player.dir=2;moved=moveTank(player);} else if(keys['a']||keys['arrowleft']){player.dir=3;moved=moveTank(player);}
    if(moved)SFX.move();
    if(keys[' '])fire(player);
    // 敌人AI
    enemies.forEach(function(e){ e.moveTick++; e.fireTick++; if(e.cd>0)e.cd--;
      if(e.moveTick>=30){ e.moveTick=0; if(Math.random()<0.3)e.dir=Math.floor(Math.random()*4); if(!moveTank(e)){ e.dir=Math.floor(Math.random()*4); } }
      if(e.fireTick>=60+Math.random()*40){ e.fireTick=0; fire(e); }
    });
    // 子弹
    for(var i=bullets.length-1;i>=0;i--){ var b=bullets[i]; var sp=5; if(b.dir===0)b.y-=sp; else if(b.dir===1)b.x+=sp; else if(b.dir===2)b.y+=sp; else b.x-=sp; b.life--; if(b.life<=0){bullets.splice(i,1);continue;}
      // 撞墙
      var br=Math.floor((b.y+3)/CELL),bc=Math.floor((b.x+3)/CELL); var wi=wallIdx(br,bc);
      if(wi>=0){ var w=walls[wi]; if(w.type==='steel'){SFX.hit();bullets.splice(i,1);continue;} if(w.type==='base'){ walls.splice(wi,1); SFX.boom(); explode(b.x,b.y,'#e53935',20); bullets.splice(i,1); state.over=true; state.running=false; AOXSound.stopBGM(); SFX.lose(); toast('基地被毁！'); continue; } if(w.type==='brick'){ walls.splice(wi,1); SFX.hit(); explode(b.x,b.y,'#b5651d',6); bullets.splice(i,1); continue; } }
      // 撞坦克
      if(b.owner==='player'){ for(var j=enemies.length-1;j>=0;j--){ var en=enemies[j]; if(b.x>en.x&&b.x<en.x+CELL&&b.y>en.y&&b.y<en.y+CELL){ state.score+=100; state.alive--; explode(en.x+CELL/2,en.y+CELL/2,'#e53935',16); SFX.explode(); enemies.splice(j,1); bullets.splice(i,1); checkWin(); break; } } }
      else { if(player.invuln<=0&&b.x>player.x&&b.x<player.x+CELL&&b.y>player.y&&b.y<player.y+CELL){ playerHit(); bullets.splice(i,1); } }
      if(b.x<0||b.x>W||b.y<0||b.y>H)bullets.splice(i,1);
    }
    // 生成敌人
    spawnTick++; if(spawnTick>=180){ spawnTick=0; spawnEnemy(); }
    // 粒子
    for(var p=particles.length-1;p>=0;p--){var pt=particles[p];pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.2;pt.life--;if(pt.life<=0)particles.splice(p,1);}
    updateHud();
  }
  function explode(x,y,color,n){ for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,s=1+Math.random()*4;particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:25,color:color,size:2+Math.random()*3});} }
  function playerHit(){ state.lives--; player.invuln=60; player.x=7*CELL; player.y=14*CELL; player.dir=0; explode(player.x+CELL/2,player.y+CELL/2,'#2196f3',16); SFX.hurt(); updateHud(); if(state.lives<=0){state.over=true;state.running=false;AOXSound.stopBGM();SFX.lose();toast('游戏结束');} }
  function checkWin(){ if(state.toSpawn<=0&&state.alive<=0){ state.level++; SFX.win(); toast('🎉 关卡'+state.level+'通关！'); state.toSpawn=8+state.level; state.maxEnemies=8+state.level; } }
  function drawTank(t,color){ var x=t.x,y=t.y; ctx.fillStyle=color; ctx.fillRect(x+4,y+4,CELL-8,CELL-8);
    // 履带
    ctx.fillStyle='rgba(0,0,0,0.4)'; if(t.dir===0||t.dir===2){ ctx.fillRect(x,y+2,4,CELL-4); ctx.fillRect(x+CELL-4,y+2,4,CELL-4); } else { ctx.fillRect(x+2,y,CELL-4,4); ctx.fillRect(x+2,y+CELL-4,CELL-4,4); }
    // 炮管
    ctx.fillStyle=color; if(t.dir===0)ctx.fillRect(x+CELL/2-2,y-4,4,8); else if(t.dir===1)ctx.fillRect(x+CELL,y+CELL/2-2,8,4); else if(t.dir===2)ctx.fillRect(x+CELL/2-2,y+CELL,4,8); else ctx.fillRect(x-4,y+CELL/2-2,8,4);
    // 中心
    ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fillRect(x+CELL/2-3,y+CELL/2-3,6,6);
  }
  function draw(){
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,0,W,H);
    // 砖墙
    walls.forEach(function(w){ var x=w.c*CELL,y=w.r*CELL;
      if(w.type==='brick'){ ctx.fillStyle='#b5651d'; ctx.fillRect(x,y,CELL,CELL); ctx.strokeStyle='#6b4220'; ctx.lineWidth=1; ctx.strokeRect(x+0.5,y+0.5,CELL/2-1,CELL/2-1); ctx.strokeRect(x+CELL/2+0.5,y+0.5,CELL/2-1,CELL/2-1); ctx.strokeRect(x+0.5,y+CELL/2+0.5,CELL/2-1,CELL/2-1); ctx.strokeRect(x+CELL/2+0.5,y+CELL/2+0.5,CELL/2-1,CELL/2-1); }
      else if(w.type==='steel'){ ctx.fillStyle='#9e9e9e'; ctx.fillRect(x,y,CELL,CELL); ctx.fillStyle='#bdbdbd'; ctx.fillRect(x,y,CELL,3); ctx.fillRect(x,y,3,CELL); ctx.fillStyle='#616161'; ctx.fillRect(x,y+CELL-3,CELL,3); ctx.fillRect(x+CELL-3,y,3,CELL); }
      else if(w.type==='base'){ ctx.fillStyle='#ffd700'; ctx.font='20px monospace'; ctx.textAlign='center'; ctx.fillText('★',x+CELL/2,y+CELL-5); }
    });
    // 坦克
    if(!(player.invuln>0&&Math.floor(player.invuln/4)%2===0))drawTank(player,'#2196f3');
    enemies.forEach(function(e){ drawTank(e,'#e53935'); });
    // 子弹
    bullets.forEach(function(b){ ctx.fillStyle=b.owner==='player'?'#fff':'#ff6b6b'; ctx.fillRect(b.x,b.y,6,6); });
    // 粒子
    particles.forEach(function(p){ctx.globalAlpha=p.life/25;ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,p.size,p.size);ctx.globalAlpha=1;});
    if(!state.running){ ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H); ctx.textAlign='center';
      if(state.over){ ctx.fillStyle='#e53935'; ctx.font='24px "Press Start 2P",monospace'; ctx.fillText(state.lives<=0?'游戏结束':'基地被毁',W/2,H/2-20); ctx.fillStyle='#fff'; ctx.font='12px "Press Start 2P",monospace'; ctx.fillText('得分:'+state.score,W/2,H/2+15); ctx.fillText('按R重玩',W/2,H/2+42); }
      else { ctx.fillStyle='#4caf50'; ctx.font='22px "Press Start 2P",monospace'; ctx.fillText('准备就绪',W/2,H/2-10); ctx.fillStyle='#fff'; ctx.font='11px "Press Start 2P",monospace'; ctx.fillText('WASD移动 空格开炮',W/2,H/2+25); } }
  }
  function loop(){ update(); draw(); requestAnimationFrame(loop); }
  document.addEventListener('keydown',function(e){ var k=e.key.toLowerCase(); keys[k]=true; if([' ','arrowup','arrowdown','arrowleft','arrowright'].indexOf(k)>=0)e.preventDefault(); if(k==='r'){init();state.running=true;AOXSound.ensure();} });
  document.addEventListener('keyup',function(e){ keys[e.key.toLowerCase()]=false; });
  document.getElementById('startBtn').addEventListener('click',function(){ init(); state.running=true; AOXSound.ensure(); AOXSound.startBGM('game'); SFX.select(); toast('出击！保护基地！'); });
  // 触屏：摇杆移动+按钮开炮
  if(AOXMobile.isTouch){ AOXMobile.init({ dpad:true, actions:[{key:'a',label:'🔥',color:'rgba(229,57,53,0.85)',onPress:function(){ keys[' ']=true; }}] });
    var joyInt=setInterval(function(){ if(!state.running)return; if(AOXMobile.state.left){keys['a']=true;player.dir=3;} else if(AOXMobile.state.right){keys['d']=true;player.dir=1;} else if(AOXMobile.state.up){keys['w']=true;player.dir=0;} else if(AOXMobile.state.down){keys['s']=true;player.dir=2;} else {keys['w']=keys['a']=keys['s']=keys['d']=false;} if(!AOXMobile.state.a)keys[' ']=false; },30);
  }
  init(); loop();
})();
</script>
</body>
</html>
