<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>火箭升空 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>
  #gameCanvas { background:#000; touch-action:none; }
  .key { display:inline-block; background:var(--mc-panel); border:2px solid #000; box-shadow: inset -2px -2px 0 0 var(--mc-shadow), inset 2px 2px 0 0 var(--mc-highlight); padding:3px 8px; font-family:'Press Start 2P',monospace; font-size:10px; margin:0 2px; }
</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar">
  <a href="index.html" class="logo">⛏ AoXuan.World</a>
  <nav>
    <a href="index.html">首页</a>
    <a href="rocket.html">火箭</a>
    <a href="pipes.html">水管</a>
    <a href="burger.html">汉堡</a>
    <a href="balance.html">天平</a>
    <a href="thermometer.html">温度计</a>
    <a href="slots.html">老虎机</a>
    <a href="24points.html">24点</a>
    <a href="gomoku.html">五子棋</a>
    <a href="horserace.html">赛马</a>
  </nav>
</div>
<div class="container center">
  <h1 class="title-3d" style="font-size:34px;">🚀 火箭升空</h1>
  <p class="subtitle">左右躲避，飞得越高越好！</p>
  <div class="hud" style="margin-top:20px;">
    <div class="hud-item"><span class="label">高度</span><span id="height">0</span>m</div>
    <div class="hud-item"><span class="label">燃料</span><span id="fuel">100</span></div>
    <div class="hud-item"><span class="label">最高</span><span id="best">0</span>m</div>
  </div>
  <div class="game-stage" style="margin-top:14px;"><canvas id="gameCanvas" width="400" height="500"></canvas></div>
  <p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:16px;margin-top:12px;">
    <span class="key">←→</span> 或 <span class="key">A D</span> 移动 · <span class="key">↑</span> 加速(耗燃料) · 收集⛽补燃料 · <span class="key">R</span> 重开
  </p>
  <div style="margin-top:14px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
    <button class="mc-btn green" id="startBtn">▶ 开始游戏</button>
    <a href="index.html" class="mc-btn">← 返回大厅</a>
  </div>
</div>
<div class="ground" style="position:fixed;bottom:0;left:0;right:0;z-index:0;"></div>
<script src="sound.js"></script>
<script src="mobile.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  var canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  var state,rocket,obstacles,fuels,particles,stars,keys,tick,speed,scrollY;
  function init(){
    state={running:false,over:false,height:0,fuel:100,best:getBest()};
    rocket={x:W/2,y:H-100,vx:0,boost:0,anim:0};obstacles=[];fuels=[];particles=[];keys={};tick=0;speed=2;scrollY=0;
    stars=[];for(var i=0;i<60;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.5+0.3});
    updateHud();
  }
  function getBest(){return parseInt(localStorage.getItem('rocket_best')||'0',10);}
  function setBest(v){localStorage.setItem('rocket_best',v);}
  function updateHud(){document.getElementById('height').textContent=Math.floor(state.height);document.getElementById('fuel').textContent=Math.floor(state.fuel);document.getElementById('best').textContent=state.best;}
  function spawnObstacle(){obstacles.push({x:30+Math.random()*(W-90),y:-40,w:50+Math.random()*30,h:24,type:Math.random()<0.5?'rock':'cloud'});}
  function spawnFuel(){fuels.push({x:30+Math.random()*(W-60),y:-20,r:12,t:Math.random()*6});}
  function update(){
    if(!state.running||state.over)return;
    tick++;state.height+=speed/5;
    if(keys['arrowleft']||keys['a'])rocket.vx-=0.6;
    if(keys['arrowright']||keys['d'])rocket.vx+=0.6;
    rocket.vx*=0.9;rocket.x+=rocket.vx;
    rocket.x=Math.max(20,Math.min(W-20,rocket.x));
    // 加速
    var boost=(keys['arrowup']||keys['w'])&&state.fuel>0;
    if(boost){state.fuel-=0.5;speed=4;rocket.boost=8;SFX.move();for(var i=0;i<2;i++)particles.push({x:rocket.x+(Math.random()-0.5)*8,y:rocket.y+20,vx:(Math.random()-0.5)*2,vy:3+Math.random()*3,life:15,c:'#ff9800',size:3});}
    else{speed=2+state.height/3000;rocket.boost*=0.8;}
    if(tick%50===0)spawnObstacle();
    if(tick%90===0&&Math.random()<0.6)spawnFuel();
    obstacles.forEach(function(o){o.y+=speed;});
    obstacles=obstacles.filter(function(o){
      if(o.y>H+40)return false;
      if(Math.abs(o.x-rocket.x)<o.w/2+12&&Math.abs(o.y-rocket.y)<o.h/2+18){state.over=true;gameOver();}
      return true;
    });
    fuels.forEach(function(f){f.y+=speed;f.t+=0.15;});
    fuels=fuels.filter(function(f){
      if(f.y>H+20)return false;
      if(Math.abs(f.x-rocket.x)<20&&Math.abs(f.y-rocket.y)<20){state.fuel=Math.min(100,state.fuel+30);SFX.coin();explode(f.x,f.y,'#4caf50');return false;}
      return true;
    });
    particles=particles.filter(function(p){p.x+=p.vx;p.y+=p.vy;p.life--;return p.life>0;});
    stars.forEach(function(s){s.y+=speed*0.3;if(s.y>H){s.y=0;s.x=Math.random()*W;}});
    rocket.anim+=0.2;
    updateHud();
    if(state.height>state.best){setBest(Math.floor(state.height));state.best=Math.floor(state.height);}
  }
  function explode(x,y,c){for(var i=0;i<14;i++){var a=Math.random()*Math.PI*2,s=1+Math.random()*4;particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:25,c:c,size:2+Math.random()*3});}}
  function gameOver(){state.over=true;state.running=false;AOXSound.stopBGM();SFX.lose();for(var i=0;i<20;i++){var a=Math.random()*Math.PI*2,s=2+Math.random()*5;particles.push({x:rocket.x,y:rocket.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:30,c:i%2?'#ff9800':'#e53935',size:3+Math.random()*3});}}
  function draw(){
    // 背景随高度变色
    var h=Math.min(1,state.height/2000);
    var r=Math.round(5+h*5),g=Math.round(5+h*20),b=Math.round(15+h*60);
    ctx.fillStyle='rgb('+r+','+g+','+b+')';ctx.fillRect(0,0,W,H);
    // 星星
    stars.forEach(function(s){ctx.fillStyle='rgba(255,255,255,'+(0.3+s.s/2)+')';ctx.fillRect(s.x,s.y,s.s,s.s);});
    // 障碍
    obstacles.forEach(function(o){
      if(o.type==='rock'){ctx.fillStyle='#7f7f7f';ctx.fillRect(o.x-o.w/2,o.y-o.h/2,o.w,o.h);ctx.fillStyle='#555';ctx.fillRect(o.x-o.w/2+4,o.y-o.h/2+4,o.w-8,o.h-8);}
      else{ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fillRect(o.x-o.w/2,o.y,o.w,o.h/2);ctx.fillRect(o.x-o.w/2+8,o.y-6,o.w-16,o.h/2+6);}
    });
    // 燃料
    fuels.forEach(function(f){var bob=Math.sin(f.t)*2;ctx.fillStyle='#4caf50';ctx.shadowColor='#4caf50';ctx.shadowBlur=10;ctx.fillRect(f.x-6,f.y-8+bob,12,16);ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.fillRect(f.x-2,f.y-6+bob,4,4);});
    // 火箭
    var rx=rocket.x,ry=rocket.y;
    ctx.fillStyle='#e53935';ctx.fillRect(rx-8,ry-20,16,28);
    ctx.fillStyle='#fff';ctx.fillRect(rx-6,ry-14,12,16);
    ctx.fillStyle='#e53935';ctx.beginPath();ctx.moveTo(rx-8,ry+8);ctx.lineTo(rx-14,ry+18);ctx.lineTo(rx-8,ry+14);ctx.fill();ctx.beginPath();ctx.moveTo(rx+8,ry+8);ctx.lineTo(rx+14,ry+18);ctx.lineTo(rx+8,ry+14);ctx.fill();
    ctx.fillStyle='#4dd0e1';ctx.fillRect(rx-4,ry-26,8,8);
    ctx.fillStyle='#f0c8a0';ctx.fillRect(rx-3,ry-20,6,4);
    // 尾焰
    if(rocket.boost>1){ctx.fillStyle='#ff9800';ctx.fillRect(rx-4,ry+14,8,6+rocket.boost);ctx.fillStyle='#ffeb3b';ctx.fillRect(rx-2,ry+14,4,4+rocket.boost);}
    // 粒子
    particles.forEach(function(p){ctx.globalAlpha=p.life/25;ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,p.size,p.size);ctx.globalAlpha=1;});
    if(!state.running){
      ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
      if(state.over){ctx.fillStyle='#e53935';ctx.font='24px "Press Start 2P",monospace';ctx.fillText('爆炸了！',W/2,H/2-30);ctx.fillStyle='#ffd700';ctx.font='14px "Press Start 2P",monospace';ctx.fillText('高度:'+Math.floor(state.height)+'m 最高:'+state.best+'m',W/2,H/2+5);ctx.fillStyle='#fff';ctx.font='11px "Press Start 2P",monospace';ctx.fillText('按 R 重玩',W/2,H/2+35);}
      else{ctx.fillStyle='#4dd0e1';ctx.font='22px "Press Start 2P",monospace';ctx.fillText('准备升空',W/2,H/2-10);ctx.fillStyle='#fff';ctx.font='11px "Press Start 2P",monospace';ctx.fillText('点击开始',W/2,H/2+25);}
    }
  }
  function loop(){update();draw();requestAnimationFrame(loop);}
  document.addEventListener('keydown',function(e){var k=e.key.toLowerCase();keys[k]=true;if(['arrowleft','arrowright','arrowup'].indexOf(k)>=0)e.preventDefault();if(k==='r'){init();state.running=true;AOXSound.ensure();}});
  document.addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false;});
  canvas.addEventListener('touchmove',function(e){e.preventDefault();var r=canvas.getBoundingClientRect();var x=(e.touches[0].clientX-r.left)*(W/r.width);rocket.vx=(x-rocket.x)*0.3;},{passive:false});
  canvas.addEventListener('touchstart',function(e){e.preventDefault();keys['arrowup']=true;var r=canvas.getBoundingClientRect();var x=(e.touches[0].clientX-r.left)*(W/r.width);rocket.vx=(x-rocket.x)*0.3;},{passive:false});
  canvas.addEventListener('touchend',function(){keys['arrowup']=false;},{passive:false});
  document.getElementById('startBtn').addEventListener('click',function(){init();state.running=true;AOXSound.ensure();AOXSound.startBGM('game');SFX.select();if(AOXMobile.isTouch)AOXMobile.virtualKeys({dpad:true,keys:[{label:'↑',key:'ArrowUp',color:'rgba(229,57,53,0.85)',big:true}]});toast('升空！');});
  init();loop();
})();
</script>
</body>
</html>
