<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>像素冒险 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>
  #gameCanvas { background: #5fb53f; }
  .controls-help {
    color: white; text-shadow:2px 2px 0 #000; font-size:18px;
    margin-top:14px; line-height:1.6;
  }
  .key {
    display:inline-block; background:var(--mc-panel); border:2px solid #000;
    box-shadow: inset -3px -3px 0 0 var(--mc-shadow), inset 3px 3px 0 0 var(--mc-highlight);
    padding:4px 10px; font-family:'Press Start 2P',monospace; font-size:11px; margin:0 2px;
  }
</style>
</head>
<body>
<div class="floating-blocks"></div>

<div class="topbar">
  <a href="index.html" class="logo">⛏ AoXuan.World</a>
  <nav>
    <a href="index.html">首页</a>
    <a href="typing.html">打字游戏</a>
    <a href="mario.html">冒险</a>
    <a href="tetris.html">俄罗斯方块</a>
  </nav>
</div>

<div class="container center">
  <h1 class="title-3d" style="font-size:36px;">🍄 像素冒险</h1>
  <p class="subtitle">跳跃闯关，踩扁怪物，到达旗帜！</p>

  <div class="hud" style="margin-top:24px;">
    <div class="hud-item"><span class="label">金币</span><span id="coins">0</span></div>
    <div class="hud-item"><span class="label">钻石</span><span id="gems">0</span></div>
    <div class="hud-item"><span class="label">生命</span><span id="lives">♥♥♥</span></div>
    <div class="hud-item"><span class="label">时间</span><span id="time">300</span></div>
  </div>

  <div class="game-stage" style="margin-top:8px;">
    <canvas id="gameCanvas" width="800" height="450"></canvas>
  </div>

  <div class="controls-help">
    <span class="key">←</span><span class="key">→</span> 移动 ·
    <span class="key">↑</span> 或 <span class="key">空格</span> 跳跃 ·
    <span class="key">R</span> 重新开始
  </div>

  <div style="margin-top:18px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap;">
    <button class="mc-btn green" id="startBtn">▶ 开始冒险</button>
    <a href="index.html" class="mc-btn">← 返回大厅</a>
  </div>
</div>

<div class="ground" style="position:fixed; bottom:0; left:0; right:0; z-index:0;"></div>

<script src="sound.js"></script>
<script src="mobile.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;

  // 关卡设计：平台 {x,y,w,h,type}
  // 世界宽度（可滚动）
  var WORLD_W = 3200;
  var GRAVITY = 0.6, JUMP = -12, MOVE = 3.2;

  var state, player, cam, keys, particles;

  function initLevel(){
    state = {
      running:false, coins:0, gems:0, lives:3, time:300, timeTick:0,
      won:false, dead:false
    };
    player = { x:60, y:300, w:24, h:32, vx:0, vy:0, onGround:false, dir:1, anim:0, invuln:0 };
    cam = { x:0 };
    keys = {};
    particles = [];

    // 平台 (草地/泥土/砖块)
    state.platforms = [
      // 主地面段（有缺口）
      {x:0,y:400,w:600,h:50,type:'grass'},
      {x:680,y:400,w:500,h:50,type:'grass'},
      {x:1280,y:400,w:400,h:50,type:'grass'},
      {x:1780,y:400,w:600,h:50,type:'grass'},
      {x:2480,y:400,w:720,h:50,type:'grass'},
      // 浮空平台
      {x:250,y:310,w:90,h:20,type:'brick'},
      {x:420,y:250,w:90,h:20,type:'brick'},
      {x:720,y:300,w:120,h:20,type:'brick'},
      {x:920,y:250,w:80,h:20,type:'brick'},
      {x:1100,y:200,w:100,h:20,type:'brick'},
      {x:1350,y:300,w:120,h:20,type:'brick'},
      {x:1550,y:240,w:100,h:20,type:'brick'},
      {x:1850,y:320,w:120,h:20,type:'brick'},
      {x:2050,y:260,w:100,h:20,type:'brick'},
      {x:2250,y:200,w:80,h:20,type:'brick'},
      {x:2600,y:300,w:120,h:20,type:'brick'},
      {x:2800,y:240,w:100,h:20,type:'brick'},
      // 高台（终点附近）
      {x:3000,y:340,w:200,h:60,type:'stone'},
    ];

    // 金币
    state.coins_list = [];
    var cp = [[270,270],[440,210],[740,260],[940,210],[1120,160],[1370,260],[1570,200],[1870,280],[2070,220],[2270,160],[2620,260],[2820,200],[400,360],[1000,360],[1700,360],[2700,360]];
    cp.forEach(function(c){ state.coins_list.push({x:c[0],y:c[1],got:false,t:Math.random()*6}); });

    // 钻石（稀有）
    state.gems_list = [
      {x:1120,y:140,got:false},{x:2270,y:140,got:false},{x:2820,y:180,got:false}
    ];

    // 怪物
    state.enemies = [
      {x:300,y:372,w:24,h:28,vx:-1,type:'creeper',alive:true,anim:0},
      {x:800,y:372,w:24,h:28,vx:-1,type:'zombie',alive:true,anim:0},
      {x:1400,y:372,w:24,h:28,vx:1,type:'creeper',alive:true,anim:0},
      {x:1900,y:372,w:24,h:28,vx:-1,type:'zombie',alive:true,anim:0},
      {x:2600,y:372,w:24,h:28,vx:1,type:'creeper',alive:true,anim:0},
      {x:2900,y:372,w:24,h:28,vx:-1,type:'zombie',alive:true,anim:0},
    ];

    // 终点旗
    state.flag = {x:3120, y:240};

    updateHud();
  }

  function updateHud(){
    document.getElementById('coins').textContent = state.coins;
    document.getElementById('gems').textContent = state.gems;
    document.getElementById('lives').textContent = '♥'.repeat(Math.max(0,state.lives))||'—';
    document.getElementById('time').textContent = state.time;
  }

  // ===== 输入 =====
  document.addEventListener('keydown', function(e){
    keys[e.key.toLowerCase()] = true;
    if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()) || e.key===' '){
      e.preventDefault();
    }
    if(e.key.toLowerCase()==='r'){ initLevel(); state.running=true; }
  });
  document.addEventListener('keyup', function(e){ keys[e.key.toLowerCase()] = false; });

  // ===== 碰撞 =====
  function rectCollide(a,b){
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  }

  // ===== 更新 =====
  function update(){
    if(!state.running) return;
    if(state.won || state.dead) return;

    // 时间
    state.timeTick++;
    if(state.timeTick>=60){ state.timeTick=0; state.time--; updateHud(); if(state.time<=0) playerDie(); }

    // 移动（键盘 + 触屏）
    var goLeft = keys['arrowleft']||keys['a'] || (AOXMobile.isTouch && AOXMobile.state.left);
    var goRight = keys['arrowright']||keys['d'] || (AOXMobile.isTouch && AOXMobile.state.right);
    if(goLeft){ player.vx = -MOVE; player.dir=-1; }
    else if(goRight){ player.vx = MOVE; player.dir=1; }
    else player.vx *= 0.8;

    var goJump = (keys['arrowup']||keys['w']||keys[' ']) || (AOXMobile.isTouch && AOXMobile.state.a);
    if(goJump && player.onGround){
      player.vy = JUMP; player.onGround = false;
      SFX.jump();
      spawnParticles(player.x+player.w/2, player.y+player.h, 6, '#fff');
    }

    player.vy += GRAVITY;
    if(player.vy>15) player.vy=15;

    // 水平移动+碰撞
    player.x += player.vx;
    if(player.x<0) player.x=0;
    for(var i=0;i<state.platforms.length;i++){
      var p = state.platforms[i];
      if(rectCollide(player,p)){
        if(player.vx>0) player.x = p.x - player.w;
        else if(player.vx<0) player.x = p.x + p.w;
        player.vx=0;
      }
    }
    if(player.x>WORLD_W-player.w) player.x=WORLD_W-player.w;

    // 垂直移动+碰撞
    player.y += player.vy;
    player.onGround=false;
    for(var j=0;j<state.platforms.length;j++){
      var pl = state.platforms[j];
      if(rectCollide(player,pl)){
        if(player.vy>0){ player.y = pl.y - player.h; player.vy=0; player.onGround=true; }
        else if(player.vy<0){ player.y = pl.y + pl.h; player.vy=0; }
      }
    }

    // 掉出屏幕
    if(player.y > H+50){ playerDie(); }

    player.anim += Math.abs(player.vx)*0.2;
    if(player.invuln>0) player.invuln--;

    // 摄像机
    var targetCam = player.x - W/2 + player.w/2;
    if(targetCam<0) targetCam=0;
    if(targetCam>WORLD_W-W) targetCam=WORLD_W-W;
    cam.x += (targetCam - cam.x)*0.15;

    // 金币
    state.coins_list.forEach(function(c){
      c.t += 0.15;
      if(!c.got && rectCollide(player,{x:c.x-10,y:c.y-10,w:20,h:20})){
        c.got=true; state.coins++; updateHud();
        SFX.coin();
        spawnParticles(c.x, c.y, 10, '#ffd700');
        toast('+1 金币');
      }
    });

    // 钻石
    state.gems_list.forEach(function(g){
      if(!g.got && rectCollide(player,{x:g.x-12,y:g.y-12,w:24,h:24})){
        g.got=true; state.gems++; state.coins+=5; updateHud();
        SFX.gem();
        spawnParticles(g.x, g.y, 16, '#4dd0e1');
        toast('💎 钻石！+5 金币');
      }
    });

    // 敌人
    state.enemies.forEach(function(en){
      if(!en.alive) return;
      en.anim += 0.1;
      en.x += en.vx;
      // 边界巡逻（在所在平台上）
      // 简单地用世界边界和遇墙反转
      for(var k=0;k<state.platforms.length;k++){
        var pp = state.platforms[k];
        if(rectCollide(en,pp)){
          if(en.vx>0) en.x = pp.x - en.w;
          else en.x = pp.x + pp.w;
          en.vx *= -1;
        }
      }
      // 防止掉落：如果没有脚下平台，反转
      var footP = {x:en.x+2, y:en.y+en.h, w:en.w-4, h:4};
      var onP = false;
      for(var m=0;m<state.platforms.length;m++){
        if(rectCollide(footP, state.platforms[m])){ onP=true; break; }
      }
      if(!onP) en.vx *= -1;

      // 与玩家碰撞
      if(rectCollide(player, en)){
        if(player.vy>0 && player.y+player.h < en.y+en.h/2+6){
          // 踩到
          en.alive=false; player.vy=JUMP*0.7;
          SFX.hit(); SFX.jump();
          spawnParticles(en.x+en.w/2, en.y, 14, en.type==='creeper'?'#5fb53f':'#2e7d32');
          state.coins+=2; updateHud();
          toast('消灭！+2');
        } else if(player.invuln<=0){
          // 受伤
          playerHurt();
        }
      }
    });

    // 终点
    if(rectCollide(player, {x:state.flag.x, y:state.flag.y, w:30, h:100})){
      state.won = true; state.running=false;
      AOXSound.stopBGM();
      SFX.win();
      toast('🎉 通关！得分:'+(state.coins*10+state.gems*50+state.time*2));
    }

    // 粒子
    for(var n=particles.length-1;n>=0;n--){
      var pt = particles[n];
      pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.3; pt.life--;
      if(pt.life<=0) particles.splice(n,1);
    }
  }

  function spawnParticles(x,y,n,color){
    for(var i=0;i<n;i++){
      var a=Math.random()*Math.PI*2, s=1+Math.random()*4;
      particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:30,color:color,size:2+Math.random()*3});
    }
  }

  function playerHurt(){
    state.lives--; player.invuln=90; player.vy=-8; player.vx = player.dir*-4;
    SFX.hurt();
    updateHud(); toast('受伤！生命 -1');
    if(state.lives<=0) playerDie();
  }

  function playerDie(){
    state.dead=true; state.running=false;
    AOXSound.stopBGM();
    SFX.lose();
    state.lives=0; updateHud();
  }

  // ===== 渲染 =====
  function drawBlock(x,y,w,h,color,light){
    ctx.fillStyle = color;
    ctx.fillRect(x,y,w,h);
    ctx.fillStyle = light || 'rgba(255,255,255,0.25)';
    ctx.fillRect(x,y,w,3);
    ctx.fillRect(x,y,3,h);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(x,y+h-3,w,3);
    ctx.fillRect(x+w-3,y,3,h);
  }

  function drawPlatform(p){
    var sx = p.x - cam.x;
    if(p.type==='grass'){
      drawBlock(sx, p.y, p.w, p.h, '#8b5a2b');
      drawBlock(sx, p.y, p.w, 10, '#5fb53f');
      // 草纹理
      for(var i=0;i<p.w;i+=16){
        ctx.fillStyle='#3d8b2a'; ctx.fillRect(sx+i+6, p.y+4, 2, 4);
      }
    } else if(p.type==='brick'){
      drawBlock(sx, p.y, p.w, p.h, '#b5651d');
      ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=2;
      for(var bx=0;bx<p.w;bx+=20){
        ctx.beginPath(); ctx.moveTo(sx+bx,p.y); ctx.lineTo(sx+bx,p.y+p.h); ctx.stroke();
      }
      ctx.beginPath(); ctx.moveTo(sx,p.y+p.h/2); ctx.lineTo(sx+p.w,p.y+p.h/2); ctx.stroke();
    } else if(p.type==='stone'){
      drawBlock(sx, p.y, p.w, p.h, '#7f7f7f');
      ctx.fillStyle='rgba(0,0,0,0.2)';
      for(var sx2=0;sx2<p.w;sx2+=16){ ctx.fillRect(sx+sx2+6, p.y+8, 4, 4); }
    }
  }

  function drawPlayer(){
    var sx = player.x - cam.x;
    if(player.invuln>0 && Math.floor(player.invuln/4)%2===0) return;
    var bob = player.onGround ? Math.sin(player.anim)*1.5 : 0;
    // 身体（绿色史蒂夫）
    drawBlock(sx+2, player.y+8+bob, 20, 18, '#3d8b2a');
    // 头
    drawBlock(sx+4, player.y-2+bob, 16, 14, '#f0c8a0');
    // 头发
    drawBlock(sx+4, player.y-2+bob, 16, 4, '#4a2c12');
    // 眼睛
    ctx.fillStyle='#fff'; ctx.fillRect(sx+ (player.dir>0?12:7), player.y+4+bob, 3, 3);
    ctx.fillStyle='#000'; ctx.fillRect(sx+ (player.dir>0?13:8), player.y+5+bob, 1, 2);
    // 腿
    var legOffset = player.onGround ? Math.sin(player.anim)*3 : 0;
    drawBlock(sx+4, player.y+26, 6, 6, '#1565c0');
    drawBlock(sx+14, player.y+26, 6, 6, '#1565c0');
    // 手
    drawBlock(sx, player.y+10+bob, 4, 10, '#3d8b2a');
    drawBlock(sx+20, player.y+10+bob, 4, 10, '#3d8b2a');
  }

  function drawEnemy(en){
    if(!en.alive) return;
    var sx = en.x - cam.x;
    if(en.type==='creeper'){
      // 苦力怕：绿色四足
      drawBlock(sx+2, en.y+2, 20, 20, '#5fb53f');
      drawBlock(sx+2, en.y, 20, 4, '#3d8b2a');
      // 脸
      ctx.fillStyle='#000';
      ctx.fillRect(sx+6, en.y+8, 4, 6);
      ctx.fillRect(sx+14, en.y+8, 4, 6);
      ctx.fillRect(sx+8, en.y+16, 8, 2);
      ctx.fillRect(sx+10, en.y+18, 4, 4);
      // 脚
      drawBlock(sx+2, en.y+22, 6, 6, '#3d8b2a');
      drawBlock(sx+16, en.y+22, 6, 6, '#3d8b2a');
    } else {
      // 僵尸：青绿色
      drawBlock(sx+2, en.y, 20, 14, '#4a8b6b');
      drawBlock(sx+4, en.y-4, 16, 6, '#5a9b7b');
      ctx.fillStyle='#000';
      ctx.fillRect(sx+7, en.y+4, 3, 3);
      ctx.fillRect(sx+14, en.y+4, 3, 3);
      drawBlock(sx, en.y+14, 4, 10, '#4a8b6b');
      drawBlock(sx+20, en.y+14, 4, 10, '#4a8b6b');
      drawBlock(sx+4, en.y+24, 6, 4, '#1565c0');
      drawBlock(sx+14, en.y+24, 6, 4, '#1565c0');
    }
  }

  function drawCoin(c){
    if(c.got) return;
    var sx = c.x - cam.x;
    var bob = Math.sin(c.t)*3;
    var w = 14 + Math.sin(c.t*2)*2;
    drawBlock(sx-w/2, c.y-7+bob, w, 14, '#ffd700');
    ctx.fillStyle='#b8860b'; ctx.fillRect(sx-2, c.y-4+bob, 4, 8);
  }

  function drawGem(g){
    if(g.got) return;
    var sx = g.x - cam.x;
    drawBlock(sx-7, g.y-7, 14, 14, '#4dd0e1');
    ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.fillRect(sx-5, g.y-5, 4, 4);
    ctx.fillStyle='#00838f'; ctx.fillRect(sx-7, g.y+3, 14, 4);
  }

  function drawFlag(){
    var sx = state.flag.x - cam.x;
    // 旗杆
    drawBlock(sx, state.flag.y, 6, 120, '#7f7f7f');
    // 旗帜
    var wave = Math.sin(Date.now()/200)*4;
    ctx.fillStyle='#e53935';
    ctx.beginPath();
    ctx.moveTo(sx+6, state.flag.y+10);
    ctx.lineTo(sx+40+wave, state.flag.y+18);
    ctx.lineTo(sx+6, state.flag.y+30);
    ctx.fill();
    ctx.fillStyle='#fff';
    ctx.fillRect(sx+16, state.flag.y+16, 6, 6);
  }

  function draw(){
    // 背景渐变
    var g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#87ceeb'); g.addColorStop(1,'#b8e0f0');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    // 远景山（视差）
    ctx.fillStyle='rgba(100,180,100,0.5)';
    for(var m=0;m<8;m++){
      var mx = (m*500 - cam.x*0.3) % (W+400) - 200;
      ctx.beginPath();
      ctx.moveTo(mx, H); ctx.lineTo(mx+150, H-180); ctx.lineTo(mx+300, H);
      ctx.fill();
    }
    // 云（视差）
    ctx.fillStyle='rgba(255,255,255,0.85)';
    for(var c=0;c<6;c++){
      var cx = (c*400 - cam.x*0.5) % (W+300) - 150;
      var cy = 40 + (c%3)*30;
      ctx.fillRect(cx, cy, 80, 20);
      ctx.fillRect(cx+15, cy-12, 50, 16);
    }

    // 平台
    state.platforms.forEach(drawPlatform);

    // 金币钻石
    state.coins_list.forEach(drawCoin);
    state.gems_list.forEach(drawGem);

    // 敌人
    state.enemies.forEach(drawEnemy);

    // 旗
    drawFlag();

    // 玩家
    drawPlayer();

    // 粒子
    particles.forEach(function(pt){
      ctx.globalAlpha = pt.life/30;
      ctx.fillStyle = pt.color;
      ctx.fillRect(pt.x-cam.x, pt.y, pt.size, pt.size);
      ctx.globalAlpha=1;
    });

    // 结算
    if(!state.running){
      ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';
      if(state.won){
        ctx.fillStyle='#ffd700'; ctx.font='32px "Press Start 2P", monospace';
        ctx.fillText('🎉 通关成功！', W/2, H/2-30);
        ctx.fillStyle='#fff'; ctx.font='16px "Press Start 2P", monospace';
        ctx.fillText('金币:'+state.coins+'  钻石:'+state.gems+'  剩余时间:'+state.time, W/2, H/2+10);
        ctx.fillText('得分:'+(state.coins*10+state.gems*50+state.time*2), W/2, H/2+40);
      } else {
        ctx.fillStyle='#e53935'; ctx.font='32px "Press Start 2P", monospace';
        ctx.fillText(state.lives<=0?'游戏结束':'准备就绪', W/2, H/2-20);
        ctx.fillStyle='#fff'; ctx.font='14px "Press Start 2P", monospace';
        ctx.fillText('点击「开始冒险」或按 R 重新开始', W/2, H/2+20);
      }
    }
  }

  function loop(){ update(); draw(); requestAnimationFrame(loop); }

  document.getElementById('startBtn').addEventListener('click', function(){
    initLevel(); state.running=true;
    AOXSound.ensure(); AOXSound.startBGM('game'); SFX.select();
    if(AOXMobile.isTouch) AOXMobile.init({ dpad:true, actions:[{key:'a',label:'↑',color:'rgba(95,181,63,0.85)'}] });
    toast('冒险开始！方向键移动，空格跳跃');
  });

  initLevel();
  loop();
})();
</script>
</body>
</html>
