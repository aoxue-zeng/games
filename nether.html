<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下界探险 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>
  #gameCanvas { background:#1a0000; touch-action:none; }
  .key { display:inline-block; background:var(--mc-panel); border:2px solid #000; box-shadow: inset -2px -2px 0 0 var(--mc-shadow), inset 2px 2px 0 0 var(--mc-highlight); padding:3px 8px; font-family:'Press Start 2P',monospace; font-size:10px; margin:0 2px; }
</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar">
  <a href="index.html" class="logo">⛏ AoXuan.World</a>
  <nav>
    <a href="index.html">首页</a>
    <a href="lumberjack.html">伐木</a>
    <a href="crafting.html">合成台</a>
    <a href="redstone.html">红石</a>
    <a href="nether.html">下界</a>
    <a href="defend.html">苦力怕防御</a>
    <a href="fishing.html">钓鱼</a>
    <a href="treasure.html">寻宝</a>
    <a href="farm.html">农场</a>
    <a href="builder.html">建筑</a>
  </nav>
</div>
<div class="container center">
  <h1 class="title-3d" style="font-size:34px;color:#ff5722;text-shadow:3px 3px 0 #b71c1c;">🔥 下界探险</h1>
  <p class="subtitle">在岩浆上跳跃，别掉下去！</p>
  <div class="hud" style="margin-top:18px;">
    <div class="hud-item"><span class="label">距离</span><span id="dist">0</span>m</div>
    <div class="hud-item"><span class="label">生命</span><span id="lives">♥♥♥</span></div>
    <div class="hud-item"><span class="label">金粒</span><span id="gold">0</span></div>
    <div class="hud-item"><span class="label">最高</span><span id="best">0</span>m</div>
  </div>
  <div class="game-stage" style="margin-top:14px;"><canvas id="gameCanvas" width="560" height="400"></canvas></div>
  <p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:16px;margin-top:12px;">
    <span class="key">←→</span> 移动 · <span class="key">↑/空格</span> 跳 · 平台在动，躲岩浆 · <span class="key">R</span> 重开
  </p>
  <div style="margin-top:14px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
    <button class="mc-btn green" id="startBtn">▶ 开始游戏</button>
    <a href="index.html" class="mc-btn">← 返回大厅</a>
  </div>
</div>
<div class="ground" style="position:fixed;bottom:0;left:0;right:0;z-index:0;"></div>
<script src="sound.js"></script>
<script src="mobile.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  var canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  var state,player,platforms,particles,keys,camX,scrollSpeed,tick;
  var GRAVITY=0.5,JUMP=-10,MOVE=3.5;
  function init(){
    state={running:false,over:false,dist:0,lives:3,gold:0,best:getBest()};
    player={x:100,y:200,vx:0,vy:0,w:22,h:30,onGround:false,dir:1,anim:0,invuln:0};
    platforms=[{x:60,y:280,w:120,h:20}];particles=[];keys={};camX=0;scrollSpeed=1.2;tick=0;
    for(var i=0;i<8;i++)spawnPlatform();
    updateHud();
  }
  function getBest(){return parseInt(localStorage.getItem('nether_best')||'0',10);}
  function setBest(v){localStorage.setItem('nether_best',v);}
  function updateHud(){document.getElementById('dist').textContent=Math.floor(state.dist);document.getElementById('lives').textContent='♥'.repeat(Math.max(0,state.lives))||'—';document.getElementById('gold').textContent=state.gold;document.getElementById('best').textContent=state.best;}
  function spawnPlatform(){
    var last=platforms[platforms.length-1];
    var gap=50+Math.random()*70;var w=60+Math.random()*80;var y=200+Math.random()*100;
    platforms.push({x:last.x+last.w+gap,y:y,w:w,h:20,hasGold:Math.random()<0.4});
  }
  function update(){
    if(!state.running||state.over)return;
    tick++;state.dist+=scrollSpeed/5;
    scrollSpeed=1.2+state.dist/300;
    // 摄像机滚动（平台左移）
    platforms.forEach(function(p){p.x-=scrollSpeed;});
    // 玩家相对也受滚动影响
    if(keys['arrowleft']||keys['a']){player.vx=-MOVE;player.dir=-1;}
    else if(keys['arrowright']||keys['d']){player.vx=MOVE;player.dir=1;}
    else player.vx*=0.8;
    if((keys['arrowup']||keys['w']||keys[' '])&&player.onGround){player.vy=JUMP;player.onGround=false;SFX.jump();}
    player.vy+=GRAVITY;if(player.vy>12)player.vy=12;
    player.x+=player.vx;player.y+=player.vy;
    // 平台碰撞
    player.onGround=false;
    platforms.forEach(function(p){
      if(player.x+player.w>p.x&&player.x<p.x+p.w&&player.y+player.h>p.y&&player.y+player.h<p.y+p.h+10&&player.vy>=0){
        player.y=p.y-player.h;player.vy=0;player.onGround=true;
        if(p.hasGold){p.hasGold=false;state.gold++;SFX.coin();}
      }
    });
    // 掉进岩浆
    if(player.y>H){state.lives--;SFX.hurt();if(state.lives<=0){gameOver();}else{player.x=100;player.y=200;player.vy=0;player.invuln=60;}}
    if(player.invuln>0)player.invuln--;
    // 左边界
    if(player.x<camX+20){player.x=camX+20;state.lives--;SFX.hurt();player.x=camX+60;player.y=200;player.vy=0;if(state.lives<=0)gameOver();}
    // 生成新平台
    while(platforms[platforms.length-1].x<W*1.5)spawnPlatform();
    platforms=platforms.filter(function(p){return p.x+p.w>-50;});
    camX+=0; // 摄像机固定，平台滚动
    player.anim+=Math.abs(player.vx)*0.2;
    particles=particles.filter(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;return p.life>0;});
    if(state.dist>state.best){setBest(Math.floor(state.dist));state.best=Math.floor(state.dist);}
    updateHud();
  }
  function gameOver(){state.over=true;state.running=false;AOXSound.stopBGM();SFX.lose();}
  function draw(){
    // 岩浆背景
    ctx.fillStyle='#3d0a00';ctx.fillRect(0,0,W,H);
    var g=ctx.createLinearGradient(0,H-100,0,H);g.addColorStop(0,'#e55300');g.addColorStop(1,'#b71c1c');ctx.fillStyle=g;ctx.fillRect(0,H-80,W,80);
    // 岩浆波纹
    for(var i=0;i<W;i+=8){ctx.fillStyle='rgba(255,200,0,0.3)';ctx.fillRect(i,H-80+Math.sin((i+tick*2)*0.05)*4,6,3);}
    // 岩浆气泡
    if(tick%20===0)particles.push({x:Math.random()*W,y:H-70,vx:0,vy:-1-Math.random()*2,life:40,c:'#ff9800',size:3});
    // 平台（下界岩）
    platforms.forEach(function(p){
      ctx.fillStyle='#7f2a1a';ctx.fillRect(p.x,p.y,p.w,p.h);
      ctx.fillStyle='#5d1a0a';ctx.fillRect(p.x,p.y+p.h-4,p.w,4);
      ctx.fillStyle='#9c3a2a';ctx.fillRect(p.x,p.y,p.w,3);
      if(p.hasGold){ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd700';ctx.shadowBlur=8;ctx.fillRect(p.x+p.w/2-4,p.y-10,8,8);ctx.shadowBlur=0;}
    });
    // 玩家（史蒂夫）
    if(player.invuln<=0||Math.floor(player.invuln/4)%2===0){
      var px=player.x,py=player.y;var bob=player.onGround?Math.sin(player.anim)*1.5:0;
      ctx.fillStyle='#3d8b2a';ctx.fillRect(px,py+2+bob,player.w,18);
      ctx.fillStyle='#f0c8a0';ctx.fillRect(px+3,py-10+bob,16,12);
      ctx.fillStyle='#4a2c12';ctx.fillRect(px+3,py-10+bob,16,3);
      ctx.fillStyle='#fff';ctx.fillRect(px+(player.dir>0?10:4),py-5+bob,3,3);
      ctx.fillStyle='#1565c0';ctx.fillRect(px+2,py+20,7,8);ctx.fillRect(px+13,py+20,7,8);
    }
    particles.forEach(function(p){ctx.globalAlpha=p.life/40;ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,p.size,p.size);ctx.globalAlpha=1;});
    if(!state.running){
      ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
      if(state.over){ctx.fillStyle='#e53935';ctx.font='24px "Press Start 2P",monospace';ctx.fillText('掉入岩浆！',W/2,H/2-25);ctx.fillStyle='#ffd700';ctx.font='14px "Press Start 2P",monospace';ctx.fillText('距离:'+Math.floor(state.dist)+'m 最高:'+state.best+'m',W/2,H/2+10);ctx.fillStyle='#fff';ctx.font='11px "Press Start 2P",monospace';ctx.fillText('按 R 重玩',W/2,H/2+40);}
      else{ctx.fillStyle='#ff5722';ctx.font='22px "Press Start 2P",monospace';ctx.fillText('准备探险',W/2,H/2-10);ctx.fillStyle='#fff';ctx.font='11px "Press Start 2P",monospace';ctx.fillText('点击开始',W/2,H/2+25);}
    }
  }
  function loop(){update();draw();requestAnimationFrame(loop);}
  document.addEventListener('keydown',function(e){var k=e.key.toLowerCase();keys[k]=true;if(['arrowleft','arrowright','arrowup',' '].indexOf(k)>=0)e.preventDefault();if(k==='r'){init();state.running=true;AOXSound.ensure();}});
  document.addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false;});
  canvas.addEventListener('touchstart',function(e){e.preventDefault();keys[' ']=true;var r=canvas.getBoundingClientRect();var x=(e.touches[0].clientX-r.left)*(W/r.width);if(x<W/3)keys['arrowleft']=true;else if(x>W*2/3)keys['arrowright']=true;},{passive:false});
  canvas.addEventListener('touchend',function(e){e.preventDefault();keys[' ']=false;keys['arrowleft']=false;keys['arrowright']=false;},{passive:false});
  document.getElementById('startBtn').addEventListener('click',function(){init();state.running=true;AOXSound.ensure();AOXSound.startBGM('game');SFX.select();if(AOXMobile.isTouch)AOXMobile.virtualKeys({dpad:true,keys:[{label:'⏏',key:' ',color:'rgba(229,57,53,0.85)',big:true}]});toast('别掉岩浆！');});
  init();loop();
})();
</script>
</body>
</html>
