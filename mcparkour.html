<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MC跑酷 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>#gameCanvas{background:#87ceeb;touch-action:none}.key{display:inline-block;background:var(--mc-panel);border:2px solid #000;box-shadow:inset -2px -2px 0 0 var(--mc-shadow),inset 2px 2px 0 0 var(--mc-highlight);padding:3px 8px;font-family:'Press Start 2P',monospace;font-size:10px;margin:0 2px}</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar"><a href="index.html" class="logo">⛏ AoXuan.World</a>
<nav><a href="index.html">首页</a><a href="mcparkour.html">MC跑酷</a><a href="mc3d.html">3D我的世界</a><a href="sandbox3d.html">3D沙盒</a><a href="mario.html">冒险</a></nav></div>
<div class="container center">
<h1 class="title-3d" style="font-size:28px;color:#5fb53f">⛏ MC跑酷</h1>
<p class="subtitle">我的世界风格跑酷，跳方块躲岩浆！</p>
<div class="hud" style="margin-top:14px"><div class="hud-item"><span class="label">距离</span><span id="dist">0</span>m</div><div class="hud-item"><span class="label">金币</span><span id="coins">0</span></div><div class="hud-item"><span class="label">生命</span><span id="lives">♥♥♥</span></div><div class="hud-item"><span class="label">最高</span><span id="best">0</span>m</div></div>
<div class="game-stage" style="margin-top:10px"><canvas id="gameCanvas" width="560" height="380"></canvas></div>
<p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:14px;margin-top:8px"><span class="key">←→</span>移动 <span class="key">空格</span>跳 · 跳方块躲岩浆收金币</p>
<div style="margin-top:10px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><button class="mc-btn green" id="startBtn">▶ 开始</button><a href="index.html" class="mc-btn">← 返回</a></div>
</div><div class="ground" style="position:fixed;bottom:0;left:0;right:0;z-index:0"></div>
<script src="sound.js"></script><script src="mobile.js"></script><script src="shared.js"></script>
<script>
(function(){
var c=document.getElementById('gameCanvas'),x=c.getContext('2d'),W=c.width,H=c.height;
var G=0.5,J=-10,M=3;
var state,p,plat,coins,lava,tick,cam,keys_,particles,lives,coinCount,dist,best,scrollSpd;
function init(){
  state={running:false,over:false};p={x:40,y:280,w:22,h:30,vx:0,vy:0,onG:false,dir:1,anim:0,inv:60};
  plat=[];coins=[];lava=[];particles=[];tick=0;cam={x:0};keys_={};lives=3;coinCount=0;dist=0;best=parseInt(localStorage.getItem('mcparkour_best')||'0');scrollSpd=1.5;
  // 生成初始平台
  var px=0;
  for(var i=0;i<30;i++){
    var pw=60+Math.random()*80;
    var py=280+Math.floor(Math.random()*60)-30;
    plat.push({x:px,y:py,w:pw,h:40,type:Math.random()<0.7?'grass':'stone'});
    if(Math.random()<0.4)coins.push({x:px+pw/2,y:py-20,got:false,t:Math.random()*6});
    if(Math.random()<0.2&&i>3)lava.push({x:px+pw+10,y:340,w:30+Math.random()*40});
    px+=pw+20+Math.random()*60;
  }
  updateHud();
}
function updateHud(){document.getElementById('dist').textContent=Math.floor(dist);document.getElementById('coins').textContent=coinCount;document.getElementById('lives').textContent='♥'.repeat(lives)||'—';document.getElementById('best').textContent=best;}
function rc(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function update(){
  if(!state.running||state.over)return;tick++;dist+=scrollSpd/5;scrollSpd=1.5+dist/500;
  if(keys_['arrowleft']||keys_['a']){p.vx=-M;p.dir=-1;}else if(keys_['arrowright']||keys_['d']){p.vx=M;p.dir=1;}else p.vx*=0.8;
  if((keys_[' ']||keys_['arrowup']||keys_['w'])&&p.onG){p.vy=J;p.onG=false;SFX.jump();}
  p.vy+=G;if(p.vy>14)p.vy=14;
  // 水平
  p.x+=p.vx;if(p.x<0)p.x=0;
  for(var i=0;i<plat.length;i++){var pl=plat[i];if(rc(p,pl)){if(p.vx>0)p.x=pl.x-p.w;else if(p.vx<0)p.x=pl.x+pl.w;p.vx=0;}}
  // 垂直
  p.y+=p.vy;p.onG=false;
  for(var j=0;j<plat.length;j++){var pl=plat[j];if(rc(p,pl)){if(p.vy>0){p.y=pl.y-p.h;p.vy=0;p.onG=true;}else if(p.vy<0){p.y=pl.y+pl.h;p.vy=0;}}}
  // 岩浆
  lava.forEach(function(l){if(rc(p,{x:l.x,y:340,w:l.w,h:40})&&p.inv<=0){lives--;p.inv=60;SFX.hurt();ex(p.x,p.y,'#ff5722');if(lives<=0)gameOver();updateHud();}});
  // 金币
  coins.forEach(function(c2){c2.t+=0.15;if(!c2.got&&Math.abs(p.x+11-c2.x)<16&&Math.abs(p.y+15-c2.y)<16){c2.got=true;coinCount++;SFX.coin();updateHud();}});
  // 滚动
  var tc=p.x-200;if(tc<0)tc=0;cam.x+=(tc-cam.x)*0.1;
  // 生成新平台
  if(plat.length>0&&plat[plat.length-1].x-cam.x<W*1.5){
    var last=plat[plat.length-1];var pw=60+Math.random()*80;var py=280+Math.floor(Math.random()*60)-30;
    plat.push({x:last.x+last.w+20+Math.random()*60,y:py,w:pw,h:40,type:Math.random()<0.7?'grass':'stone'});
    if(Math.random()<0.4)coins.push({x:last.x+last.w+20+Math.random()*60+pw/2,y:py-20,got:false,t:Math.random()*6});
    if(Math.random()<0.2)lava.push({x:last.x+last.w+10,y:340,w:30+Math.random()*40});
  }
  // 清理远处的
  plat=plat.filter(function(pl){return pl.x+pl.w>cam.x-100;});
  coins=coins.filter(function(c2){return c2.x>cam.x-100;});
  lava=lava.filter(function(l){return l.x+l.w>cam.x-100;});
  if(p.inv>0)p.inv--;p.anim+=Math.abs(p.vx)*0.2;
  // 掉出
  if(p.y>H+60){lives--;p.x=cam.x+40;p.y=280;p.vy=0;p.inv=60;SFX.hurt();if(lives<=0)gameOver();updateHud();}
  particles=particles.filter(function(pp){pp.x+=pp.vx;pp.y+=pp.vy;pp.vy+=0.2;pp.life--;return pp.life>0;});
}
function ex(x,y,col){for(var i=0;i<6;i++){var a=Math.random()*7,s=1+Math.random()*3;particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:20,c:col,size:2+Math.random()*3});}}
function gameOver(){state.over=true;state.running=false;SFX.lose();if(Math.floor(dist)>best){localStorage.setItem('mcparkour_best',Math.floor(dist));best=Math.floor(dist);}updateHud();}
function draw(){
  x.fillStyle='#87ceeb';x.fillRect(0,0,W,H);
  // 云
  x.fillStyle='rgba(255,255,255,0.7)';for(var cl=0;cl<3;cl++){var cx=((cl*200-cam.x*0.3)%600+600)%600-50;x.fillRect(cx,40+cl*20,70,16);}
  // 平台
  plat.forEach(function(pl){var sx=pl.x-cam.x;if(sx+pl.w<0||sx>W)return;
    if(pl.type==='grass'){x.fillStyle='#5fb53f';x.fillRect(sx,pl.y,pl.w,8);x.fillStyle='#8b5a2b';x.fillRect(sx,pl.y+8,pl.w,pl.h-8);x.fillStyle='#6b4220';for(var d=0;d<pl.w;d+=16)x.fillRect(sx+d+6,pl.y+12,2,pl.h-12);}
    else{x.fillStyle='#7f7f7f';x.fillRect(sx,pl.y,pl.w,pl.h);x.fillStyle='#555';x.fillRect(sx,pl.y,pl.w,3);x.fillStyle='#999';for(var d=0;d<pl.w;d+=20)x.fillRect(sx+d+4,pl.y+8,4,4);}});
  // 岩浆
  lava.forEach(function(l){var sx=l.x-cam.x;if(sx+l.w<0||sx>W)return;x.fillStyle='#ff5722';x.fillRect(sx,340,l.w,40);x.fillStyle='rgba(255,200,0,0.5)';x.fillRect(sx,340+Math.sin(tick*0.1+l.x)*3,l.w,5);});
  // 金币
  coins.forEach(function(c2){if(c2.got)return;var sx=c2.x-cam.x;if(sx<-10||sx>W+10)return;x.fillStyle='#ffd700';x.shadowColor='#ffd700';x.shadowBlur=4;x.fillRect(sx-4,c2.y-4+Math.sin(c2.t)*2,8,8);x.shadowBlur=0;});
  // 玩家(史蒂夫)
  if(p.inv<=0||Math.floor(p.inv/4)%2===0){var sx=p.x-cam.x;var bob=p.onG?Math.sin(p.anim)*1.5:0;x.fillStyle='#3d8b2a';x.fillRect(sx+2,p.y+8+bob,18,16);x.fillStyle='#f0c8a0';x.fillRect(sx+4,p.y-2+bob,14,12);x.fillStyle='#4a2c12';x.fillRect(sx+4,p.y-2+bob,14,3);x.fillStyle='#fff';x.fillRect(sx+(p.dir>0?11:6),p.y+3+bob,3,3);x.fillStyle='#000';x.fillRect(sx+(p.dir>0?12:7),p.y+4+bob,1,2);x.fillStyle='#1565c0';x.fillRect(sx+3,p.y+24,6,6);x.fillRect(sx+13,p.y+24,6,6);}
  particles.forEach(function(pp){x.globalAlpha=pp.life/20;x.fillStyle=pp.c;x.fillRect(pp.x-cam.x,pp.y,pp.size,pp.size);x.globalAlpha=1;});
  if(!state.running){x.fillStyle='rgba(0,0,0,0.7)';x.fillRect(0,0,W,H);x.textAlign='center';if(state.over){x.fillStyle='#e53935';x.font='22px "Press Start 2P",monospace';x.fillText('Game Over',W/2,H/2-20);x.fillStyle='#ffd700';x.font='13px "Press Start 2P",monospace';x.fillText('Dist:'+Math.floor(dist)+'m Coins:'+coinCount,W/2,H/2+8);x.fillStyle='#fff';x.font='10px "Press Start 2P",monospace';x.fillText('Press R',W/2,H/2+35);}else{x.fillStyle='#5fb53f';x.font='20px "Press Start 2P",monospace';x.fillText('Ready',W/2,H/2-8);x.font='10px "Press Start 2P",monospace';x.fillText('Click start',W/2,H/2+20);}}}
function loop(){update();draw();requestAnimationFrame(loop);}
document.addEventListener('keydown',function(e){keys_[e.key.toLowerCase()]=true;if([' ','arrowup','arrowleft','arrowright'].indexOf(e.key.toLowerCase())>=0)e.preventDefault();if(e.key.toLowerCase()==='r'){init();state.running=true;}});
document.addEventListener('keyup',function(e){keys_[e.key.toLowerCase()]=false;});
c.addEventListener('touchstart',function(e){e.preventDefault();keys_[' ']=true;setTimeout(function(){keys_[' ']=false;},200);},{passive:false});
c.addEventListener('touchmove',function(e){e.preventDefault();var r=c.getBoundingClientRect();var tx=e.touches[0].clientX-r.left;if(tx<W/2){keys_['arrowleft']=true;keys_['arrowright']=false;}else{keys_['arrowright']=true;keys_['arrowleft']=false;}},{passive:false});
c.addEventListener('touchend',function(e){e.preventDefault();keys_['arrowleft']=false;keys_['arrowright']=false;},{passive:false});
document.getElementById('startBtn').addEventListener('click',function(){init();state.running=true;AOXSound.ensure();AOXSound.startBGM('game');SFX.select();toast('MC跑酷！');});
init();loop();
})();
</script>
</body></html>
