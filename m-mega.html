<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>超级蘑菇变大 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>#gameCanvas{background:#87ceeb;touch-action:none}.key{display:inline-block;background:var(--mc-panel);border:2px solid #000;box-shadow:inset -2px -2px 0 0 var(--mc-shadow),inset 2px 2px 0 0 var(--mc-highlight);padding:3px 8px;font-family:'Press Start 2P',monospace;font-size:10px;margin:0 2px}</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar"><a href="index.html" class="logo">⛏ AoXuan.World</a>
<nav><a href="index.html">首页</a><a href="m-poison.html">毒蘑菇</a><a href="m-parachute.html">降落伞</a><a href="m-coins.html">金币射击</a><a href="m-escape.html">城堡逃脱</a><a href="m-rocket.html">火箭马里奥</a><a href="m-1up.html">1-Up</a><a href="m-circus.html">马戏</a><a href="m-puzzle.html">拼图</a><a href="m-mega.html">超级蘑菇</a><a href="m-rhythm.html">节奏</a><a href="m-dig.html">挖洞</a><a href="m-brawl.html">大乱斗</a></nav></div>
<div class="container center">
<h1 class="title-3d" style="font-size:30px;">🍄 超级蘑菇变大</h1>
<p class="subtitle">吃蘑菇变大，撞碎砖块！</p>
<div class="hud" style="margin-top:18px"><div class="hud-item"><span class="label">得分</span><span id="score">0</span></div><div class="hud-item"><span class="label">体型</span><span id="size">小</span></div><div class="hud-item"><span class="label">砖块</span><span id="bricks">0</span></div><div class="hud-item"><span class="label">最高</span><span id="best">0</span></div></div>
<div class="game-stage" style="margin-top:14px"><canvas id="gameCanvas" width="480" height="380"></canvas></div>
<p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:15px;margin-top:10px"><span class="key">←→</span>移动 <span class="key">空格</span>跳 · 大时顶碎砖块 · <span class="key">R</span>重开</p>
<div style="margin-top:12px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><button class="mc-btn green" id="startBtn">▶ 开始</button><a href="index.html" class="mc-btn">← 返回</a></div>
</div><div class="ground" style="position:fixed;bottom:0;left:0;right:0;z-index:0"></div>
<script src="sound.js"></script><script src="mobile.js"></script><script src="shared.js"></script>
<script>
(function(){
var c=document.getElementById('gameCanvas'),x=c.getContext('2d'),W=c.width,H=c.height;
var s,p,bricks,pts,keys,tick,G=0.5,J=-10;
function init(){s={running:false,over:false,score:0,big:false,best:getBest()};p={x:80,y:300,vx:0,vy:0,onG:false,w:20,h:24,anim:0,inv:0};bricks=[];pts=[];keys={};tick=0;buildBricks();updateHud();}
function getBest(){return parseInt(localStorage.getItem('mmega_best')||'0',10)}
function setBest(v){localStorage.setItem('mmega_best',v)}
function buildBricks(){bricks=[];for(var r=0;r<3;r++)for(var c2=0;c2<8;c2++){bricks.push({x:40+c2*50,y:60+r*30,w:46,h:26,alive:true,hasMush:Math.random()<0.3})}}
function updateHud(){document.getElementById('score').textContent=s.score;document.getElementById('size').textContent=s.big?'大':'小';document.getElementById('bricks').textContent=bricks.filter(function(b){return b.alive}).length;document.getElementById('best').textContent=s.best;}
function update(){if(!s.running||s.over)return;tick++;
if(keys['arrowleft']||keys['a'])p.vx=-3;if(keys['arrowright']||keys['d'])p.vx=3;if(!keys['arrowleft']&&!keys['a']&&!keys['arrowright']&&!keys['d'])p.vx*=0.8;
if((keys[' ']||keys['arrowup'])&&p.onG){p.vy=J;p.onG=false;SFX.jump();}
p.vy+=G;p.x+=p.vx;p.y+=p.vy;p.x=Math.max(15,Math.min(W-15,p.x));p.onG=false;
if(p.y>H-40){p.y=H-40;p.vy=0;p.onG=true;}
// 砖块碰撞
bricks.forEach(function(b){if(!b.alive)return;if(p.x+p.w/2>b.x&&p.x-p.w/2<b.x+b.w&&p.y-p.h/2<b.y+b.h&&p.y+p.h/2>b.y){
if(p.vy<0&&p.y-p.h/2<b.y+10){p.y=b.y+b.h+p.h/2;p.vy=0;if(s.big){b.alive=false;s.score+=10;SFX.clear();ex(b.x+b.w/2,b.y+b.h/2,'#b5651d');if(b.hasMush){s.big=true;s.score+=20;SFX.gem();toast('超级蘑菇！变大！')}}}else{if(b.hasMush){b.alive=false;b.hasMush=false;s.big=true;s.score+=20;SFX.gem();ex(b.x+b.w/2,b.y+b.h/2,'#4caf50');toast('变大！')}else{p.y=b.y+b.h+p.h/2;p.vy=0;SFX.dig()}}}});
p.w=s.big?30:20;p.h=s.big?36:24;p.anim+=0.2;
pts=pts.filter(function(pp){pp.x+=pp.vx;pp.y+=pp.vy;pp.vy+=0.2;pp.life--;return pp.life>0});
if(s.score>s.best){setBest(s.score);s.best=s.score;updateHud();}
if(bricks.every(function(b){return !b.alive})){buildBricks();SFX.levelUp();toast('新一排！')}}
function ex(x,y,c){for(var i=0;i<8;i++){var a=Math.random()*7,s=1+Math.random()*3;pts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:20,c:c,size:2+Math.random()*3})}}
function over(){s.over=true;s.running=false;AOXSound.stopBGM();SFX.lose();}
function draw(){
x.fillStyle='#87ceeb';x.fillRect(0,0,W,H);x.fillStyle='#5fb53f';x.fillRect(0,H-30,W,30);x.fillStyle='#3d8b2a';x.fillRect(0,H-30,W,6);
bricks.forEach(function(b){if(!b.alive)return;x.fillStyle='#b5651d';x.fillRect(b.x,b.y,b.w,b.h);x.strokeStyle='#5d3a1a';x.lineWidth=2;x.strokeRect(b.x,b.y,b.w,b.h);x.beginPath();x.moveTo(b.x+b.w/2,b.y);x.lineTo(b.x+b.w/2,b.y+b.h);x.moveTo(b.x,b.y+b.h/2);x.lineTo(b.x+b.w,b.y+b.h/2);x.stroke();if(b.hasMush){x.fillStyle='rgba(76,175,80,0.5)';x.fillRect(b.x,b.y,b.w,b.h)}});
var px=p.x,py=p.y,sc=s.big?1.5:1;var bob=p.onG?Math.sin(p.anim)*1.5:0;
x.fillStyle='#e53935';x.fillRect(px-p.w/2,py-p.h/2+2+bob,p.w,p.h-4);x.fillStyle='#ff9800';x.fillRect(px-p.w/2+2,py-p.h/2-8+bob,p.w-4,10);x.fillStyle='#e53935';x.fillRect(px-p.w/2+2,py-p.h/2-8+bob,p.w-4,3);x.fillStyle='#fff';x.fillRect(px-5,py-p.h/2-4+bob,3,3);x.fillRect(px+2,py-p.h/2-4+bob,3,3);x.fillStyle='#1565c0';x.fillRect(px-p.w/2+2,py+p.h/2-8,6,8);x.fillRect(px+p.w/2-8,py+p.h/2-8,6,8);
pts.forEach(function(pp){x.globalAlpha=pp.life/20;x.fillStyle=pp.c;x.fillRect(pp.x,pp.y,pp.size,pp.size);x.globalAlpha=1});
if(!s.running){x.fillStyle='rgba(0,0,0,0.7)';x.fillRect(0,0,W,H);x.textAlign='center';x.fillStyle='#4caf50';x.font='20px "Press Start 2P",monospace';x.fillText('准备',W/2,H/2-8);x.fillStyle='#fff';x.font='10px "Press Start 2P",monospace';x.fillText('点击开始',W/2,H/2+20);}}
function loop(){update();draw();requestAnimationFrame(loop);}
document.addEventListener('keydown',function(e){keys[e.key.toLowerCase()]=true;if([' ','arrowup','arrowleft','arrowright'].indexOf(e.key.toLowerCase())>=0)e.preventDefault();if(e.key.toLowerCase()==='r'){init();s.running=true;AOXSound.ensure();}});
document.addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false});
c.addEventListener('touchstart',function(e){e.preventDefault();keys[' ']=true;var r=c.getBoundingClientRect();var nx=(e.touches[0].clientX-r.left)*(W/r.width);if(nx<W/2)keys['arrowleft']=true;else keys['arrowright']=true},{passive:false});
c.addEventListener('touchend',function(){keys[' ']=false;keys['arrowleft']=false;keys['arrowright']=false},{passive:false});
document.getElementById('startBtn').addEventListener('click',function(){init();s.running=true;AOXSound.ensure();AOXSound.startBGM('game');SFX.select();if(AOXMobile.isTouch)AOXMobile.virtualKeys({dpad:true,keys:[{label:'⏏',key:' ',color:'rgba(229,57,53,0.85)',big:true}]});toast('吃蘑菇变大！')});
init();loop();
})();
</script></body></html>
