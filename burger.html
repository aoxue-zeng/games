<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉堡大师 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>
  .burger-stage { background:var(--mc-panel-dark);border:4px solid var(--mc-black);box-shadow: inset 4px 4px 0 0 #2a3f5f, inset -4px -4px 0 0 #000, 8px 8px 0 0 rgba(0,0,0,0.4);padding:20px;max-width:480px;margin:18px auto;text-align:center;min-height:300px }
  .burger-display { min-height:180px;display:flex;flex-direction:column-reverse;align-items:center;justify-content:flex-start;margin-bottom:16px }
  .layer { font-size:40px;line-height:1;margin:1px 0;animation:drop 0.3s ease }
  @keyframes drop{0%{transform:translateY(-30px);opacity:0}100%{transform:translateY(0);opacity:1}}
  .layer.target{filter:brightness(1.3)}
  .ing-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:360px;margin:0 auto }
  .ing-btn { background:var(--mc-panel);border:3px solid #000;box-shadow: inset 2px 2px 0 0 var(--mc-highlight), inset -2px -2px 0 0 var(--mc-shadow);padding:12px;font-size:28px;cursor:pointer;user-select:none;transition:transform 0.05s }
  .ing-btn:active{transform:translate(1px,1px)}
  .ing-btn.disabled{opacity:0.4;cursor:not-allowed}
</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar">
  <a href="index.html" class="logo">⛏ AoXuan.World</a>
  <nav>
    <a href="index.html">首页</a>
    <a href="rocket.html">火箭</a>
    <a href="pipes.html">水管</a>
    <a href="burger.html">汉堡</a>
    <a href="balance.html">天平</a>
    <a href="thermometer.html">温度计</a>
    <a href="slots.html">老虎机</a>
    <a href="24points.html">24点</a>
    <a href="gomoku.html">五子棋</a>
    <a href="horserace.html">赛马</a>
  </nav>
</div>
<div class="container center">
  <h1 class="title-3d" style="font-size:34px;">🍔 汉堡大师</h1>
  <p class="subtitle">记住配方顺序，叠出正确汉堡！</p>
  <div class="hud" style="margin-top:18px;">
    <div class="hud-item"><span class="label">得分</span><span id="score">0</span></div>
    <div class="hud-item"><span class="label">关卡</span><span id="level">1</span></div>
    <div class="hud-item"><span class="label">生命</span><span id="lives">♥♥♥</span></div>
  </div>
  <div class="burger-stage">
    <div style="font-family:'Press Start 2P',monospace;font-size:13px;color:#ffd700;margin-bottom:10px;text-shadow:1px 1px 0 #000" id="prompt">点击开始</div>
    <div class="burger-display" id="display"></div>
    <div class="ing-grid" id="ingredients"></div>
  </div>
  <div style="margin-top:14px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
    <button class="mc-btn green" id="startBtn">▶ 开始游戏</button>
    <a href="index.html" class="mc-btn">← 返回大厅</a>
  </div>
  <p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:15px;margin-top:12px;">看配方叠汉堡，从下往上按顺序点材料</p>
</div>
<div class="ground" style="position:fixed;bottom:0;left:0;right:0;z-index:0;"></div>
<script src="sound.js"></script>
<script src="mobile.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  var ING=[{icon:'🍞',name:'底面包'},{icon:'🥬',name:'生菜'},{icon:'🍅',name:'番茄'},{icon:'🧀',name:'奶酪'},{icon:'🍖',name:'肉饼'},{icon:'🥓',name:'培根'},{icon:'🍳',name:'蛋'},{icon:'🍞',name:'顶面包',top:true}];
  var state,recipe,playerStack,phase;
  function init(){state={running:false,over:false,score:0,level:1,lives:3};buildIng();updateHud();document.getElementById('prompt').textContent='点击开始';document.getElementById('display').innerHTML='';}
  function updateHud(){document.getElementById('score').textContent=state.score;document.getElementById('level').textContent=state.level;document.getElementById('lives').textContent='♥'.repeat(Math.max(0,state.lives))||'—';}
  function buildIng(){var g=document.getElementById('ingredients');g.innerHTML='';ING.forEach(function(it,i){var b=document.createElement('div');b.className='ing-btn';b.textContent=it.icon;b.title=it.name;b.dataset.idx=i;b.addEventListener('click',function(){onIng(i);});g.appendChild(b);});}
  function startLevel(){
    recipe=[];var len=Math.min(7,3+state.level);recipe.push(0); // 底面包
    for(var i=1;i<len-1;i++)recipe.push(1+Math.floor(Math.random()*6)); // 中间层
    recipe.push(7); // 顶面包
    playerStack=[];phase='show';
    document.getElementById('prompt').textContent='记住配方...';
    renderDisplay(recipe,true);
    disableIng(true);
    setTimeout(function(){phase='input';document.getElementById('prompt').textContent='按顺序叠汉堡！';renderDisplay([],false);disableIng(false);},1500+len*300);
  }
  function disableIng(d){document.querySelectorAll('.ing-btn').forEach(function(b){b.classList.toggle('disabled',d);});}
  function renderDisplay(stack,showAll){
    var d=document.getElementById('display');d.innerHTML='';
    stack.forEach(function(idx,i){var l=document.createElement('div');l.className='layer';if(showAll&&i===stack.length-1&&phase==='show')l.classList.add('target');l.textContent=ING[idx].icon;d.appendChild(l);});
  }
  function onIng(i){
    if(phase!=='input'||state.over)return;AOXSound.ensure();
    var expected=recipe[playerStack.length];
    if(i===expected){playerStack.push(i);SFX.place();renderDisplay(playerStack,false);
      if(playerStack.length===recipe.length){state.score+=recipe.length*10;state.level++;phase='idle';SFX.win();updateHud();document.getElementById('prompt').textContent='🎉 完成！下一关...';setTimeout(startLevel,1500);}
    }else{SFX.error();state.lives--;updateHud();document.getElementById('prompt').textContent='❌ 错了！';if(state.lives<=0)gameOver();else{setTimeout(function(){phase='show';document.getElementById('prompt').textContent='再看一遍...';renderDisplay(recipe,true);disableIng(true);setTimeout(function(){phase='input';document.getElementById('prompt').textContent='按顺序叠汉堡！';renderDisplay([],false);disableIng(false);},1500);},1000);}}
  }
  function gameOver(){state.over=true;state.running=false;SFX.lose();document.getElementById('prompt').textContent='💀 失败！得分:'+state.score;disableIng(true);}
  document.getElementById('startBtn').addEventListener('click',function(){init();state.running=true;AOXSound.ensure();SFX.select();setTimeout(startLevel,500);});
  init();
})();
</script>
</body>
</html>
