<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TNT 打靶 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>
  #gameCanvas { background: #1a0a0a; cursor: crosshair; }
  .key {
    display:inline-block; background:var(--mc-panel); border:2px solid #000;
    box-shadow: inset -3px -3px 0 0 var(--mc-shadow), inset 3px 3px 0 0 var(--mc-highlight);
    padding:3px 8px; font-family:'Press Start 2P',monospace; font-size:10px; margin:0 2px;
  }
  .help-text { color:white; text-shadow:2px 2px 0 #000; font-size:16px; line-height:1.8; }
  .combo-flash { animation: comboFlash 0.4s; }
  @keyframes comboFlash { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3);color:#ffd700} }
</style>
</head>
<body>
<div class="floating-blocks"></div>

<div class="topbar">
  <a href="index.html" class="logo">⛏ AoXuan.World</a>
  <nav>
    <a href="index.html">首页</a>
    <a href="typing.html">打字</a>
    <a href="mario.html">冒险</a>
    <a href="tetris.html">俄罗斯</a>
    <a href="mining.html">挖矿</a>
    <a href="sweeper.html">扫雷</a>
    <a href="match3.html">三消</a>
    <a href="dragon.html">末影龙</a>
    <a href="potion.html">炼药</a>
    <a href="tnt.html">打靶</a>
  </nav>
</div>

<div class="container center">
  <h1 class="title-3d" style="font-size:34px;">🧨 TNT 打靶</h1>
  <p class="subtitle">点击 TNT 引爆，快准狠连击得分！</p>

  <div class="hud" style="margin-top:20px;">
    <div class="hud-item"><span class="label">得分</span><span id="score">0</span></div>
    <div class="hud-item"><span class="label">连击</span><span id="combo">0</span></div>
    <div class="hud-item"><span class="label">最高连击</span><span id="maxCombo">0</span></div>
    <div class="hud-item"><span class="label">时间</span><span id="time">30</span></div>
  </div>

  <div class="game-stage" style="margin-top:14px;">
    <canvas id="gameCanvas" width="640" height="460"></canvas>
  </div>

  <p class="help-text" style="margin-top:12px;">
    <span class="key">鼠标点击</span> 引爆 TNT · 红色 TNT 倒计时快爆 · 别让 TNT 漏掉！
  </p>

  <div style="margin-top:14px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap;">
    <button class="mc-btn green" id="startBtn">▶ 开始打靶</button>
    <a href="index.html" class="mc-btn">← 返回大厅</a>
  </div>
</div>

<div class="ground" style="position:fixed; bottom:0; left:0; right:0; z-index:0;"></div>

<script src="sound.js"></script>
<script src="mobile.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;

  var state, tnts, particles, pops;

  function init(){
    state = { running:false, over:false, score:0, combo:0, maxCombo:0, time:30, timeTick:0, spawnTick:0, spawnInterval:70, hits:0, misses:0 };
    tnts = []; particles = []; pops = [];
    updateHud();
  }

  function updateHud(){
    document.getElementById('score').textContent = state.score;
    var cEl=document.getElementById('combo');
    cEl.textContent = state.combo;
    document.getElementById('maxCombo').textContent = state.maxCombo;
    document.getElementById('time').textContent = state.time;
  }

  function spawnTNT(){
    var r = 26 + Math.random()*10;
    var x = r + Math.random()*(W-2*r);
    var y = -r;
    // 下落速度随时间加快
    var speed = 1 + Math.random()*1.5 + (30-state.time)*0.04;
    // 偶尔出现快速危险 TNT（红色，倒计时短）
    var danger = Math.random()<0.25;
    tnts.push({
      x:x, y:y, r:r, vy:speed, fuse:danger?60:120, fuseMax:danger?60:120,
      danger:danger, rot:0, vrot:(Math.random()-0.5)*0.1, blink:0
    });
  }

  // ===== 输入 =====
  function handleTap(x, y){
    if(!state.running||state.over) return;
    var hit=false;
    for(var i=tnts.length-1;i>=0;i--){
      var t=tnts[i];
      if(Math.hypot(t.x-x, t.y-y) <= t.r){
        // 命中
        hit=true;
        state.combo++;
        if(state.combo>state.maxCombo) state.maxCombo=state.combo;
        state.hits++;
        var mult = 1 + Math.floor(state.combo/5);
        var pts = (t.danger?50:20) * mult;
        state.score += pts;
        explode(t.x, t.y, t.danger?'#ff1744':'#ff5722', 20);
        SFX.explode();
        if(state.combo>=3) SFX.combo(state.combo);
        pops.push({x:t.x, y:t.y, text:'+'+pts, life:40, color:'#ffd700'});
        // 链式引爆附近 TNT
        for(var j=tnts.length-1;j>=0;j--){
          if(j===i) continue;
          var o=tnts[j];
          if(Math.hypot(o.x-t.x, o.y-t.y) < t.r+o.r+30){
            explode(o.x,o.y,'#ff9800',12);
            pops.push({x:o.x,y:o.y,text:'CHAIN!',life:35,color:'#4dd0e1'});
            state.score+=30; state.combo++;
            tnts.splice(j,1);
            if(j<i) i--;
          }
        }
        tnts.splice(i,1);
        updateHud();
        break;
      }
    }
    if(!hit){
      // 空击，连击清零
      state.combo=0; updateHud();
      SFX.error();
      pops.push({x:x,y:y,text:'没打中',life:25,color:'#888'});
    }
  }
  function getPos(e){
    var rect=canvas.getBoundingClientRect();
    var cx = e.clientX!==undefined ? e.clientX : (e.touches && e.touches[0].clientX);
    var cy = e.clientY!==undefined ? e.clientY : (e.touches && e.touches[0].clientY);
    return { x:(cx-rect.left)*(W/rect.width), y:(cy-rect.top)*(H/rect.height) };
  }
  canvas.addEventListener('click', function(e){ var p=getPos(e); handleTap(p.x, p.y); });
  canvas.addEventListener('touchstart', function(e){ e.preventDefault(); var p=getPos(e); handleTap(p.x, p.y); }, { passive:false });

  function explode(x,y,color,n){
    for(var i=0;i<n;i++){ var a=Math.random()*Math.PI*2, s=2+Math.random()*6;
      particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:35,color:color,size:3+Math.random()*4}); }
    // 冲击波环
    particles.push({x:x,y:y,vx:0,vy:0,life:20,color:'#fff',size:0,ring:true,r:5});
  }

  // ===== 更新 =====
  function update(){
    if(!state.running||state.over) return;
    // 时间
    state.timeTick++;
    if(state.timeTick>=60){ state.timeTick=0; state.time--; updateHud(); if(state.time<=0){ endGame(); } }

    // 生成 TNT
    state.spawnTick++;
    if(state.spawnTick>=state.spawnInterval){
      state.spawnTick=0;
      spawnTNT();
      // 越往后越快
      state.spawnInterval = Math.max(28, 70 - (30-state.time)*0.8);
    }

    // TNT 下落 + 引信
    for(var i=tnts.length-1;i>=0;i--){
      var t=tnts[i];
      t.y += t.vy;
      t.rot += t.vrot;
      t.fuse--;
      t.blink = Math.floor((t.fuseMax-t.fuse)/8)%2===0;
      if(t.y - t.r > H){
        // 漏掉
        tnts.splice(i,1);
        state.misses++;
        state.combo=0;
        state.score = Math.max(0, state.score-15);
        SFX.error();
        updateHud();
        pops.push({x:W/2, y:H-30, text:'漏掉! -15', life:35, color:'#e53935'});
        // 屏幕震
        screenShake = 8;
      } else if(t.fuse<=0){
        // 自爆
        explode(t.x,t.y,'#e53935',16);
        tnts.splice(i,1);
        state.combo=0;
        state.score = Math.max(0, state.score-10);
        SFX.boom();
        updateHud();
        pops.push({x:t.x,y:t.y,text:'爆炸！',life:30,color:'#e53935'});
        screenShake = 10;
      }
    }

    // 粒子
    for(var p=particles.length-1;p>=0;p--){
      var pt=particles[p];
      if(pt.ring){
        pt.r+=3; pt.life--;
      } else {
        pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.25; pt.life--;
      }
      if(pt.life<=0) particles.splice(p,1);
    }
    // 弹出文字
    for(var q=pops.length-1;q>=0;q--){
      pops[q].y -= 1.2; pops[q].life--;
      if(pops[q].life<=0) pops.splice(q,1);
    }
    if(screenShake>0) screenShake-=0.5;
  }
  var screenShake=0;

  function endGame(){
    state.over=true; state.running=false;
    AOXSound.stopBGM(); SFX.win();
  }

  // ===== 渲染 =====
  function drawTNT(t){
    ctx.save();
    var sx = screenShake?(Math.random()-0.5)*screenShake:0;
    var sy = screenShake?(Math.random()-0.5)*screenShake:0;
    ctx.translate(t.x+sx, t.y+sy);
    ctx.rotate(t.rot);
    // 引信快到时的闪烁
    var lowFuse = t.fuse < 30;
    var flash = lowFuse && t.blink;
    // TNT 红色方块
    ctx.fillStyle = flash ? '#fff' : '#c62828';
    ctx.fillRect(-t.r, -t.r, t.r*2, t.r*2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(-t.r, -t.r, t.r*2, 5);
    ctx.fillRect(-t.r, -t.r, 5, t.r*2);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(-t.r, t.r-5, t.r*2, 5);
    ctx.fillRect(t.r-5, -t.r, 5, t.r*2);
    // TNT 字样
    ctx.fillStyle = '#fff';
    ctx.font = 'bold '+(t.r*0.7)+'px "Press Start 2P", monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('TNT', 0, 2);
    // 危险 TNT 标记
    if(t.danger){
      ctx.fillStyle = flash?'#000':'#ffeb3b';
      ctx.font = (t.r*0.35)+'px "Press Start 2P", monospace';
      ctx.fillText('!', 0, -t.r*0.5);
    }
    ctx.restore();

    // 引信 + 火花
    ctx.strokeStyle='#4a2c12'; ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(t.x, t.y-t.r);
    ctx.lineTo(t.x+6, t.y-t.r-10);
    ctx.stroke();
    if(Math.random()<0.7){
      ctx.fillStyle='#ffeb3b';
      ctx.fillRect(t.x+5+Math.random()*4, t.y-t.r-12+Math.random()*4, 3, 3);
      ctx.fillStyle='#ff5722';
      ctx.fillRect(t.x+6, t.y-t.r-11, 2, 2);
    }
  }

  function draw(){
    var sx = screenShake?(Math.random()-0.5)*screenShake:0;
    var sy = screenShake?(Math.random()-0.5)*screenShake:0;
    ctx.save(); ctx.translate(sx, sy);

    // 背景
    var g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#2a0a0a'); g.addColorStop(1,'#0d0303');
    ctx.fillStyle=g; ctx.fillRect(-20,-20,W+40,H+40);
    // 远处爆炸光
    ctx.fillStyle='rgba(255,80,0,0.05)';
    for(var i=0;i<5;i++){
      ctx.beginPath(); ctx.arc(i*150+50, H, 100, 0, 7); ctx.fill();
    }

    // TNT
    tnts.forEach(drawTNT);

    // 粒子
    particles.forEach(function(p){
      if(p.ring){
        ctx.globalAlpha=p.life/20;
        ctx.strokeStyle=p.color; ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.stroke();
      } else {
        ctx.globalAlpha=p.life/35; ctx.fillStyle=p.color;
        ctx.fillRect(p.x,p.y,p.size,p.size);
      }
      ctx.globalAlpha=1;
    });

    // 弹出文字
    pops.forEach(function(pp){
      ctx.globalAlpha=Math.min(1, pp.life/20);
      ctx.fillStyle=pp.color;
      ctx.font='bold 14px "Press Start 2P", monospace';
      ctx.textAlign='center';
      ctx.fillText(pp.text, pp.x, pp.y);
      ctx.globalAlpha=1;
    });

    ctx.restore();

    // 连击显示
    if(state.combo>=3){
      ctx.fillStyle='#ffd700';
      ctx.font='24px "Press Start 2P", monospace'; ctx.textAlign='left';
      ctx.fillText('连击 x'+state.combo, 16, 40);
      ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P", monospace';
      ctx.fillText('倍率 x'+(1+Math.floor(state.combo/5)), 16, 58);
    }

    // 结算
    if(!state.running){
      ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';
      if(state.over){
        ctx.fillStyle='#ff5722'; ctx.font='28px "Press Start 2P", monospace';
        ctx.fillText('时间到！', W/2, H/2-50);
        ctx.fillStyle='#ffd700'; ctx.font='14px "Press Start 2P", monospace';
        ctx.fillText('得分: '+state.score, W/2, H/2-15);
        ctx.fillStyle='#fff'; ctx.font='11px "Press Start 2P", monospace';
        ctx.fillText('命中 '+state.hits+'  漏掉 '+state.misses+'  最高连击 '+state.maxCombo, W/2, H/2+15);
        ctx.fillText('点击开始再来一局', W/2, H/2+48);
      } else {
        ctx.fillStyle='#ffd700'; ctx.font='22px "Press Start 2P", monospace';
        ctx.fillText('准备就绪', W/2, H/2-10);
        ctx.fillStyle='#fff'; ctx.font='11px "Press Start 2P", monospace';
        ctx.fillText('点击 TNT 引爆，连击得高分', W/2, H/2+25);
      }
    }
  }

  function loop(){ update(); draw(); requestAnimationFrame(loop); }

  document.getElementById('startBtn').addEventListener('click', function(){
    init(); state.running=true;
    AOXSound.ensure(); AOXSound.startBGM('game'); SFX.select();
    toast('30秒打靶开始！');
  });

  init();
  loop();
})();
</script>
</body>
