<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>
  .board2048 {
    background: var(--mc-night); border:4px solid var(--mc-black);
    box-shadow: inset 4px 4px 0 0 #2a3f5f, inset -4px -4px 0 0 #000, 8px 8px 0 0 rgba(0,0,0,0.4);
    padding:12px; width:fit-content; margin:14px auto 0; position:relative; touch-action:none;
  }
  .grid2048 { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .tile2048 {
    width:88px; height:88px; display:flex; align-items:center; justify-content:center;
    font-family:'Press Start 2P',monospace; font-weight:bold;
    border:3px solid #000; box-shadow: inset 2px 2px 0 0 rgba(255,255,255,0.2), inset -2px -2px 0 0 rgba(0,0,0,0.3);
    transition: all 0.12s ease;
  }
  .tile2048.t2{background:#8b5a2b;color:#fff} .tile2048.t4{background:#5fb53f;color:#fff}
  .tile2048.t8{background:#2196f3;color:#fff} .tile2048.t16{background:#9c27b0;color:#fff}
  .tile2048.t32{background:#ff9800;color:#fff} .tile2048.t64{background:#e53935;color:#fff}
  .tile2048.t128{background:#ffd700;color:#000;font-size:24px} .tile2048.t256{background:#4dd0e1;color:#000;font-size:24px}
  .tile2048.t512{background:#2ecc71;color:#000;font-size:24px} .tile2048.t1024{background:#ff1744;color:#fff;font-size:20px}
  .tile2048.t2048{background:linear-gradient(135deg,#ffd700,#ff9800);color:#000;font-size:20px;box-shadow:inset 2px 2px 0 0 #fff, 0 0 20px #ffd700}
  .tile2048.empty{background:rgba(255,255,255,0.05);box-shadow:none;border-color:rgba(255,255,255,0.1)}
  .tile2048.new{animation: pop 0.18s ease;}
  .tile2048.merged{animation: merge 0.2s ease;}
  @keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
  @keyframes merge{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
  .key {
    display:inline-block; background:var(--mc-panel); border:2px solid #000;
    box-shadow: inset -2px -2px 0 0 var(--mc-shadow), inset 2px 2px 0 0 var(--mc-highlight);
    padding:3px 8px; font-family:'Press Start 2P',monospace; font-size:10px; margin:0 2px;
  }
</style>
</head>
<body>
<div class="floating-blocks"></div>

<div class="topbar">
  <a href="index.html" class="logo">⛏ AoXuan.World</a>
  <nav>

    <a href="match3.html">三消</a>
    <a href="pvz.html">植物僵尸</a>
  </nav>
</div>

<div class="container center">
  <h1 class="title-3d" style="font-size:36px;">🔢 2048</h1>
  <p class="subtitle">合并相同数字，凑出 2048！</p>

  <div class="hud" style="margin-top:20px;">
    <div class="hud-item"><span class="label">得分</span><span id="score">0</span></div>
    <div class="hud-item"><span class="label">最高分</span><span id="best">0</span></div>
    <div class="hud-item"><span class="label">最大方块</span><span id="maxtile">2</span></div>
  </div>

  <div class="board2048">
    <div class="grid2048" id="grid"></div>
  </div>

  <p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:16px;margin-top:14px;">
    <span class="key">←↑→↓</span> 或 <span class="key">WASD</span> 滑动 · 手机可滑动操作 · <span class="key">R</span> 重开
  </p>

  <div style="margin-top:14px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap;">
    <button class="mc-btn green" id="startBtn">▶ 新游戏</button>
    <a href="index.html" class="mc-btn">← 返回大厅</a>
  </div>
</div>

<div class="ground" style="position:fixed; bottom:0; left:0; right:0; z-index:0;"></div>

<script src="sound.js"></script>
<script src="mobile.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  var SIZE = 4;
  var grid, state, newTiles, mergedTiles;

  function init(){
    grid = [];
    for(var r=0;r<SIZE;r++) grid.push([0,0,0,0]);
    state = { score:0, best:getBest(), over:false, won:false, moved:false };
    newTiles=[]; mergedTiles=[];
    addRandom(); addRandom();
    render(); updateHud();
  }
  function getBest(){ return parseInt(localStorage.getItem('2048_best')||'0',10); }
  function setBest(v){ localStorage.setItem('2048_best', v); }
  function updateHud(){
    document.getElementById('score').textContent=state.score;
    document.getElementById('best').textContent=state.best;
    var max=0; grid.forEach(function(r){r.forEach(function(v){if(v>max)max=v;});});
    document.getElementById('maxtile').textContent=max;
  }

  function addRandom(){
    var empty=[];
    for(var r=0;r<SIZE;r++) for(var c=0;c<SIZE;c++) if(grid[r][c]===0) empty.push([r,c]);
    if(empty.length===0) return false;
    var cell=empty[Math.floor(Math.random()*empty.length)];
    grid[cell[0]][cell[1]] = Math.random()<0.9?2:4;
    newTiles.push(cell);
    return true;
  }

  // 滑动一行（向左），返回 {row, gained, moved}
  function slideRow(row){
    var arr=row.filter(function(v){return v!==0;});
    var gained=0; var merged=[];
    for(var i=0;i<arr.length-1;i++){
      if(arr[i]===arr[i+1]){ arr[i]*=2; gained+=arr[i]; arr.splice(i+1,1); merged.push(i); }
    }
    while(arr.length<SIZE) arr.push(0);
    return {row:arr, gained:gained, merged:merged};
  }

  function move(dir){
    if(state.over) return;
    newTiles=[]; mergedTiles=[];
    var moved=false, gained=0;
    var g = grid.map(function(r){return r.slice();});
    // 统一处理：把方向转成"向左"
    var lines=[];
    if(dir==='left'){ for(var r=0;r<SIZE;r++) lines.push(g[r]); }
    else if(dir==='right'){ for(var r2=0;r2<SIZE;r2++) lines.push(g[r2].slice().reverse()); }
    else if(dir==='up'){ for(var c=0;c<SIZE;c++){ var col=[]; for(var r3=0;r3<SIZE;r3++) col.push(g[r3][c]); lines.push(col); } }
    else if(dir==='down'){ for(var c2=0;c2<SIZE;c2++){ var col2=[]; for(var r4=SIZE-1;r4>=0;r4--) col2.push(g[r4][c2]); lines.push(col2); } }

    var newLines=[]; var allMerged=[];
    lines.forEach(function(line, idx){
      var res=slideRow(line);
      newLines.push(res.row); gained+=res.gained;
      res.merged.forEach(function(m){ allMerged.push({line:idx, pos:m}); });
      // 检查是否移动
      for(var i=0;i<SIZE;i++){ if(line[i]!==res.row[i]){ moved=true; } }
    });

    if(!moved) return;
    SFX.move();

    // 转回 grid
    if(dir==='left'){ for(var r=0;r<SIZE;r++) grid[r]=newLines[r]; }
    else if(dir==='right'){ for(var r=0;r<SIZE;r++) grid[r]=newLines[r].slice().reverse(); }
    else if(dir==='up'){ for(var c=0;c<SIZE;c++) for(var r=0;r<SIZE;r++) grid[r][c]=newLines[c][r]; }
    else if(dir==='down'){ for(var c=0;c<SIZE;c++) for(var r=0;r<SIZE;r++) grid[SIZE-1-r][c]=newLines[c][r]; }

    // 合并方块标记（转回原坐标做动画）
    allMerged.forEach(function(m){
      var r, c;
      if(dir==='left'){ r=m.line; c=m.pos; }
      else if(dir==='right'){ r=m.line; c=SIZE-1-m.pos; }
      else if(dir==='up'){ r=m.pos; c=m.line; }
      else { r=SIZE-1-m.pos; c=m.line; }
      mergedTiles.push([r,c]);
    });

    state.score += gained;
    if(gained>0) SFX.clear();
    if(state.score>state.best){ setBest(state.score); state.best=state.score; }
    addRandom();
    // 检查胜利
    grid.forEach(function(r){r.forEach(function(v){ if(v>=2048&&!state.won){ state.won=true; SFX.win(); toast('🎉 2048 达成！继续挑战更高！'); }});});
    // 检查游戏结束
    if(!canMove()){ state.over=true; AOXSound.stopBGM(); SFX.lose(); toast('无法移动了！'); }
    render(); updateHud();
  }

  function canMove(){
    for(var r=0;r<SIZE;r++) for(var c=0;c<SIZE;c++){
      if(grid[r][c]===0) return true;
      if(c<SIZE-1 && grid[r][c]===grid[r][c+1]) return true;
      if(r<SIZE-1 && grid[r][c]===grid[r+1][c]) return true;
    }
    return false;
  }

  function render(){
    var g=document.getElementById('grid'); g.innerHTML='';
    for(var r=0;r<SIZE;r++) for(var c=0;c<SIZE;c++){
      var v=grid[r][c];
      var d=document.createElement('div');
      d.className='tile2048';
      if(v===0){ d.classList.add('empty'); }
      else {
        d.classList.add('t'+v); d.textContent=v;
        if(v>999) d.style.fontSize='18px';
        if(newTiles.some(function(t){return t[0]===r&&t[1]===c;})) d.classList.add('new');
        if(mergedTiles.some(function(t){return t[0]===r&&t[1]===c;})) d.classList.add('merged');
      }
      g.appendChild(d);
    }
  }

  // ===== 输入 =====
  document.addEventListener('keydown', function(e){
    var k=e.key.toLowerCase();
    if(['arrowup','arrowdown','arrowleft','arrowright'].indexOf(k)>=0) e.preventDefault();
    if(k==='arrowleft'||k==='a') move('left');
    else if(k==='arrowright'||k==='d') move('right');
    else if(k==='arrowup'||k==='w') move('up');
    else if(k==='arrowdown'||k==='s') move('down');
    else if(k==='r'){ init(); AOXSound.ensure(); }
  });

  // 触屏滑动
  var ts=null;
  var board=document.querySelector('.board2048');
  board.addEventListener('touchstart', function(e){ ts={x:e.touches[0].clientX, y:e.touches[0].clientY}; }, {passive:true});
  board.addEventListener('touchend', function(e){
    if(!ts) return;
    var dx=e.changedTouches[0].clientX-ts.x, dy=e.changedTouches[0].clientY-ts.y;
    if(Math.abs(dx)<20&&Math.abs(dy)<20) return;
    if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
    else move(dy>0?'down':'up');
    ts=null;
  }, {passive:true});

  document.getElementById('startBtn').addEventListener('click', function(){
    init(); AOXSound.ensure(); AOXSound.startBGM('game'); SFX.select(); toast('新游戏开始！');
  });

  init();
})();
</script>
</body>
</html>
