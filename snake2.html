<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>双人贪吃蛇 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>#gameCanvas{background:#0d1b0d;touch-action:none}.key{display:inline-block;background:var(--mc-panel);border:2px solid #000;box-shadow:inset -2px -2px 0 0 var(--mc-shadow),inset 2px 2px 0 0 var(--mc-highlight);padding:3px 8px;font-family:'Press Start 2P',monospace;font-size:10px;margin:0 2px}</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar"><a href="index.html" class="logo">⛏ AoXuan.World</a>
<nav><a href="index.html">首页</a><a href="snake2.html">双人蛇</a><a href="pinball.html">弹球台</a><a href="maze.html">迷宫</a><a href="snake.html">贪吃蛇</a><a href="m-brawl.html">大乱斗</a><a href="pvz.html">植物僵尸</a></nav></div>
<div class="container center">
<h1 class="title-3d" style="font-size:30px;">🐍 双人贪吃蛇</h1>
<p class="subtitle">两条蛇同屏竞技，撞墙或撞身死！</p>
<div class="hud" style="margin-top:18px"><div class="hud-item" style="color:#4caf50"><span class="label">绿蛇P1</span><span id="s1">3</span></div><div class="hud-item" style="color:#e53935"><span class="label">红蛇P2</span><span id="s2">3</span></div><div class="hud-item"><span class="label">回合</span><span id="round">1</span></div></div>
<div class="game-stage" style="margin-top:14px"><canvas id="gameCanvas" width="480" height="400"></canvas></div>
<p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:14px;margin-top:10px">P1 <span class="key">WASD</span> 绿蛇 · P2 <span class="key">↑↓←→</span> 红蛇 · 吃食物变长 · 撞死对方赢</p>
<div style="margin-top:12px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><button class="mc-btn green" id="startBtn">▶ 开始</button><a href="index.html" class="mc-btn">← 返回</a></div>
</div><div class="ground" style="position:fixed;bottom:0;left:0;right:0;z-index:0"></div>
<script src="sound.js"></script><script src="mobile.js"></script><script src="shared.js"></script>
<script>
(function(){
var c=document.getElementById('gameCanvas'),x=c.getContext('2d'),W=c.width,H=c.height;
var COLS=24,ROWS=20,CELL=W/COLS;
var s,snakes,food,tick,keys,sp;
function init(){s={running:false,over:false,winner:0,round:1};snakes=[{body:[{x:5,y:10},{x:4,y:10},{x:3,y:10}],dir:{x:1,y:0},nextDir:{x:1,y:0},color:'#4caf50',alive:true,score:3},{body:[{x:18,y:10},{x:19,y:10},{x:20,y:10}],dir:{x:-1,y:0},nextDir:{x:-1,y:0},color:'#e53935',alive:true,score:3}];food=null;tick=0;keys={};sp=8;placeFood();updateHud();}
function updateHud(){document.getElementById('s1').textContent=snakes[0].score;document.getElementById('s2').textContent=snakes[1].score;document.getElementById('round').textContent=s.round;}
function placeFood(){food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS),t:0};}
function step(){
  snakes.forEach(function(sn,i){
    if(!sn.alive)return;
    sn.dir=sn.nextDir;
    var head={x:sn.body[0].x+sn.dir.x,y:sn.body[0].y+sn.dir.y};
    if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){sn.alive=false;SFX.lose();return;}
    // 撞自己
    for(var j=0;j<sn.body.length;j++)if(sn.body[j].x===head.x&&sn.body[j].y===head.y){sn.alive=false;SFX.lose();return;}
    // 撞对方
    var other=snakes[1-i];
    for(var k=0;k<other.body.length;k++)if(other.body[k].x===head.x&&other.body[k].y===head.y){sn.alive=false;SFX.lose();return;}
    sn.body.unshift(head);
    if(food&&head.x===food.x&&head.y===food.y){sn.score++;SFX.coin();placeFood();}
    else sn.body.pop();
  });
  // 判胜负
  if(!snakes[0].alive&&!snakes[1].alive){s.over=true;s.winner=0;}
  else if(!snakes[0].alive){s.over=true;s.winner=2;}
  else if(!snakes[1].alive){s.over=true;s.winner=1;}
  if(s.over){s.running=false;AOXSound.stopBGM();if(s.winner)SFX.win();else SFX.lose();}
}
function update(){if(!s.running||s.over)return;tick++;if(tick>=sp){tick=0;step();}
  if(food)food.t+=0.15;}
function draw(){
x.fillStyle='#0d1b0d';x.fillRect(0,0,W,H);
x.strokeStyle='rgba(255,255,255,0.04)';for(var i=0;i<=COLS;i++){x.beginPath();x.moveTo(i*CELL,0);x.lineTo(i*CELL,H);x.stroke();}for(var j=0;j<=ROWS;j++){x.beginPath();x.moveTo(0,j*CELL);x.lineTo(W,j*CELL);x.stroke();}
if(food){var fx=food.x*CELL,fy=food.y*CELL,b=Math.sin(food.t)*2;x.fillStyle='#ffd700';x.fillRect(fx+4,fy+4+b,CELL-8,CELL-8);x.fillStyle='#b8860b';x.fillRect(fx+CELL/2-1,fy+1+b,2,5);}
snakes.forEach(function(sn){if(!sn.alive)return;sn.body.forEach(function(seg,i){var sx=seg.x*CELL,sy=seg.y*CELL;if(i===0){x.fillStyle=sn.color;x.fillRect(sx+1,sy+1,CELL-2,CELL-2);x.fillStyle='#fff';var ex=sn.dir.x>0?sx+CELL-7:(sn.dir.x<0?sx+3:sx+CELL/2-1.5);var ey=sn.dir.y>0?sy+CELL-7:(sn.dir.y<0?sy+3:sy+3);x.fillRect(ex,sy+5,3,3);x.fillRect(ex,sy+CELL-9,3,3);}else{x.fillStyle=sn.color;x.globalAlpha=0.7;x.fillRect(sx+2,sy+2,CELL-4,CELL-4);x.globalAlpha=1;}});});
if(!s.running){x.fillStyle='rgba(0,0,0,0.7)';x.fillRect(0,0,W,H);x.textAlign='center';if(s.over){var msg=s.winner?('P'+s.winner+' 赢了！'):'平局！';x.fillStyle=s.winner===1?'#4caf50':(s.winner===2?'#e53935':'#fff');x.font='24px "Press Start 2P",monospace';x.fillText(msg,W/2,H/2-10);x.fillStyle='#fff';x.font='10px "Press Start 2P",monospace';x.fillText('按R重玩',W/2,H/2+25);}else{x.fillStyle='#4caf50';x.font='20px "Press Start 2P",monospace';x.fillText('准备',W/2,H/2-8);x.font='10px "Press Start 2P",monospace';x.fillText('点击开始',W/2,H/2+20);}}}
function loop(){update();draw();requestAnimationFrame(loop);}
document.addEventListener('keydown',function(e){
  var k=e.key.toLowerCase();
  if(k==='w'&&snakes[0].dir.y!==1)snakes[0].nextDir={x:0,y:-1};
  if(k==='s'&&snakes[0].dir.y!==-1)snakes[0].nextDir={x:0,y:1};
  if(k==='a'&&snakes[0].dir.x!==1)snakes[0].nextDir={x:-1,y:0};
  if(k==='d'&&snakes[0].dir.x!==-1)snakes[0].nextDir={x:1,y:0};
  if(k==='arrowup'&&snakes[1].dir.y!==1)snakes[1].nextDir={x:0,y:-1};
  if(k==='arrowdown'&&snakes[1].dir.y!==-1)snakes[1].nextDir={x:0,y:1};
  if(k==='arrowleft'&&snakes[1].dir.x!==1)snakes[1].nextDir={x:-1,y:0};
  if(k==='arrowright'&&snakes[1].dir.x!==-1)snakes[1].nextDir={x:1,y:0};
  if(k==='r'){init();s.running=true;AOXSound.ensure();}
});
document.getElementById('startBtn').addEventListener('click',function(){init();s.running=true;AOXSound.ensure();AOXSound.startBGM('game');SFX.select();toast('双人竞技！')});
init();loop();
})();
</script></body></html>
