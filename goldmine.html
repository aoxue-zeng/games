<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打金矿 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>
  #gameCanvas { background:#1a0a0a; touch-action:none; cursor:pointer; }
  .key { display:inline-block; background:var(--mc-panel); border:2px solid #000; box-shadow: inset -2px -2px 0 0 var(--mc-shadow), inset 2px 2px 0 0 var(--mc-highlight); padding:3px 8px; font-family:'Press Start 2P',monospace; font-size:10px; margin:0 2px; }
</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar">
  <a href="index.html" class="logo">⛏ AoXuan.World</a>
  <nav>
    <a href="index.html">首页</a>
    <a href="penguin.html">企鹅</a>
    <a href="dice.html">骰子</a>
    <a href="ladder.html">爬梯</a>
    <a href="jigsaw.html">拼图</a>
    <a href="goldmine.html">金矿</a>
    <a href="catch.html">接贝壳</a>
    <a href="darts.html">飞镖</a>
    <a href="castle.html">城堡</a>
  </nav>
</div>
<div class="container center">
  <h1 class="title-3d" style="font-size:34px;">⛏ 打金矿</h1>
  <p class="subtitle">钩子抓金块钻石，避开石头！</p>
  <div class="hud" style="margin-top:20px;">
    <div class="hud-item"><span class="label">金币</span><span id="coins">0</span></div>
    <div class="hud-item"><span class="label">目标</span><span id="goal">500</span></div>
    <div class="hud-item"><span class="label">关卡</span><span id="level">1</span></div>
    <div class="hud-item"><span class="label">时间</span><span id="time">60</span>s</div>
  </div>
  <div class="game-stage" style="margin-top:14px;"><canvas id="gameCanvas" width="560" height="420"></canvas></div>
  <p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:16px;margin-top:12px;">
    钩子自动摆动 · <span class="key">空格</span> 或 <span class="key">点击</span> 发射 · 大金块重拉得慢
  </p>
  <div style="margin-top:14px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
    <button class="mc-btn green" id="startBtn">▶ 开始游戏</button>
    <a href="index.html" class="mc-btn">← 返回大厅</a>
  </div>
</div>
<div class="ground" style="position:fixed;bottom:0;left:0;right:0;z-index:0;"></div>
<script src="sound.js"></script>
<script src="mobile.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  var canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  var state,hook,items,particles;
  var TYPES={gold_s:{r:10,val:50,col:'#ffd700',weight:1.5},gold_b:{r:22,val:150,col:'#ffd700',weight:4},diamond:{r:12,val:300,col:'#4dd0e1',weight:1.2},rock_s:{r:14,val:10,col:'#7f7f7f',weight:3},rock_b:{r:26,val:5,col:'#555',weight:6}};
  function init(){
    state={running:false,over:false,won:false,coins:0,goal:500,level:1,time:60,timeTick:0};
    hook={x:W/2,y:80,angle:0,swing:1,launched:false,returning:false,length:0,caught:null,speed:5};
    items=[];particles=[];spawnItems();
    updateHud();
  }
  function spawnItems(){
    items=[];
    var minY=160,maxY=H-30;
    for(var i=0;i<14;i++){
      var keys=Object.keys(TYPES);var k=keys[Math.floor(Math.random()*keys.length)];
      var t=TYPES[k];
      var x=30+Math.random()*(W-60);var y=minY+Math.random()*(maxY-minY);
      // 避免重叠
      var ok=true;for(var j=0;j<items.length;j++){if(Math.hypot(items[j].x-x,items[j].y-y)<items[j].r+t.r+4){ok=false;break;}}
      if(ok)items.push({x:x,y:y,r:t.r,type:k,val:t.val,col:t.col,weight:t.weight,rot:Math.random()*Math.PI});
      else i--;if(i<-20)break;
    }
  }
  function updateHud(){document.getElementById('coins').textContent=state.coins;document.getElementById('goal').textContent=state.goal;document.getElementById('level').textContent=state.level;document.getElementById('time').textContent=state.time;}
  function launchHook(){if(hook.launched)return;hook.launched=true;SFX.shoot();}
  function update(){
    if(!state.running||state.over)return;
    state.timeTick++;if(state.timeTick>=60){state.timeTick=0;state.time--;updateHud();if(state.time<=0){state.over=true;AOXSound.stopBGM();SFX.lose();}}
    // 摆动
    if(!hook.launched){hook.angle+=hook.swing*0.02;if(hook.angle>1.2)hook.swing=-1;if(hook.angle<-1.2)hook.swing=1;}
    else if(!hook.returning){
      hook.length+=hook.speed;
      var hx=hook.x+Math.sin(hook.angle)*hook.length,hy=hook.y+Math.cos(hook.angle)*hook.length;
      // 撞墙/底
      if(hx<0||hx>W||hy>H){hook.returning=true;}
      // 抓物品
      for(var i=0;i<items.length;i++){var it=items[i];if(Math.hypot(hx-it.x,hy-it.y)<it.r+6){hook.caught=it;items.splice(i,1);hook.returning=true;SFX.hit();break;}}
    }else{
      var spd=hook.caught?hook.speed/hook.caught.weight:hook.speed*1.5;
      hook.length-=spd;
      if(hook.length<=0){hook.length=0;hook.launched=false;hook.returning=false;
        if(hook.caught){state.coins+=hook.caught.val;explode(hook.x,hook.y+10,hook.caught.col);SFX.coin();if(hook.caught.type==='diamond')SFX.gem();hook.caught=null;updateHud();
          if(state.coins>=state.goal)winLevel();}
      }
    }
    particles=particles.filter(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;return p.life>0;});
  }
  function explode(x,y,c){for(var i=0;i<10;i++){var a=Math.random()*Math.PI*2,s=1+Math.random()*3;particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:25,c:c,size:2+Math.random()*3});}}
  function winLevel(){state.won=true;state.running=false;AOXSound.stopBGM();SFX.win();toast('🎉 通关！金币 '+state.coins);}
  function draw(){
    // 地面+地下
    ctx.fillStyle='#87ceeb';ctx.fillRect(0,0,W,120);
    ctx.fillStyle='#8b5a2b';ctx.fillRect(0,120,W,H-120);
    ctx.fillStyle='#6b4220';ctx.fillRect(0,120,W,8);
    // 矿工
    ctx.fillStyle='#8b5a2b';ctx.fillRect(hook.x-20,40,40,40); // 支架
    ctx.fillStyle='#7f7f7f';ctx.fillRect(hook.x-4,30,8,50); // 杆
    ctx.fillStyle='#f0c8a0';ctx.fillRect(hook.x-14,70,28,20); // 脸
    ctx.fillStyle='#4a2c12';ctx.fillRect(hook.x-14,70,28,5);
    ctx.fillStyle='#fff';ctx.fillRect(hook.x-8,76,4,4);ctx.fillRect(hook.x+4,76,4,4);
    ctx.fillStyle='#000';ctx.fillRect(hook.x-7,77,2,2);ctx.fillRect(hook.x+5,77,2,2);
    // 钩子绳
    var hx=hook.x+Math.sin(hook.angle)*hook.length,hy=hook.y+Math.cos(hook.angle)*hook.length;
    ctx.strokeStyle='#4a2c12';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(hook.x,hook.y);ctx.lineTo(hx,hy);ctx.stroke();
    // 钩头
    ctx.fillStyle='#7f7f7f';ctx.beginPath();ctx.arc(hx,hy,6,0,7);ctx.fill();
    ctx.strokeStyle='#7f7f7f';ctx.lineWidth=4;ctx.beginPath();ctx.arc(hx,hy+4,8,0,Math.PI);ctx.stroke();
    // 抓到的物品
    if(hook.caught){drawItem(hx,hy+hook.caught.r,hook.caught);}
    // 物品
    items.forEach(function(it){drawItem(it.x,it.y,it);});
    particles.forEach(function(p){ctx.globalAlpha=p.life/25;ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,p.size,p.size);ctx.globalAlpha=1;});
    if(!state.running){
      ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
      if(state.over&&state.time<=0){ctx.fillStyle='#e53935';ctx.font='24px "Press Start 2P",monospace';ctx.fillText('时间到！',W/2,H/2-25);ctx.fillStyle='#ffd700';ctx.font='14px "Press Start 2P",monospace';ctx.fillText('金币:'+state.coins+'/'+state.goal,W/2,H/2+10);}
      else if(state.won){ctx.fillStyle='#4caf50';ctx.font='26px "Press Start 2P",monospace';ctx.fillText('通关！',W/2,H/2-20);ctx.fillStyle='#ffd700';ctx.font='14px "Press Start 2P",monospace';ctx.fillText('金币:'+state.coins,W/2,H/2+15);}
      else{ctx.fillStyle='#ffd700';ctx.font='22px "Press Start 2P",monospace';ctx.fillText('准备就绪',W/2,H/2-10);ctx.fillStyle='#fff';ctx.font='11px "Press Start 2P",monospace';ctx.fillText('点击开始',W/2,H/2+25);}
    }
  }
  function drawItem(x,y,it){
    ctx.save();ctx.translate(x,y);ctx.rotate(it.rot);
    if(it.type.indexOf('gold')>=0){ctx.fillStyle=it.col;ctx.beginPath();for(var i=0;i<6;i++){var a=i/6*Math.PI*2;r=it.r*(i%2?0.7:1);ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.fill();ctx.fillStyle='#b8860b';ctx.fillRect(-3,-3,6,6);}
    else if(it.type==='diamond'){ctx.fillStyle=it.col;ctx.beginPath();ctx.moveTo(0,-it.r);ctx.lineTo(it.r,0);ctx.lineTo(0,it.r);ctx.lineTo(-it.r,0);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fillRect(-3,-it.r/2,4,4);}
    else{ctx.fillStyle=it.col;ctx.beginPath();ctx.arc(0,0,it.r,0,7);ctx.fill();ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(-it.r/2,-it.r/2,4,4);ctx.fillRect(it.r/3,it.r/4,4,4);}
    ctx.restore();
  }
  function loop(){update();draw();requestAnimationFrame(loop);}
  document.addEventListener('keydown',function(e){if(e.key===' '){e.preventDefault();launchHook();}if(e.key.toLowerCase()==='r'){init();state.running=true;AOXSound.ensure();}});
  canvas.addEventListener('click',function(){launchHook();});
  canvas.addEventListener('touchstart',function(e){e.preventDefault();launchHook();},{passive:false});
  document.getElementById('startBtn').addEventListener('click',function(){init();state.running=true;AOXSound.ensure();AOXSound.startBGM('game');SFX.select();toast('抓金块！');});
  init();loop();
})();
</script>
</body>
</html>
