<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>接金币跑酷 · AoXuan</title>
<link rel="stylesheet" href="style.css">
<style>#gameCanvas{background:#87ceeb;touch-action:none}.key{display:inline-block;background:var(--mc-panel);border:2px solid #000;box-shadow:inset -2px -2px 0 0 var(--mc-shadow),inset 2px 2px 0 0 var(--mc-highlight);padding:3px 8px;font-family:'Press Start 2P',monospace;font-size:10px;margin:0 2px}</style>
</head>
<body>
<div class="floating-blocks"></div>
<div class="topbar"><a href="index.html" class="logo">⛏ AoXuan.World</a>
<nav><a href="index.html">首页</a><a href="runner.html">跑酷</a><a href="snake.html">贪吃蛇</a><a href="mario.html">冒险</a></nav></div>
<div class="container center">
<h1 class="title-3d" style="font-size:30px;">🏃 接金币跑酷</h1>
<p class="subtitle">三车道跑酷，躲障碍接金币！</p>
<div class="hud" style="margin-top:18px"><div class="hud-item"><span class="label">金币</span><span id="coins">0</span></div><div class="hud-item"><span class="label">距离</span><span id="dist">0</span>m</div><div class="hud-item"><span class="label">生命</span><span id="lives">♥♥♥</span></div><div class="hud-item"><span class="label">最高</span><span id="best">0</span></div></div>
<div class="game-stage" style="margin-top:14px"><canvas id="gameCanvas" width="400" height="480"></canvas></div>
<p style="color:#fff;text-shadow:2px 2px 0 #000;font-size:15px;margin-top:10px"><span class="key">←→</span>切换车道 <span class="key">↑</span>跳 · 躲障碍接金币</p>
<div style="margin-top:12px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><button class="mc-btn green" id="startBtn">▶ 开始</button><a href="index.html" class="mc-btn">← 返回</a></div>
</div><div class="ground" style="position:fixed;bottom:0;left:0;right:0;z-index:0"></div>
<script src="sound.js"></script><script src="mobile.js"></script><script src="shared.js"></script>
<script>
(function(){
var c=document.getElementById('gameCanvas'),x=c.getContext('2d'),W=c.width,H=c.height;
var LANES=3,LW=W/LANES,ROAD_Y=350,PLAYER_Y=380;
var s,lane,vy,jump,coins,obstacles,coinList,tick,speed,keys,lives,coinCount,dist,best;
function init(){s={running:false,over:false};lane=1;vy=0;jump=false;coins=0;obstacles=[];coinList=[];tick=0;speed=3;keys={};lives=3;coinCount=0;dist=0;best=parseInt(localStorage.getItem('runner_best')||'0');updateHud();}
function updateHud(){document.getElementById('coins').textContent=coinCount;document.getElementById('dist').textContent=Math.floor(dist);document.getElementById('lives').textContent='♥'.repeat(lives)||'—';document.getElementById('best').textContent=best;}
function update(){if(!s.running||s.over)return;tick++;dist+=speed/10;speed=3+dist/200;
// 跳跃
if(jump){vy+=0.6;PLAYER_Y+=vy;if(PLAYER_Y>=380){PLAYER_Y=380;vy=0;jump=false;}}
// 切换车道
if(keys['arrowleft']&&lane>0){lane--;keys['arrowleft']=false;SFX.move();}
if(keys['arrowright']&&lane<2){lane++;keys['arrowright']=false;SFX.move();}
if(keys['arrowup']&&!jump){vy=-12;jump=true;SFX.jump();}
// 生成
if(tick%40===0){var r=Math.random();if(r<0.4){coinList.push({lane:Math.floor(Math.random()*3),y:-20,got:false,t:0});}else{obstacles.push({lane:Math.floor(Math.random()*3),y:-30,type:Math.random()<0.5?'rock':'barrier'});}}
// 移动+碰撞
var px=lane*LW+LW/2;
coinList.forEach(function(c2){c2.y+=speed;c2.t+=0.15;if(!c2.got&&c2.y>360&&c2.y<420&&Math.abs(c2.lane-lane)===0&&!jump){c2.got=true;coinCount++;SFX.coin();updateHud();}});
coinList=coinList.filter(function(c2){return c2.y<H+20&&!c2.got;});
obstacles.forEach(function(o){o.y+=speed;var ox=o.lane*LW+LW/2;if(o.y>365&&o.y<410&&Math.abs(o.lane-lane)===0&&!(jump&&o.type==='barrier'&&PLAYER_Y<360)){if(lives>0){lives--;SFX.hurt();o.y=H+100;}if(lives<=0)gameOver();updateHud();}});
obstacles=obstacles.filter(function(o){return o.y<H+20;});}
function gameOver(){s.over=true;s.running=false;SFX.lose();if(coinCount>best){localStorage.setItem('runner_best',coinCount);best=coinCount;}updateHud();}
function draw(){
x.fillStyle='#87ceeb';x.fillRect(0,0,W,H);
// 三车道
for(var i=0;i<3;i++){x.fillStyle=i===lane?'rgba(255,215,0,0.1)':'rgba(255,255,255,0.05)';x.fillRect(i*LW,0,LW,H);}
// 道路
x.fillStyle='#555';x.fillRect(0,ROAD_Y,W,H-ROAD_Y);
x.fillStyle='#777';for(var d=0;d<W;d+=40){var off=(d+tick*speed)%40;x.fillRect(off,ROAD_Y+5,20,3);x.fillRect(off,ROAD_Y+50,20,3);}
// 金币
coinList.forEach(function(c2){if(c2.got)return;var cx=c2.lane*LW+LW/2;var bob=Math.sin(c2.t)*3;x.fillStyle='#ffd700';x.shadowColor='#ffd700';x.shadowBlur=6;x.beginPath();x.arc(cx,c2.y+bob,8,0,7);x.fill();x.shadowBlur=0;});
// 障碍
obstacles.forEach(function(o){var ox=o.lane*LW+LW/2;if(o.type==='rock'){x.fillStyle='#7f7f7f';x.beginPath();x.arc(ox,o.y,12,0,7);x.fill();x.fillStyle='#555';x.fillRect(ox-6,o.y+4,4,4);}else{x.fillStyle='#e53935';x.fillRect(ox-15,o.y-10,30,20);x.fillStyle='#fff';x.font='12px Arial';x.textAlign='center';x.fillText('!',ox,o.y+4);}});
// 玩家
var px=lane*LW+LW/2;var py=PLAYER_Y;x.fillStyle='#e53935';x.fillRect(px-10,py-20,20,24);x.fillStyle='#ff9800';x.fillRect(px-8,py-30,16,10);x.fillStyle='#e53935';x.fillRect(px-8,py-30,16,3);x.fillStyle='#fff';x.fillRect(px-4,py-26,3,3);x.fillRect(px+1,py-26,3,3);x.fillStyle='#1565c0';x.fillRect(px-8,py+4,6,8);x.fillRect(px+2,py+4,6,8);
// 结算
if(!s.running){x.fillStyle='rgba(0,0,0,0.7)';x.fillRect(0,0,W,H);x.textAlign='center';if(s.over){x.fillStyle='#e53935';x.font='22px "Press Start 2P",monospace';x.fillText('Game Over',W/2,H/2-25);x.fillStyle='#ffd700';x.font='13px "Press Start 2P",monospace';x.fillText('Coins:'+coinCount+' Best:'+best,W/2,H/2+8);x.fillStyle='#fff';x.font='10px "Press Start 2P",monospace';x.fillText('Press R',W/2,H/2+38);}else{x.fillStyle='#4caf50';x.font='20px "Press Start 2P",monospace';x.fillText('Ready',W/2,H/2-8);x.font='10px "Press Start 2P",monospace';x.fillText('Click start',W/2,H/2+20);}}}
function loop(){update();draw();requestAnimationFrame(loop);}
document.addEventListener('keydown',function(e){keys[e.key.toLowerCase()]=true;if(['arrowleft','arrowright','arrowup'].indexOf(e.key.toLowerCase())>=0)e.preventDefault();if(e.key.toLowerCase()==='r'){init();s.running=true;}});
document.addEventListener('keyup',function(e){});
c.addEventListener('touchstart',function(e){e.preventDefault();var r=c.getBoundingClientRect();var tx=e.touches[0].clientX-r.left;if(tx<W/3){keys['arrowleft']=true;}else if(tx>W*2/3){keys['arrowright']=true;}else{keys['arrowup']=true;}},{passive:false});
c.addEventListener('touchmove',function(e){e.preventDefault();var r=c.getBoundingClientRect();var tx=e.touches[0].clientX-r.left;var ty=e.touches[0].clientY-r.top;if(ty<H*0.3){keys['arrowup']=true;}else if(tx<W/3){keys['arrowleft']=true;keys['arrowright']=false;}else if(tx>W*2/3){keys['arrowright']=true;keys['arrowleft']=false;}},{passive:false});
document.getElementById('startBtn').addEventListener('click',function(){init();s.running=true;AOXSound.ensure();AOXSound.startBGM('game');SFX.select();toast('Run!');});
init();loop();
})();
</script>
</body></html>
